  { id: 487, text: "An organization has a large archive of unstructured data, including video and audio files. Which storage solution should the organization use?", options: { A: "Cloud Spanner", B: "Cloud Storage", C: "Cloud Bigtable", D: "Cloud SQL" }, correct: ["B"], groups: ["bolum3"], learn: "Video/ses gibi yapısal olmayan büyük veri → Cloud Storage", learnEn: "Unstructured large data (video/audio) → Cloud Storage" },
  { id: 488, text: "An organization has petabytes of data gathered from a wide range of sources. They want to use the data for strategic analysis and to guide business decisions. What type of service should they use?", options: { A: "Object store", B: "Non-relational document database", C: "Data warehouse", D: "Relational transactional database" }, correct: ["C"], groups: ["bolum3", "son2", "son3"], learn: "PB veri + stratejik analiz → Data warehouse", learnEn: "Petabytes of data + strategic analysis → Data warehouse" },
  { id: 489, text: "An organization is building advanced machine learning models in Google Cloud by using TensorFlow. They want to develop their models faster with purpose-built hardware. Which solution should the organization use?", options: { A: "TPUs", B: "CPUs", C: "CPUs", D: "GPUs" }, correct: ["A"], groups: ["bolum1"], learn: "TensorFlow + hızlı eğitim → TPUs", learnEn: "TensorFlow + fast training → TPUs" },
  { id: 490, text: "A manufacturing organization has a large collection of images labeled as intact or defective parts. They want to use this data to build a simple solution to detect faulty parts on their production line. They have no data science expertise. Which solution should they use?", options: { A: "Pre-trained APIs", B: "Document AI", C: "AutoML", D: "Discovery AI for Retail" }, correct: ["C"], groups: ["bolum1", "bolum3", "son1", "son2", "son3"], learn: "Etiketli görsel + özel model + veri bilimi yeteneği yok → AutoML", learnEn: "Labeled images + custom model + no data science expertise → AutoML" },
  { id: 491, text: "An organization is planning to deploy a new workload to Google Cloud. They need an accurate estimate of the likely costs of running the workload. How should the organization create this estimate?", options: { A: "Use the Google Cloud Pricing Calculator.", B: "Deploy workload to test environment to observe costs.", C: "Use historic costs of an existing similar workload.", D: "Refer to pricing information and manually calculate an estimate." }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Maliyet tahmini → Google Cloud Pricing Calculator", learnEn: "Cost estimation → Google Cloud Pricing Calculator" },
  { id: 492, text: "An organization supplies electric car chargers in a nationwide network. They store customer and charging data in BigQuery. They want to efficiently upgrade and maintain their network to reduce waste and achieve their sustainability goals. How can Google Cloud services help the organization?", options: { A: "Secure data access by using Identity and Access Management.", B: "Provide access to third-party developers by creating an API using Apigee.", C: "Create a model in BigQuery to predict future maintenance schedules.", D: "Move data from BigQuery to Cloud Storage to reduce storage costs." }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "BigQuery'de tahmin → BigQuery ML ile bakım takvimi tahmini", learnEn: "Predict maintenance schedules in BigQuery → BigQuery ML model" },
  { id: 493, text: "An organization wants a purpose-built AI solution to increase efficiency and provide personalized interactions for their customer care team. Which Google Cloud AI solution should they use?", options: { A: "Text-to-Speech API", B: "Cloud Talent Solution", C: "Document AI", D: "Contact Center AI" }, correct: ["D"], groups: ["bolum3", "son2", "son3"], learn: "Müşteri hizmetleri + kişisel etkileşim → Contact Center AI", learnEn: "Customer service + personalized interaction → Contact Center AI" },
  { id: 494, text: "A retail organization is training a model to recommend products to customers for an ecommerce website. The model was trained on previous purchases, but did not include demographic information on each buyer. What dimension of the data is responsible for the model's poor performance?", options: { A: "Validity", B: "Accuracy", C: "Timeliness", D: "Completeness" }, correct: ["D"], groups: ["bolum3", "son1"], learn: "Eksik demografik veri → veri bütünlüğü (Completeness) sorunu", learnEn: "Missing demographic data → data Completeness issue" },
  { id: 495, text: "An organization wants a centralized view of their cloud infrastructure in a fully managed system that includes uptime checks. Which Google Cloud service should they use?", options: { A: "Cloud Trace", B: "Cloud Monitoring", C: "Cloud Logging", D: "Cloud Profiler" }, correct: ["B"], groups: ["bolum1"], learn: "Tüm altyapı + uptime kontrolü → Cloud Monitoring", learnEn: "Full infrastructure + uptime checks → Cloud Monitoring" },
  { id: 496, text: "An organization has a large VMware environment that they want to migrate to the cloud. They want to retain existing operational processes and tools. Which Google Cloud service should the organization use?", options: { A: "Compute Engine", B: "Google Cloud VMware Engine", C: "VMware vSphere", D: "Bare Metal Solution" }, correct: ["B"], groups: ["bolum2", "bolum3"], learn: "VMware on-prem → mevcut araçlar ve süreçlerle cloud → VMware Engine", learnEn: "VMware on-prem → existing tools and processes to cloud → VMware Engine" },
  { id: 497, text: "An organization wants to adopt the advanced machine learning capabilities of Google Cloud. However, regulations require data to be stored in an on-premises data center. Which approach should the organization use?", options: { A: "A hybrid-cloud approach", B: "A multi-cloud approach", C: "A public-cloud approach", D: "A private-cloud approach" }, correct: ["B"], groups: ["bolum2", "son2", "son3"], learn: "On-premises veri zorunluluğu + ML → Multi-cloud yaklaşımı", learnEn: "On-premises data requirement + ML capabilities → Multi-cloud approach" },
  { id: 498, text: "What is the purpose of an application programming interface (API)?", options: { A: "To provide a set of instructions that allow computer programs to communicate with each other", B: "To provide cloud plugins for integrated development environments", C: "To connect networks from different cloud providers", D: "To manage multiple containerized workloads" }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "API → programlar arası iletişim talimat seti", learnEn: "API → set of instructions allowing computer programs to communicate" },
  { id: 499, text: "An organization processes batch sales data at the end of every month to analyze sales trends and derive business insights. They want to improve accuracy and make near real-time decisions. What should the organization do?", options: { A: "Change from a relational database to a NoSQL database.", B: "Filter the data so reports are generated faster.", C: "Switch from batch processing to stream processing.", D: "Process batch reports weekly instead of monthly." }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Batch'ten gerçek zamanlı → stream processing'e geç", learnEn: "From batch to real-time decisions → switch to stream processing" },
  { id: 500, text: "An organization wants to refactor their application by using a microservices architecture when migrating to the cloud. Which benefit would this action provide?", options: { A: "The refactored application is more efficient and scalable.", B: "No code changes will be required.", C: "This migration pattern provides the fastest path to the cloud.", D: "The application will become PCI-DSS compliant by default." }, correct: ["A"], groups: ["bolum2", "son2", "son3"], learn: "Microservices yeniden yapılandırma → verimli + ölçeklenebilir", learnEn: "Microservices refactoring → more efficient and scalable application" },
  { id: 501, text: "An organization must verify the identity of a user seeking access to a system. Which aspect of cloud identity management does this action describe?", options: { A: "Authorization", B: "Authentication", C: "Auditing", D: "Encrypting" }, correct: ["B"], groups: ["bolum3", "son1"], learn: "Kimlik doğrulama = Authentication (kim olduğunu kanıtlama)", learnEn: "Verifying user identity = Authentication" },
  { id: 502, text: "An organization is evaluating its defenses against cyber security threats and is concerned about the risks of social engineering by cyber criminals. How might these attacks happen?", options: { A: "SQL injection attacks", B: "Physical damage to hardware", C: "Phishing emails", D: "Distributed denial-of-service attacks" }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Sosyal mühendislik → phishing e-postası", learnEn: "Social engineering attacks → phishing emails" },
  { id: 503, text: "An organization has a large dataset that contains text transcripts of conversations between their customers and service representatives. They want an automated solution to identify the topics their customers care most about. Which service should the organization use?", options: { A: "Vision API", B: "Speech-to-Text API", C: "Cloud Translation API", D: "Natural Language API" }, correct: ["D"], groups: ["bolum2", "son2", "son3"], learn: "Metin transkript analizi + konu tespiti → Natural Language API", learnEn: "Text transcript analysis + topic detection → Natural Language API" },
  { id: 504, text: "An organization needs protection against distributed denial-of-service (DDoS) attacks. Which Google Cloud service should the organization use?", options: { A: "Google Cloud Armor", B: "Cloud Build", C: "Cloud VPN", D: "Security Command Center" }, correct: ["A"], groups: ["bolum2"], learn: "DDoS koruması → Google Cloud Armor", learnEn: "DDoS protection → Google Cloud Armor" },
  { id: 505, text: "An organization wants to build custom machine learning models. They require a managed platform that provides services to gather data, build models, and then deploy and monitor those models. Which service should they use?", options: { A: "Document AI", B: "Natural Language API", C: "Kubernetes Engine", D: "Vertex AI" }, correct: ["D"], groups: [], learn: "Özel ML: veri toplama + model oluşturma + deploy + izleme → Vertex AI", learnEn: "Custom ML: data gathering + model build + deploy + monitor → Vertex AI" },
  { id: 506, text: "An organization wants to control what types of network traffic are allowed to enter and leave its network and access its applications. Which security measure should the organization use?", options: { A: "2-Step Verification", B: "Privileged access", C: "Encryption keys", D: "Firewall rules" }, correct: ["D"], groups: ["bolum2", "son1", "son2"], learn: "Ağ trafiği kontrolü → Firewall rules", learnEn: "Control network traffic in/out → Firewall rules" },
  { id: 507, text: "An organization is considering the use of managed services when migrating to the cloud. Which routine tasks are typically provided automatically by a managed services platform?", options: { A: "Managing user access", B: "Patching and upgrades", C: "Data archiving", D: "Cost optimization" }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Managed service → patch ve güncellemeler otomatik", learnEn: "Managed service automatic tasks → patching and upgrades" },
  { id: 508, text: "An organization is hosting an application in Europe, and customers in Asia are reporting slow response times despite their fast internet connection. What is the problem?", options: { A: "Not enough application servers", B: "Network bandwidth", C: "Network latency", D: "Misconfigured application servers" }, correct: ["C"], groups: ["bolum2", "son2", "son3"], learn: "Uzak coğrafi mesafe → ağ gecikmesi (latency)", learnEn: "Application hosted far away → network latency" },
  { id: 509, text: "An organization is deploying their servers to the cloud using the infrastructure as a service model. In the shared responsibility model, what is the cloud provider responsible for?", options: { A: "Data access policies", B: "Security of the operating system", C: "Security of the software", D: "Physical security" }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "IaaS paylaşımlı sorumluluk → fiziksel güvenlik provider'a ait", learnEn: "IaaS shared responsibility → physical security is cloud provider's" },
  { id: 510, text: "What is the Site Reliability Engineering (SRE) term for an organization's desired level of reliability and performance?", options: { A: "Service-level objective", B: "Enhanced support", C: "Scalable infrastructure", D: "Service-level indicator" }, correct: ["A"], groups: ["bolum2"], learn: "SRE → istenen güvenilirlik seviyesi → SLO", learnEn: "SRE desired reliability level → SLO (Service Level Objective)" },
  { id: 511, text: "An organization wants to ensure that they grant users only the permissions they require to perform their job responsibilities. Which security principle describes this approach?", options: { A: "Cyber resilience", B: "Zero-trust", C: "Least privilege", D: "Security by default" }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Minimum gerekli yetki prensibi → Least privilege", learnEn: "Grant only necessary permissions → Least privilege principle" },
  { id: 512, text: "An organization wants to use an open source library with a flexible ecosystem of tools to create and train its own machine learning models. Which product or solution should the organization use?", options: { A: "Apache Beam", B: "Cloud Functions", C: "TensorFlow", D: "Dataflow" }, correct: ["C"], groups: ["bolum3", "son1", "son2"], learn: "Açık kaynak ML kütüphanesi + esnek ekosistem → TensorFlow", learnEn: "Open source ML library + flexible ecosystem → TensorFlow" },
  { id: 513, text: "An organization has created an application that can diagnose different medical conditions when users submit images of their affected body parts. Which Google Cloud product or service did the organization use?", options: { A: "Machine learning", B: "App Engine", C: "Cloud Logging", D: "Cloud Profiler" }, correct: ["A"], groups: ["bolum3"], learn: "Görsel tabanlı tıbbi teşhis → Machine learning", learnEn: "Image-based medical diagnosis → Machine learning" },
  { id: 514, text: "An organization wants to duplicate critical system components to enhance reliability and mitigate single points of failure. Which design consideration should the organization use?", options: { A: "Latency", B: "Security", C: "Backups", D: "Redundancy" }, correct: ["D"], groups: ["bolum3", "son1"], learn: "Tek nokta arızasını önleme → Redundancy (yedeklilik)", learnEn: "Eliminate single points of failure → Redundancy" },
  { id: 515, text: "A small scale retailer has been collecting its point of sale transactions in a PostgreSQL database. They have raised funding for a strategic expansion goal in the next year that will see them grow significantly in Asia, Europe, and North America. Which database option should they choose in Google Cloud?", options: { A: "BigQuery", B: "Cloud SQL", C: "Bigtable", D: "Spanner" }, correct: ["D"], groups: ["bolum1"], learn: "PostgreSQL → global büyüme → Cloud Spanner", learnEn: "PostgreSQL → global growth → Cloud Spanner" },
  { id: 516, text: "An organization is looking for a storage solution that will help them serve content to users worldwide. They need a solution that offers a high level of availability. What feature of Cloud Storage would they benefit from?", options: { A: "Object versioning", B: "Global metadata", C: "Data encryption", D: "Multi-regional storage" }, correct: ["D"], groups: ["bolum3", "son1", "son2"] },
];
</script>
<script>
(function () {
  "use strict";

  var state = {
    mode: null,
    questions: [],
    currentIndex: 0,
    correctCount: 0,
    qStates: [] // per-question: { shuffledLetters, answered, selected }
  };

  // Bölüm 7: localStorage ile doğru/yanlış takibi
  var b7State = { correct: [], wrong: [] };

  function loadB7State() {
    try {
      b7State.correct = JSON.parse(localStorage.getItem("b7_correct") || "[]");
      b7State.wrong   = JSON.parse(localStorage.getItem("b7_wrong")   || "[]");
    } catch (e) {
      b7State.correct = [];
      b7State.wrong   = [];
    }
    updateB7Counts();
  }

  function saveB7State() {
    localStorage.setItem("b7_correct", JSON.stringify(b7State.correct));
    localStorage.setItem("b7_wrong",   JSON.stringify(b7State.wrong));
    updateB7Counts();
  }

  function updateB7Counts() {
    document.getElementById("b7-correct-count").textContent = b7State.correct.length;
    document.getElementById("b7-wrong-count").textContent   = b7State.wrong.length;
  }

  function recordB7Answer(qId, isCorrect) {
    if (state.mode !== "bolum7_all") return;
    b7State.correct = b7State.correct.filter(function (id) { return id !== qId; });
    b7State.wrong   = b7State.wrong.filter(function (id)   { return id !== qId; });
    if (isCorrect) {
      b7State.correct.push(qId);
    } else {
      b7State.wrong.push(qId);
    }
    saveB7State();
  }

  var screenMenu = document.getElementById("screen-menu");
  var screenQuiz = document.getElementById("screen-quiz");
  var screenResults = document.getElementById("screen-results");

  var progressText = document.getElementById("progress-text");
  var realQnoEl = document.getElementById("real-qno");
  var questionTextEl = document.getElementById("question-text");
  var optionsContainer = document.getElementById("options-container");
  var multiSubmitWrap = document.getElementById("multi-submit-wrap");
  var btnSubmitMulti = document.getElementById("btn-submit-multi");
  var btnNext = document.getElementById("btn-next");
  var btnPrev = document.getElementById("btn-prev");

  var resultsScore = document.getElementById("results-score");
  var resultsPercent = document.getElementById("results-percent");
  var btnRetry = document.getElementById("btn-retry");
  var btnMenu = document.getElementById("btn-menu");

  function shuffleArray(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i];
      a[i] = a[j];
      a[j] = tmp;
    }
    return a;
  }

  function showScreen(screen) {
    screenMenu.style.display = "none";
    screenQuiz.style.display = "none";
    screenResults.style.display = "none";
    screen.style.display = "block";
  }

  function getQuestionsForMode(mode) {
    var pool;
    var allAbovePattern = /\b(all of the above|none of the above|all of these|all of the above are correct|both a.{0,5}b)\b/i;
    if (mode === "bolum6") {
      pool = shuffleArray(QUESTIONS.filter(function (q) {
        return Object.values(q.options).some(function (txt) {
          return allAbovePattern.test(txt || "");
        });
      }));
    } else if (mode === "exam") {
      pool = shuffleArray(QUESTIONS.slice()).slice(0, 50);
    } else if (mode === "bolum7_all") {
      pool = shuffleArray(QUESTIONS.slice());
    } else if (mode === "bolum7_correct") {
      pool = shuffleArray(QUESTIONS.filter(function (q) {
        return b7State.correct.indexOf(q.id) !== -1;
      }));
    } else if (mode === "bolum7_wrong") {
      pool = shuffleArray(QUESTIONS.filter(function (q) {
        return b7State.wrong.indexOf(q.id) !== -1;
      }));
    } else if (mode === "all") {
      pool = shuffleArray(QUESTIONS.slice());
    } else if (mode === "bolum4") {
      pool = QUESTIONS.slice(); // sıralı, karıştırılmaz
    } else if (mode === "bolum5") {
      // bolum2 soruları sıralı; ancak tüm sorulardaki doğru cevaplar arasında
      // son-3-kelime imzası farklı sorularla çakışanlar hariç tutulur
      var sigMap = {};
      QUESTIONS.forEach(function (q) {
        q.correct.forEach(function (letter) {
          var txt = q.options[letter];
          if (!txt) return;
          var words = txt.trim().split(/\s+/);
          var sig = words.length <= 3
            ? txt.trim().toLowerCase()
            : words.slice(-3).join(" ").toLowerCase();
          if (!sigMap[sig]) sigMap[sig] = [];
          if (sigMap[sig].indexOf(q.id) === -1) sigMap[sig].push(q.id);
        });
      });
      var dupSigs = {};
      Object.keys(sigMap).forEach(function (sig) {
        if (sigMap[sig].length > 1) dupSigs[sig] = true;
      });
      function hasDupSig(q) {
        return q.correct.some(function (letter) {
          var txt = q.options[letter];
          if (!txt) return false;
          var words = txt.trim().split(/\s+/);
          var sig = words.length <= 3
            ? txt.trim().toLowerCase()
            : words.slice(-3).join(" ").toLowerCase();
          return dupSigs[sig];
        });
      }
      pool = QUESTIONS.filter(function (q) {
        return q.groups.indexOf("bolum2") !== -1 && !hasDupSig(q);
      }); // bolum2 soruları, sıralı, karıştırılmaz, benzersiz cevaplılar
    } else {
      pool = shuffleArray(QUESTIONS.filter(function (q) {
        return q.groups.indexOf(mode) !== -1;
      }));
    }
    return pool;
  }

  function startQuiz(mode) {
    state.mode = mode;
    state.questions = getQuestionsForMode(mode);
    state.currentIndex = 0;
    state.correctCount = 0;
    state.qStates = [];
    showScreen(screenQuiz);
    renderQuestion();
  }

  function letterList(count) {
    var letters = ["A", "B", "C", "D", "E", "F"];
    return letters.slice(0, count);
  }

  function getQState(index) {
    if (!state.qStates[index]) {
      var q = state.questions[index];
      var totalLetters = Object.keys(q.options).filter(function (k) {
        return q.options[k] !== undefined && q.options[k] !== null && q.options[k] !== "";
      });
      state.qStates[index] = {
        shuffledLetters: shuffleArray(totalLetters),
        answered: false,
        selected: []
      };
    }
    return state.qStates[index];
  }

  function updateProgressText() {
    progressText.textContent =
      "Soru " + (state.currentIndex + 1) + " / " + state.questions.length +
      ", Doğru: " + state.correctCount;
  }

  function updateNavButtons() {
    btnPrev.style.display = state.currentIndex > 0 ? "inline-block" : "none";
    btnNext.style.display = "inline-block";
    btnNext.textContent = (state.currentIndex === state.questions.length - 1)
      ? "Sonuçları Gör"
      : "Sonraki Soru →";
  }

  function renderQuestion() {
    var q = state.questions[state.currentIndex];
    var qs = getQState(state.currentIndex);
    var isMulti = q.correct.length > 1;

    realQnoEl.textContent = "Gerçek Soru No: " + q.id;
    updateProgressText();

    questionTextEl.textContent = q.text;
    optionsContainer.innerHTML = "";

    qs.shuffledLetters.forEach(function (origLetter, idx) {
      var displayLetter = letterList(qs.shuffledLetters.length)[idx];
      var optDiv = document.createElement("div");
      optDiv.className = "option";
      optDiv.dataset.origLetter = origLetter;

      if (isMulti) {
        var checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.id = "opt-" + origLetter;
        if (qs.answered) {
          checkbox.checked = qs.selected.indexOf(origLetter) !== -1;
          checkbox.disabled = true;
        }
        optDiv.appendChild(checkbox);
      }

      var letterSpan = document.createElement("span");
      letterSpan.className = "option-letter";
      letterSpan.textContent = displayLetter + ".";
      optDiv.appendChild(letterSpan);

      var textSpan = document.createElement("span");
      textSpan.textContent = q.options[origLetter];
      optDiv.appendChild(textSpan);

      if (qs.answered) {
        optDiv.classList.add("locked");
      } else if (isMulti) {
        optDiv.addEventListener("click", function (e) {
          if (e.target.tagName !== "INPUT") {
            var cb = optDiv.querySelector("input[type=checkbox]");
            cb.checked = !cb.checked;
          }
        });
      } else {
        optDiv.addEventListener("click", function () {
          handleSingleAnswer(q, qs, origLetter);
        });
      }

      optionsContainer.appendChild(optDiv);
    });

    if (qs.answered) {
      applyAnswerStyling(q, qs, isMulti);
    }

    if (qs.answered && q.learn) {
      var existingLearn = document.getElementById("learn-box");
      if (!existingLearn) {
        var learnBox = document.createElement("div");
        learnBox.id = "learn-box";
        learnBox.className = "learn-box";
        var correctTexts = q.correct.map(function(l) { return q.options[l]; }).join(' + ');
        var enLine = q.learnEn ? "<span class='learn-en'>" + q.learnEn + "</span>" : "";
        learnBox.innerHTML = "<strong>💡 Öğrenim</strong><span class='learn-tip'>" + q.learn + "</span>" + enLine + "<span class='learn-answer'>" + correctTexts + "</span>";
        optionsContainer.parentNode.insertBefore(learnBox, optionsContainer.nextSibling);
      }
    } else {
      var existingLearn = document.getElementById("learn-box");
      if (existingLearn) existingLearn.remove();
    }


    if (isMulti && !qs.answered) {
      multiSubmitWrap.style.display = "flex";
      btnSubmitMulti.onclick = function () {
        handleMultiAnswer(q, qs);
      };
    } else {
      multiSubmitWrap.style.display = "none";
    }

    updateNavButtons();
  }

  function applyAnswerStyling(q, qs, isMulti) {
    var opts = optionsContainer.querySelectorAll(".option");
    opts.forEach(function (opt) {
      var origLetter = opt.dataset.origLetter;
      var isCorrectOption = q.correct.indexOf(origLetter) !== -1;
      var isSelected = qs.selected.indexOf(origLetter) !== -1;

      if (isSelected && isCorrectOption) {
        opt.classList.add("correct");
      } else if (isSelected && !isCorrectOption) {
        opt.classList.add("wrong");
      } else if (!isSelected && isCorrectOption) {
        opt.classList.add("correct");
        if (isMulti) {
          var tag = document.createElement("span");
          tag.className = "correct-tag";
          tag.textContent = "(doğru cevap)";
          opt.appendChild(tag);
        }
      }
    });
  }

  function handleSingleAnswer(q, qs, clickedLetter) {
    qs.answered = true;
    qs.selected = [clickedLetter];

    var isCorrect = clickedLetter === q.correct[0];
    if (isCorrect) state.correctCount++;
    recordB7Answer(q.id, isCorrect);

    renderQuestion();
  }

  function handleMultiAnswer(q, qs) {
    var opts = optionsContainer.querySelectorAll(".option");
    var checkedLetters = [];
    opts.forEach(function (opt) {
      var cb = opt.querySelector("input[type=checkbox]");
      if (cb && cb.checked) {
        checkedLetters.push(opt.dataset.origLetter);
      }
    });

    qs.answered = true;
    qs.selected = checkedLetters;

    var correctSet = q.correct.slice().sort();
    var checkedSet = checkedLetters.slice().sort();
    var isFullyCorrect =
      correctSet.length === checkedSet.length &&
      correctSet.every(function (l, i) { return l === checkedSet[i]; });

    if (isFullyCorrect) state.correctCount++;
    recordB7Answer(q.id, isFullyCorrect);

    renderQuestion();
  }

  function goToQuestion(newIndex) {
    if (newIndex < 0) return;
    if (newIndex >= state.questions.length) {
      showResults();
      return;
    }
    state.currentIndex = newIndex;
    renderQuestion();
  }

  function nextQuestion() {
    goToQuestion(state.currentIndex + 1);
  }

  function prevQuestion() {
    goToQuestion(state.currentIndex - 1);
  }

  function showResults() {
    showScreen(screenResults);
    var total = state.questions.length;
    var pct = total === 0 ? 0 : Math.round((state.correctCount / total) * 100);
    resultsScore.textContent = "Doğru: " + state.correctCount + " / " + total;
    resultsPercent.textContent = "Başarı: %" + pct;
  }

  // Event wiring
  document.querySelectorAll(".mode-btn[data-mode]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      startQuiz(btn.dataset.mode);
    });
  });

  // Bölüm 7 toggle
  document.getElementById("btn-bolum7-toggle").addEventListener("click", function () {
    var sub = document.getElementById("bolum7-submenu");
    var open = sub.style.display === "flex";
    sub.style.display = open ? "none" : "flex";
    this.textContent = open ? "Bölüm 7: Pratik Takip ▼" : "Bölüm 7: Pratik Takip ▲";
  });

  // Sonlar toggle
  document.getElementById("btn-sonlar-toggle").addEventListener("click", function () {
    var sub = document.getElementById("sonlar-submenu");
    var open = sub.style.display === "flex";
    sub.style.display = open ? "none" : "flex";
    this.textContent = open ? "Sonlar ▼" : "Sonlar ▲";
  });

  // Sıfırla
  document.getElementById("btn-b7-clear").addEventListener("click", function () {
    if (confirm("Doğru ve yanlış listelerini sıfırlamak istediğinizden emin misiniz?")) {
      b7State.correct = [];
      b7State.wrong   = [];
      saveB7State();
    }
  });

  loadB7State();

  btnNext.addEventListener("click", nextQuestion);
  btnPrev.addEventListener("click", prevQuestion);

  document.addEventListener("keydown", function (e) {
    if (screenQuiz.style.display !== "block") return;
    if (e.key === "ArrowRight") {
      nextQuestion();
    } else if (e.key === "ArrowLeft") {
      prevQuestion();
    }
  });

  btnRetry.addEventListener("click", function () {
    startQuiz(state.mode);
  });

  btnMenu.addEventListener("click", function () {
    showScreen(screenMenu);
    updateB7Counts();
  });

})();
</script>
</body>
</html>
