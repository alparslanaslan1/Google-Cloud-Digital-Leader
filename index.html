  { id: 357, text: "A customer has tens of applications that are dependent on Oracle databases in their on-premise data centers. The customer wants to migrate to Google Cloud. Their long term goal is to move to other cloud native database technologies. What options do they have to initially move their data?", options: { A: "Migrate to a Bare Metal server.", B: "Migrate to Cloud SQL.", C: "Since there is no hosted Oracle solution, leave the Oracle data on-premise while doing analytics on Google Cloud.", D: "Containerize Oracle and run it using Cloud Run." }, correct: ["B"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Oracle'dan Cloud SQL → Bare Metal değil, Cloud SQL", learnEn: "Migrate Oracle to Cloud SQL (not Bare Metal)" },
  { id: 358, text: "Which of the following storage options should you use when your company is using Cloud Storage to store application backup files for disaster recovery purposes, provided you want to follow Google's recommended practices.", options: { A: "Multi-Regional Storage", B: "Coldline storage", C: "Nearline Storage", D: "Regional Storage" }, correct: ["A"], groups: ["bolum3", "son2"], learn: "DR yedekleme → Multi-Regional Storage", learnEn: "DR backup storage → Multi-Regional Storage" },
  { id: 359, text: "The customer has applications that do data processing on-premise. They have been built using Hadoop and Spark. What product should I use on Google Cloud?", options: { A: "Dataproc", B: "Dataflow", C: "Dataprep", D: "Dataplex" }, correct: ["A"], groups: ["bolum3", "son1"], learn: "Hadoop/Spark → Dataproc", learnEn: "Hadoop/Spark workloads → Dataproc" },
  { id: 360, text: "Considering Different Storage and database options e.g. Cloud Datastore, Cloud SQL, Cloud Storage, etc. Which of the following statements is/are correct? (Select two answer)", options: { A: "Cloud DataStore and Cloud SQL have Terabytes+ and Terabytes Capacity respectively.", B: "Cloud Bigtable and Cloud Storage both have Petabytes+ capacity.", C: "Cloud Bigtable and Cloud Storage both have not Petabytes+ capacity.", D: "None of the above." }, correct: ["A", "B"], groups: ["son1", "son2", "son3"], learn: "Bigtable + Cloud Storage → PB+ kapasite", learnEn: "Bigtable + Cloud Storage → both have petabyte+ capacity" },
  { id: 361, text: "You have deployed a new public web application that allows users to register and login with email ids, phone numbers, or user ids. You are seeing some unusual activity with user registrations and logins from a few IPs. A large number of accounts were created very quickly. Logins are also happening quickly thereafter from these new accounts. Different parts of the application are being explored, all of which are putting a heavy load on the application. What could be a problem and how can you solve it?", options: { A: "A hacker group has hired a bunch of people to create accounts and manually use the system. Use Cloud Asset Inventory to see if there have been changes in the inventory.", B: "Bots are creating accounts and then using them. Use Google Cloud's Web App and API Protection (WAAP).", C: "Bots are creating accounts and then using them. Use Identity-Aware Proxy to restrict the users to known users.", D: "Automated testing tools might still be running and creating accounts. Use Identity-Aware Proxy to restrict the users to known users." }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Bot saldırısı → Web App ve API Protection (WAAP)", learnEn: "Bot account creation attack → Web App and API Protection (WAAP)" },
  { id: 362, text: "Your company inspects certain devices for cracks, rust, etc. Some of these issues are difficult to identify for a human and your company has seen increasing customer complaints - the customer has paid for an inspection and the field agent said there was no problem, but it later turned out there actually was. The team has come up with a proposal to engage AI to identify issues. On evaluating the existing system, it is seen that the mobile phone network connection is not good or consistent. What solution can work for them?", options: { A: "Use AutoML Vision Edge models.", B: "Use the Rust programming language instead of Python to identify issues like rust.", C: "Use Cloud TPUs which will be able to do the analysis faster on the cloud. Thus responses also will be fast.", D: "Use TensorFlow to create custom models and deploy it as TensorFlow Lite models." }, correct: ["A"], groups: ["bolum1", "bolum2", "son1", "son2", "son3"], learn: "Düşük bağlantı + edge ML → AutoML Vision Edge", learnEn: "Low connectivity + edge ML → AutoML Vision Edge" },
  { id: 363, text: "Your customer's IT team is in the process of modernizing their customer-facing applications. They've witnessed others getting good results from employing microservices, and they're keen to adopt it themselves. The first application that they are modernizing has about 5 different sub-parts, which they have identified will be the services. They also identify that each of them has different scale requirements - some services like user login are less frequently used while others like transactions are heavily used. What technical strategy would you recommend for them?", options: { A: "Containerize the services and orchestrate them with Google Kubernetes Engine.", B: "Retain the original application in Compute Engine and scale it as needed using Managed Instance Groups.", C: "Retain the original application as a backup and also for separately scaling the services, create new application binaries.", D: "Retain the original application in Compute Engine and scale it as needed using Unmanaged Instance Groups." }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Microservices + farklı ölçekleme → GKE", learnEn: "Microservices + different scaling requirements → GKE" },
  { id: 364, text: "Which of the following is/are core storage options available on the Google Cloud Platform?", options: { A: "Cloud Storage and Cloud Data Store", B: "Cloud Spanner", C: "Cloud SQL and Google Big Table", D: "All of the above" }, correct: ["D"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Tüm GCP depolama seçenekleri: Cloud Storage + Datastore + Spanner + SQL + Bigtable", learnEn: "All GCP storage options: Cloud Storage + Datastore + Spanner + SQL + Bigtable" },
  { id: 365, text: "You are a program manager in a company you need to submit a bare metal solution order for a secure, high performance connection with a low-latency network fabric. What network information do you need to submit the order to Bare Metal Solutions?", options: { A: "IP Ranges, for example Client IP Address range used for communication between your Google Cloud and Bare Metal Solution environments.", B: "Google Cloud Project Id that you are using with your bare metal solution environment.", C: "Total number of VLANs you need in your Bare Metal Solution Environment.", D: "All of the above" }, correct: ["D"], groups: ["bolum3", "son2", "son3"], learn: "Bare Metal sipariş bilgileri: IP aralıkları + proje ID + VLAN sayısı", learnEn: "Bare Metal order info: IP ranges + project ID + VLAN count" },
  { id: 366, text: "You are a program manager in a company and handling a project and you need to create a virtual machine on google cloud console that will be very simple to set up, by flipping a bit via command, API, or with developer console that gives you 30 seconds to shut down when you're preempted, allow you to save your work that also helps in the company budget upto 70-80% less charges than the regular VMs.", options: { A: "Bare Metal Solutions", B: "Preemptible Virtual Machines.", C: "Google Cloud VM Instances", D: "None of the above." }, correct: ["B"], groups: ["bolum2", "bolum3", "son1", "son2", "son3"], learn: "Ucuz (70-80%) + kesilebilir + 30 sn uyarı → Preemptible VM", learnEn: "Cheap (70-80%) + preemptible + 30 sec warning → Preemptible VM" },
  { id: 367, text: "In terms of Infrastructure as a Service (IaaS) what are the benefits of it?", options: { A: "IaaS offers virtually infinite flexibility and scalability, enterprises can get their work done more efficiently, ensuring faster development life cycles.", B: "IaaS resources are regularly available to businesses when they need them. As a result, enterprises reduce delays when expanding infrastructure and, alternatively, don't waste resources by overbuilding capacity.", C: "IaaS resources are used on demand and enterprises only have to pay for the compute, storage, and networking resources that are actually used. IaaS costs are fairly predictable and can be easily contained and budgeted for.", D: "All of the Above" }, correct: ["D"], groups: ["bolum3", "son1", "son2", "son3"], learn: "IaaS faydaları: esneklik + on-demand kullanılabilirlik + kullandıkça öde", learnEn: "IaaS benefits: flexibility + on-demand availability + pay-per-use" },
  { id: 368, text: "Your company has made plans to roll out OpenShift, a Kubernetes platform solution offered by IBM Red Hat, across all its on-premises and public cloud environments. Given that you are the lead architect responsible for your company's GCP deployments, what type of shared responsibility model will this deployment entail for you?", options: { A: "SaaS", B: "On premises", C: "PaaS", D: "IaaS" }, correct: ["D"], groups: ["bolum3", "son1", "son2"], learn: "Kendi K8s platformunu yönetme → IaaS modeli", learnEn: "Managing your own K8s platform → IaaS model" },
  { id: 369, text: "A client is currently running software on their on-premise systems that is bound by a certain type of license. They are allowed to run the software on virtualized machines. However, they cannot run them on virtualized machines that are shared by two different companies, teams, or projects. What option do they have on Google Cloud?", options: { A: "Google Cloud is a public cloud accessed by multiple customers.", B: "Allocate a Bare Metal machine.", C: "Setup exclusive login to the VM with self-generated security keys.", D: "Allocate sole-tenant nodes" }, correct: ["D"], groups: ["bolum2", "bolum3", "son1", "son2", "son3"], learn: "Paylaşılmayan VM lisansı → Sole-tenant nodes", learnEn: "Non-shared VM license → Sole-tenant nodes" },
  { id: 370, text: "Which of the following is/are true for Preemptible Instances?", options: { A: "Preemptible Instances have no Service Level Agreement (Compute Engine SLA).", B: "Google Cloud Free Tier credits for compute engine do not apply to preemptible instances.", C: "Preemptible instances can't live migrate to a regular VM instance, or be set to automatically restart when there is a maintenance event.", D: "All of the above." }, correct: ["D"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Preemptible VM: SLA yok + free tier geçersiz + live migration yok", learnEn: "Preemptible VM: no SLA + free tier invalid + no live migration" },
  { id: 371, text: "If you increase the size of a subnet in a custom VPC network, the IP addresses of virtual machines already on that subnet might be affected. Which option is correct?", options: { A: "False", B: "None of the above", C: "True", D: "Not Defined by Google Cloud Platform" }, correct: ["A"], groups: ["son2", "son3"], learn: "Subnet büyütme → mevcut VM IP'lerini ETKİLEMEZ (False)", learnEn: "Expanding a subnet does NOT affect existing VM IP addresses (False)" },
  { id: 372, text: "Which of the following statements is/are correct about Machine Learning?", options: { A: "Machine learning examples include chatbots and automated virtual assistants to automate routine customer service tasks and speed up issue resolution.", B: "Machine learning automates the job of building statistical models with Human Intervention.", C: "Robotic process automation (RPA) can not be attached with ML.", D: "None of the Above." }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "ML örnek kullanım: chatbot ve sanal asistanlar", learnEn: "ML example use cases: chatbots and virtual assistants" },
  { id: 373, text: "You are a cloud architect in a software solution provider company; one of the clients is a National Bank that wants to build an application that deals with transaction processing, and it needs a relational database with petabytes of scale data. Which of the following Google Cloud Services will you use?", options: { A: "Cloud SQL", B: "Cloud Bigtable", C: "Cloud Spanner", D: "Google Cloud BigQuery" }, correct: ["C"], groups: ["bolum1", "son2", "son3"], learn: "Petabyte ölçekli ilişkisel DB + banka → Cloud Spanner", learnEn: "Petabyte-scale relational DB + banking → Cloud Spanner" },
  { id: 374, text: "Your customer has a reporting tool that is only occasionally used by the leadership team. Usage of it is infrequent - once a week, once a month, or once a quarter. They want to run this application in a cost-effective manner. What are the compute options available on Google Cloud which would be suitable? (Choose Two answer)", options: { A: "Cloud Run", B: "Cloud App Engine Standard", C: "Compute Engine", D: "Kubernetes Engine" }, correct: ["A", "B"], groups: [], learn: "Nadiren kullanılan uygulama → Cloud Run veya App Engine Standard (sunucusuz)", learnEn: "Infrequently used app → Cloud Run or App Engine Standard (serverless)" },
  { id: 375, text: "You are working in a company where you need to store Terabytes of Image Data daily and process them, e.g. taking photos of the entire planet 24 hours every day with satellite and sending data to data centres to store and process it. Which of the following would be the best combination for your infrastructure?", options: { A: "Bare Metal Solutions with Google Cloud Storage.", B: "Google Cloud Storage & Google Cloud Compute Engines", C: "Google Cloud Storage & Preemptible VMs.", D: "None of the Above" }, correct: ["C"], groups: ["bolum2", "bolum3", "son1", "son2", "son3"], learn: "Büyük görsel veri + işleme → Cloud Storage + Preemptible VM", learnEn: "Large image data + processing → Cloud Storage + Preemptible VMs" },
  { id: 376, text: "DriveSuper Inc. teaches its clients to drive cars and bikes and helps them get their license. They are planning to build a mobile application where users can sign up, plan their schedules, and take stock of progress. They want the onboarding process to be smooth and frictionless, giving users a great experience from the get-go. They want this done as quickly as possible and not be expensive. What is their best option on Google Cloud?", options: { A: "Build the mobile app with Cloud SQL as the backend", B: "Build the mobile app with Cloud Storage as the backend", C: "Build the mobile application with Firebase as the backend", D: "Build the mobile app with Cloud Spanner as the backend" }, correct: ["D"], groups: ["bolum2"], learn: "Mobil uygulama + hızlı başlangıç + düşük maliyet → Firebase (backend olarak)", learnEn: "Mobile app + fast start + low cost → Firebase (as backend)" },
  { id: 377, text: "Which of the following is true while creating a boot persistent disk from a snapshot?", options: { A: "You cannot apply a snapshot to an existing persistent disk, or apply a snapshot to persistent disks that belong to a different project than that snapshot.", B: "It is only possible to apply data from a snapshot when you first create a persistent disk.", C: "After you create a snapshot of a boot persistent disk, you can apply data from that snapshot to new persistent disks.", D: "All of the above." }, correct: ["D"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Snapshot → yeni persistent disk oluşturmak için kullanılır", learnEn: "Snapshot → used to create new persistent disks" },
  { id: 378, text: "An application has become very popular and the number of requests/users is increasing quickly. There is a meeting to figure out how to scale the systems so that they can accept user requests and still have the capacity to spare. What is the preferred option?", options: { A: "Circular Scaling takes a round-robin approach to allocate and destroy VMs.", B: "Triangular Scaling takes an automated average of Cost, Effort, and Time.", C: "Vertical Scaling", D: "Horizontal Scaling" }, correct: ["D"], groups: ["bolum2", "son2", "son3"], learn: "Artan kullanıcı talebi → Horizontal Scaling", learnEn: "Growing user demand → Horizontal Scaling" },
  { id: 379, text: "A customer in the European Union region is very clear that their data should not go outside the European Union. Their end users are spread all over the European Union. They have to choose a storage option that serves all the users within Europe via web browsers as quickly as possible. Which storage option will work for them?", options: { A: "Cloud Storage with a single region that is known to be within the European Union", B: "Cloud Filestore connected to virtual machines which are guaranteed to be within the European Union", C: "Cloud Storage with the multi-region option of Europe", D: "Cloud Storage with the dual-region option of Europe" }, correct: ["D"], groups: ["bolum2"], learn: "AB bölgesi + hızlı web erişimi → Cloud Storage dual-region (Europe)", learnEn: "EU region + fast web access → Cloud Storage dual-region (Europe)" },
  { id: 380, text: "In terms of Dockers and Kubernetes, which of the following statements are correct?", options: { A: "Kubernetes uses Docker to deploy, manage, and scale containerized applications.", B: "Difference between Docker and Kubernetes relates to the role each play in containerizing and running your applications", C: "Kubernetes can be used with or without Docker.", D: "All of the above." }, correct: ["D"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Docker + Kubernetes → container deploy, yönetim ve ölçekleme için birlikte kullanılır", learnEn: "Docker + Kubernetes → used together for container deployment and management" },
  { id: 381, text: "In Google Cloud IAM: if a policy applied at the project level gives you Owner permissions, your access to an individual resource in that project might be restricted to View permission if someone applies a more restrictive policy directly to that resource. Which option is correct?", options: { A: "False", B: "None of the above.", C: "True", D: "Not defined by GCP." }, correct: ["A"], groups: ["son1", "son2", "son3"], learn: "IAM politikası üst düzeyden miras alınır, aşağıdan kısıtlanamaz (False)", learnEn: "IAM policy inherited top-down, cannot be restricted from below (False)" },
  { id: 382, text: "Your customer is moving to Google Cloud. They have many teams, each working on many projects. How should they organize resources?", options: { A: "Let each team have one shared Folder with multiple Projects within it so that there is a separation of concerns.", B: "Let each Project have one Folder so that there is a clear separation of concerns.", C: "Let each team have an Organization so that they can entirely manage themselves with their own identity.", D: "Let each team have one shared Project so that it is easy to manage." }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Takım → Folder, projeler altında", learnEn: "Team → Folder, projects underneath" },
  { id: 383, text: "Considering Google Cloud Storage's different options, which of the following is/are correct on the basis of their real world use cases?", options: { A: "Cloud Storage: Images, Large Media, files, backups.", B: "Google Cloud BigTable: AdTech, Financial and IoT Data.", C: "Cloud SQL: User Credentials, customer orders.", D: "All of the Above." }, correct: ["D"], groups: ["bolum3", "son2", "son3"], learn: "Cloud Storage: medya/yedek | Bigtable: IoT/finans | Cloud SQL: kullanıcı/sipariş", learnEn: "Cloud Storage: media/backup | Bigtable: IoT/finance | Cloud SQL: users/orders" },
  { id: 384, text: "The government has mandated that companies in a particular section of healthcare must retain all the data they collect for a period of 10 years in case an audit needs to be done. Your client, who is in that industry, needs to follow regulations. In addition, your client wants to do an analysis of the data quite frequently in the first year. They also don't want to be liable for any data beyond year 10. What would you recommend for your customer?", options: { A: "Use Cloud Storage with nearline storage in year one and Coldline storage thereafter. Use Object lifecycle management to move between storage types and delete them after 10 years.", B: "Use Cloud Storage with standard storage in year one and Coldline storage thereafter. Set a Cloud Scheduler trigger for 1 year to change storage types and 10 years to delete the data.", C: "Use Cloud Storage with standard storage in year one and archival storage thereafter. Use Object lifecycle management to move between storage types and delete them after 10 years.", D: "Use Cloud Storage with standard storage in year one and Coldline storage thereafter. Set a Cloud Tasks trigger for 1 year to change storage types and 10 years to delete the data." }, correct: ["C"], groups: ["bolum2"], learn: "1 yıl sık erişim + 10 yıl saklama + lifecycle yönetimi → Standard + Archive + lifecycle", learnEn: "1 year frequent access + 10 year retention + lifecycle → Standard + Archive + lifecycle mgmt" },
  { id: 385, text: "You are discussing scaling requirements with a gaming company. When the game launches, they are expecting incoming data surges of 2 million users or more during weekends and holidays. Their on-premise systems have had issues scaling and they want your advice on solving the issue. What do you recommend?", options: { A: "Either Compute Engine VMs or Kubernetes nodes work, but it is better to keep a buffer of an extra 2 million users.", B: "We can deploy a Pub/Sub to ingest data which will grow to absorb demand and pass it on to other stages.", C: "We will allocate Compute Engine VMs estimating 80% capacity of 2 million users.", D: "We will allocate Kubernetes nodes estimating 80% capacity of 2 million users." }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Büyük veri artışı + kapasitesiz on-prem → Pub/Sub ile asenkron ingestion", learnEn: "Large data surge + no on-prem capacity → Pub/Sub for async ingestion" },
  { id: 386, text: "What type of cloud computing service provides raw compute, storage, and network, organized in ways that are familiar to physical data centers?", options: { A: "Database as a Service.", B: "Platform as a Service.", C: "Infrastructure as a Service.", D: "Software as a Service." }, correct: ["C"], groups: ["bolum3"], learn: "Ham compute/storage/network = IaaS", learnEn: "Raw compute/storage/network = IaaS" },
  { id: 387, text: "You are looking for a one stop reference page for GCP support. What page would you select?", options: { A: "Compliance Hub", B: "Google Cloud Platform Status", C: "Support Hub", D: "Pricing Page" }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "GCP destek tek referans sayfası → Support Hub", learnEn: "GCP support single reference page → Support Hub" },
  { id: 388, text: "What load balancer type is supported with Cloud Armor security policies?", options: { A: "SSL Proxy, HTTP(S) and SSL", B: "HTTP(S) and SSL", C: "Regional SSL", D: "HTTP(S) Only" }, correct: ["D"], groups: ["bolum2", "son2"], learn: "Cloud Armor → sadece HTTP(S) load balancer destekler", learnEn: "Cloud Armor → supports HTTP(S) load balancer only" },
  { id: 389, text: "Compute Engine provides machine type recommendations to help you optimize the resource utilization of your virtual machine (VM) instances. What is this capability called?", options: { A: "App Engine", B: "None of the above", C: "Rightsizing Recommendations", D: "Recommendation Engine" }, correct: ["C"], groups: ["bolum2", "son2"], learn: "VM kaynak optimizasyonu önerisi → Rightsizing Recommendations", learnEn: "VM resource optimization recommendations → Rightsizing Recommendations" },
  { id: 390, text: "All Google Cloud Platform services are associated with a project that is used to provide what functions?", options: { A: "Manage Container Deployments", B: "Enable Services and APIs", C: "Manage DNS Services", D: "None of the Above" }, correct: ["B"], groups: ["bolum2", "son2", "son3"], learn: "GCP proje işlevi → API ve servisleri etkinleştirme", learnEn: "GCP project function → enable APIs and services" },
  { id: 391, text: "Cloud Data Loss Prevention (DLP) is a fully managed service designed to help discover, classify, and protect the most sensitive data. DLP provides three key features. (Select Three Answers)", options: { A: "Classification", B: "De-identification", C: "De-classification", D: "Inspection", E: "Reinspection" }, correct: ["A", "B", "D"], groups: ["bolum3", "son1"], learn: "DLP üç özellik: sınıflandırma + tanımsızlaştırma + inceleme", learnEn: "DLP three features: classification + de-identification + inspection" },
  { id: 392, text: "A developer in your IT team is creating a bucket on Cloud Storage. He is receiving an error that the bucket name already exists. He has checked his project and the few other projects in the organization. The name seems to be entirely unique. What would be the issue?", options: { A: "Bucket names ignore any \".\" in the name. Look for a similar bucket name.", B: "Previously deleted bucket names in the same project cannot be reused. There must have been an older bucket with the same name.", C: "Bucket names in Cloud Storage have to be globally unique", D: "Bucket names are case insensitive - look for a bucket name in your org that has a different capitalization." }, correct: ["C"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Cloud Storage bucket adları → global unique olmalı", learnEn: "Cloud Storage bucket names → must be globally unique" },
  { id: 393, text: "Your company has signed up with a cloud provider and you will be using storage and virtual machines with the provider. The provider has provided your organization some expectations for what the service should perform at. What type of agreement provides a guarantee of a certain level of service such as \"Uptime\"?", options: { A: "Performance Agreement", B: "Interconnection Agreement", C: "Warranty", D: "Service Level Agreement" }, correct: ["D"], groups: ["bolum3", "son1", "son2"], learn: "Uptime garantisi sözleşmesi → SLA", learnEn: "Uptime guarantee contract → SLA" },
  { id: 394, text: "Which of the following are the current options for paid support in GCP? (Select Three Answer)", options: { A: "Premier", B: "Standard", C: "Enhanced", D: "Role", E: "Premium" }, correct: ["B", "C", "E"], groups: ["bolum3", "son1"], learn: "Ücretli GCP destek: Standard + Enhanced + Premium", learnEn: "Paid GCP support tiers: Standard + Enhanced + Premium" },
  { id: 395, text: "What cloud service model would you want to select if you want to solve a particular business problem by providing CRM services in the cloud to your enterprises?", options: { A: "CaaS", B: "SaaS", C: "PaaS", D: "IaaS" }, correct: ["B"], groups: ["bolum3", "son1"], learn: "CRM bulut servisi → SaaS", learnEn: "CRM cloud service → SaaS" },
  { id: 396, text: "App Engine has been deployed in your customer's GCP cloud deployment. The customer would like to know more about the benefits of App Engine Flexible. Please advise them on the benefits of App Engine Flexible. (Select Two Answers)", options: { A: "Supports autoscaling", B: "Supports Docker containers", C: "Supports mainframe connectivity", D: "Source code is written in specific versions of the supported programming languages only" }, correct: ["A", "B"], groups: ["bolum3", "son1", "son2", "son3"], learn: "App Engine Flexible: autoscaling + Docker container desteği", learnEn: "App Engine Flexible: autoscaling + Docker container support" },
  { id: 397, text: "A startup client of yours does offline data processing for a few of its clients. They are migrating their applications and the associated data to Google Cloud. They have 100TB of data to move. They presently have a very small private data center setup connected to a local internet provider. The maximum bandwidth they are able to get is 100Mbps. How long will it take them to transfer the data over the internet if the transfer goes smoothly?", options: { A: "About 12 days.", B: "About 2 years.", C: "About 100 days." }, correct: ["C"], groups: ["bolum2", "son2", "son3"], learn: "100 TB, 100 Mbps → yaklaşık 100 gün sürer", learnEn: "100 TB at 100 Mbps → approximately 100 days" },
  { id: 398, text: "A small scale retailer has been collecting its point of sale transactions in a PostgreSQL Database. They have raised funding for a strategic expansion goal in the next year that will see them grow significantly in Asia, Europe, North America. Which Database option should they choose in Google Cloud?", options: { A: "BigQuery", B: "Spanner", C: "Cloud SQL", D: "Bigtable" }, correct: ["B"], groups: ["bolum1"], learn: "PostgreSQL → global büyüme → Cloud Spanner", learnEn: "PostgreSQL → global growth → Cloud Spanner" },
  { id: 399, text: "A customer deploys an application to App Engine and needs to check for Open Web Application Security Project (OWASP) vulnerabilities. Which service should be used to accomplish this?", options: { A: "Cloud Armor", B: "Cloud Security Scanner", C: "Binary Authorization", D: "Forseti Security" }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "OWASP açıkları → Cloud Security Scanner", learnEn: "OWASP vulnerability scanning → Cloud Security Scanner" },
  { id: 400, text: "Google Cloud Platform (GCP) provides three main compliance resource webpages. What are they? (Select Three Answer)", options: { A: "Compliance Reports Manager", B: "Support Hub", C: "Compliance Offerings", D: "GDPR Home Page", E: "TechCentral" }, correct: ["A", "C", "D"], groups: ["bolum3", "son1", "son2", "son3"], learn: "GCP compliance sayfaları: Compliance Reports Manager + Compliance Offerings + GDPR", learnEn: "GCP compliance pages: Compliance Reports Manager + Compliance Offerings + GDPR" },
  { id: 401, text: "What cloud deployment model is generally deployed between organizations such as non-profits, hospitals or even enterprises that share similar requirements or interests?", options: { A: "Hybrid", B: "Community", C: "Private", D: "Public" }, correct: ["B"], groups: ["bolum3", "son1"], learn: "Benzer çıkarlı organizasyonlar arası paylaşımlı cloud → Community Cloud", learnEn: "Cloud shared by organizations with similar interests → Community Cloud" },
  { id: 402, text: "What service is a fully managed real-time messaging service that allows you to send and receive messages between independent applications?", options: { A: "Cloud Datastore", B: "Cloud Pub/Sub", C: "Cloud DNS", D: "Cloud BigTable", E: "Cloud Spanner" }, correct: ["B"], groups: ["bolum2", "bolum3", "son1", "son2"], learn: "Gerçek zamanlı mesajlaşma servisi → Cloud Pub/Sub", learnEn: "Real-time messaging service → Cloud Pub/Sub" },
  { id: 403, text: "A customer is migrating their on-premises data analytics solution to Google Cloud. The current solution has a lot of data being read from and written to disk. The performance of this approach has occasionally been a bottleneck for the scale of operations that your customer has. The application is fault tolerant and can withstand machines going down frequently. In moving to Google Cloud they are asking your advice on any way to improve performance. What do you recommend?", options: { A: "Use BigQuery which has very fast data access and analysis", B: "Use Cloud Storage which can be central, scalable storage", C: "Use local SSDs with the VMs", D: "Use Persistent Disk with the VMs" }, correct: ["C"], groups: ["bolum2", "son2", "son3"], learn: "Disk yoğun + fault tolerant → Local SSD (en hızlı)", learnEn: "Disk-intensive + fault-tolerant → Local SSD (fastest)" },
  { id: 404, text: "Virtual Machine vCPU and memory usage for each of these categories can receive one of the following discounts? (Select Three Answer)", options: { A: "Military Discounts", B: "Spot Instances", C: "Committed-Use", D: "Sustained-Use", E: "Preemptible VMs" }, correct: ["C", "D", "E"], groups: ["bolum3", "son1", "son2"], learn: "VM indirim türleri: Committed-Use + Sustained-Use + Preemptible", learnEn: "VM discount types: Committed-Use + Sustained-Use + Preemptible" },
  { id: 405, text: "Your customer is moving from AWS to Google Cloud. Data also needs to be moved. There is about 50TB of data. On AWS, the data resides in an S3 bucket. It is going to be moved to Cloud Storage. Data is also being continuously generated on S3 prior to the cutover. It is preferable that this is also periodically transferred. What is the best way to move the data?", options: { A: "Use the gsutil command-line option", B: "Use the Google Cloud console to drag and drop the files easily", C: "Use the Storage Transfer Service", D: "Use a Transfer Appliance" }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "AWS S3 → GCP Cloud Storage → Storage Transfer Service", learnEn: "AWS S3 → GCP Cloud Storage → Storage Transfer Service" },
  { id: 406, text: "Which of the following statements describe the features of a preemptible VM instance? (Select Three Answer)", options: { A: "Instance is alive for no more than 12 hours", B: "Can be pre-empted with a 30 minute notice", C: "Can be pre-empted with a 30 second notice", D: "Discounted Significantly", E: "Instance is alive for no more than 24 hours", F: "Can use free tier credits" }, correct: ["C", "D", "E"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Preemptible VM: 30 sn uyarı + önemli indirim + max 24 saat", learnEn: "Preemptible VM: 30 sec warning + significant discount + max 24 hours" },
  { id: 407, text: "Your customer's organization has decided to move to the cloud. They currently run VMs on-premise but their goal on Google Cloud is to run containers, primarily on Google Kubernetes Engine. They have a lease for their private data center for another year that they have already paid for. What strategy could they adopt in migrating?", options: { A: "Jump and Ramp.", B: "Improve and Move.", C: "Rip and Replace.", D: "Lift and Shift." }, correct: ["B"], groups: ["bolum3"], learn: "VM'den container hedefi + var olan lease → Improve and Move", learnEn: "From VMs to container goal + existing lease → Improve and Move" },
  { id: 408, text: "A customer has their current SAP systems using Microsoft SQL Server as the Database. They are migrating to Google Cloud and also preparing to later migrate to the latest version of SAP. The entire IT team is being directed to focus on the migration to the new version of SAP. The new version of SAP does not use Microsoft SQL Server as the Database. Any but the most critical IT management tasks are being deprioritized. How should they migrate their current database to Google Cloud?", options: { A: "Spanner", B: "Bare Metal", C: "BigQuery", D: "Cloud SQL" }, correct: ["D"], groups: ["bolum3"], learn: "SAP + kritik olmayan DB yönetimi + kolaylık → Cloud SQL", learnEn: "SAP + non-critical DB management + ease → Cloud SQL" },
  { id: 409, text: "Your customer's organization has decided to move to the cloud. They currently run VMs on-premise but their goal on Google Cloud is to run containers, primarily on Google Kubernetes Engine. They have a lease for their private data center for another year that they have already paid for. What strategy could they adopt in migrating?", options: { A: "Jump and Ramp.", B: "Improve and Move.", C: "Rip and Replace.", D: "Lift and Shift." }, correct: ["B"], groups: ["bolum3"], learn: "VM'den container hedefi + mevcut lease → Improve and Move", learnEn: "From VMs to container goal + existing lease → Improve and Move" },
  { id: 410, text: "An organization wants to leverage cloud technologies but is concerned about vendor lock-in. What would mitigate this concern?", options: { A: "Open standards", B: "Database services", C: "Service level agreements", D: "Scalable infrastructure" }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Vendor lock-in önleme → Open standards", learnEn: "Prevent vendor lock-in → Open standards" },
  { id: 411, text: "What is a benefit of Google's purpose-built servers compared to standard servers?", options: { A: "They run software that cannot be deployed on standard servers.", B: "They are cheaper to build than standard servers.", C: "They are optimized for specific tasks making them more efficient.", D: "They are backward compatible with legacy disk drives." }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Google'ın özel sunucuları → spesifik görevler için optimize edilmiş", learnEn: "Google's purpose-built servers → optimized for specific tasks" },
  { id: 412, text: "An organization needs a flexible and scalable NoSQL database with strong web and mobile application support. Which Google Cloud product or service should the organization use?", options: { A: "BigQuery", B: "Cloud Storage", C: "Cloud Spanner", D: "Firestore" }, correct: ["C"], groups: ["bolum1"], learn: "Esnek + ölçeklenir + NoSQL + web/mobil → Firestore", learnEn: "Flexible + scalable + NoSQL + web/mobile → Firestore" },
  { id: 413, text: "In Google's cloud security model, how does availability contribute to a robust security posture for data?", options: { A: "By ensuring data is reliable and accessible", B: "By restricting data access to authorized users", C: "By ensuring data meets industry standards", D: "By checking that data is accurate and trustworthy" }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Güvenlik duruşunda availability → verinin güvenilir ve erişilebilir olması", learnEn: "Availability in security → ensures data is reliable and accessible" },
  { id: 414, text: "An organization is developing applications by using Kubernetes. They want their teams to spend more time developing rather than managing clusters. Which Google Cloud service should the organization choose?", options: { A: "GKE Standard", B: "Cloud Run", C: "GKE Autopilot", D: "Compute Engine" }, correct: ["C"], groups: ["bolum2", "son1", "son2"], learn: "Kubernetes + cluster yönetimi azalt → GKE Autopilot", learnEn: "Kubernetes + reduce cluster management → GKE Autopilot" },
  { id: 415, text: "An information security organization must ensure that its service providers have ISO 27001 certification. They must also access supporting documentation. Which Google Cloud tool should they use?", options: { A: "Network Intelligence Center", B: "Security Command Center", C: "Compliance Reports Manager", D: "Cloud Monitoring" }, correct: ["C"], groups: ["bolum2", "son2", "son3"], learn: "ISO 27001 sertifikası + belgeler → Compliance Reports Manager", learnEn: "ISO 27001 certificate + documentation → Compliance Reports Manager" },
  { id: 416, text: "An organization wants to transfer some of its data from Google Cloud. Which of these statements is true?", options: { A: "Customer data may not be transferred out of Google Cloud", B: "Outgoing data transfer must be enabled in the Google Cloud console.", C: "A technical support ticket must be raised with the correct department", D: "Customers have full control of their data and may transfer it at any time" }, correct: ["D"], groups: ["bolum2", "son2", "son3"], learn: "Müşteri verisi → istediği zaman transfer edebilir (tam kontrol)", learnEn: "Customer data → customer has full control and can transfer at any time" },
  { id: 417, text: "An organization is transforming their raw data into a format that can be used to derive business insights. Which step of the data value chain does this action represent?", options: { A: "Data collection", B: "Data storage", C: "Data processing", D: "Data analysis" }, correct: ["C"], groups: ["bolum2", "son1", "son2"], learn: "Ham veriyi kullanılabilir formata dönüştürme → Data processing adımı", learnEn: "Converting raw data to usable format → Data processing step" },
  { id: 418, text: "An organization needs to increase the speed at which they can train machine learning models. Which domain-specific hardware is designed for this task?", options: { A: "Bare Metal Solution", B: "Containers", C: "Cloud TPUs", D: "Preemptible or Spot VMs" }, correct: ["C"], groups: ["bolum1", "bolum2", "son2", "son3"], learn: "ML eğitimi hızlandırma → Cloud TPUs", learnEn: "Speed up ML model training → Cloud TPUs" },
  { id: 419, text: "Customers are reporting very high latencies when accessing an application from the United States. The application is currently running in a single region in Europe. What should the organization do?", options: { A: "Run a replica of the application in a region in the United States.", B: "Run the application in additional regions in Europe.", C: "Run the application in additional zones in the European region.", D: "Set up a new billing account in the United States." }, correct: ["A"], groups: ["bolum2", "son2", "son3"], learn: "ABD'den yüksek gecikme + Avrupa'da host → ABD'de replica aç", learnEn: "High latency from US + hosted in Europe → deploy replica in US region" },
  { id: 420, text: "An organization is running Kubernetes applications across multiple cloud environments. They want a consistent and centralized management platform. Which service should they choose?", options: { A: "Cloud Run", B: "Compute Engine", C: "GKE Enterprise", D: "Cloud Functions" }, correct: ["C"], groups: ["bolum2", "son2"], learn: "Çoklu cloud'da K8s yönetimi → GKE Enterprise", learnEn: "Multi-cloud Kubernetes management → GKE Enterprise" },
  { id: 421, text: "An organization has migrated all workloads to the cloud and is reviewing their cloud security posture. Who is now responsible for securing the physical infrastructure of the data centers?", options: { A: "The organization", B: "Third-party security service providers", C: "The cloud service provider", D: "The organization and the cloud service provider" }, correct: ["A"], groups: ["bolum2", "son3"], learn: "Fiziksel datacenter güvenliği → cloud provider sorumluluğu", learnEn: "Physical data center security → cloud provider's responsibility" },
  { id: 422, text: "An organization wants to build a data pipeline to transform its data so it can be reconciled in a data warehouse. The solution must be scalable and require little or no management. Which Google product or service should the organization choose?", options: { A: "Dataflow", B: "Pub/Sub", C: "Cloud Storage", D: "Cloud Bigtable" }, correct: ["A"], groups: ["bolum3"], learn: "ETL + veri ambarı + yönetim yok + ölçeklenebilir → Dataflow", learnEn: "ETL + data warehouse + no management + scalable → Dataflow" },
  { id: 423, text: "An organization is struggling to meet user demand for change and wants to modernize their legacy applications by moving the applications to the cloud. Why would this help the organization satisfy user expectations?", options: { A: "Toil automation helps make automatic updates", B: "DevOps requires that industry trends be measured and tracked", C: "Updates can be pushed out more quickly to repair bugs", D: "Customer data can be used to offer tailored content" }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Kullanıcı beklentisi: hızlı güncelleme → bulutta hızlı bug düzeltme", learnEn: "User expectation: fast updates → cloud enables faster bug fixes" },
  { id: 424, text: "What is a benefit of the OpEx model for cloud security?", options: { A: "Organizations do not need to make upfront capital investments in cloud security.", B: "Organizations can deploy custom security hardware.", C: "Organizations do not need to configure any security settings for cloud resources.", D: "The cloud provider guarantees security." }, correct: ["A"], groups: ["bolum2", "son2", "son3"], learn: "OpEx güvenlik avantajı → upfront sermaye yatırımı gerekmez", learnEn: "OpEx security benefit → no upfront capital investment in security" },
  { id: 425, text: "An organization wants to access a software application from a cloud vendor without the need to manage their own servers or write their own code. Which service model does this represent?", options: { A: "Infrastructure as a service", B: "Platform as a service", C: "Software as a service", D: "Functions as a service" }, correct: ["C"], groups: ["bolum3"], learn: "Sunucu yönetimi yok + kod yazma yok → SaaS", learnEn: "No server management + no code writing → SaaS" },
  { id: 426, text: "An organization wants to lease the resources they need for their customized servers from a cloud provider on a pay-as-you-go basis, instead of paying one time for hardware. Which service model should they use?", options: { A: "Hybrid cloud", B: "Software as a service", C: "Infrastructure as a service", D: "Platform as a service" }, correct: ["C"], groups: ["bolum3"], learn: "Özelleştirmiş sunucu kiralama → IaaS", learnEn: "Lease customized servers on pay-as-you-go → IaaS" },
  { id: 427, text: "What is the benefit of using a serverless data processing pipeline service?", options: { A: "Full control over compute resources is provided.", B: "Processed data will not require analysis.", C: "Pipeline infrastructure is fully managed and scalable.", D: "Processed data is guaranteed to be free of errors." }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Sunucusuz veri pipeline → altyapı tam yönetilen + ölçeklenebilir", learnEn: "Serverless data pipeline → fully managed and scalable infrastructure" },
  { id: 428, text: "What does the shift toward cloud computing represent for an organization's transformation?", options: { A: "An opportunity that is limited to large enterprises", B: "An opportunity to redefine existing business processes and services", C: "An opportunity that is only relevant to the IT department", D: "An opportunity to continue business as usual with new cost savings" }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Bulut dönüşümü → mevcut iş süreçlerini yeniden tanımlama fırsatı", learnEn: "Cloud computing shift → opportunity to redefine business processes" },
  { id: 429, text: "What is the typical cloud spending behavior of most organizations?", options: { A: "Decentralized and variable", B: "Centralized and variable", C: "Decentralized and fixed", D: "Centralized and fixed" }, correct: ["A"], groups: ["bolum2", "son3"], learn: "Bulut harcaması → merkezi olmayan ve değişken", learnEn: "Cloud spending → typically decentralized and variable" },
  { id: 430, text: "An organization has started to develop cloud-native applications to replace their legacy applications. What else should the organization do to adopt the cloud?", options: { A: "Provide privileged cloud network access to third-party partners.", B: "Migrate some of their legacy infrastructure to the cloud.", C: "Conduct maintenance on their legacy hardware.", D: "Increase CapEx on existing projects." }, correct: ["B"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Cloud-native yeni uygulamalar + mevcut legacy altyapı → ikisini birden kullan", learnEn: "Cloud-native new apps + existing legacy infrastructure → migrate some legacy too" },
  { id: 431, text: "When is data automatically encrypted in Google Cloud?", options: { A: "When it is in transit only.", B: "When it is at rest and in transit.", C: "Data is not automatically encrypted by default.", D: "When it is at rest only." }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Google Cloud → hem rest hem transit'te otomatik şifreleme", learnEn: "Google Cloud → automatic encryption both at rest and in transit" },
  { id: 432, text: "An organization is concerned about the unlikely event that Google Cloud infrastructure is physically accessed by someone with malicious intent. How is data protected in Google Cloud?", options: { A: "Data is immediately deleted whenever an intrusion is detected.", B: "Data is stored on quantum computers with unbreakable encryption.", C: "Data is stored using robust encryption.", D: "Data is stored in random locations around the world to prevent it being found." }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Fiziksel saldırıya karşı veri → güçlü şifreleme ile korunur", learnEn: "Protection against physical access → data stored using robust encryption" },
  { id: 433, text: "How does Google Cloud AI Hub make machine learning easy and accessible for Google Cloud customers to get started?", options: { A: "It deploys artificial intelligence models in real time", B: "It automatically codes users' machine learning models", C: "It automatically sources and prepares users' machine learning data", D: "It includes a repository of plug-and-play artificial intelligence tools" }, correct: ["D"], groups: ["bolum2", "son2", "son3"], learn: "AI Hub → hazır AI araçları deposu (plug-and-play)", learnEn: "AI Hub → repository of plug-and-play AI tools" },
  { id: 434, text: "An organization suffers a major data leak only six months after upgrading its security system. What should the organization do to ensure long-term security?", options: { A: "Extend data retention policy lengths to at least seven years.", B: "Pay more to get the best security system available on the market.", C: "Hire cybersecurity experts to further develop their data security plan", D: "Wait for a more advanced security system to be released" }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Uzun vadeli güvenlik → cybersecurity uzmanları ile plan geliştir", learnEn: "Long-term security → hire cybersecurity experts to develop security plan" },
  { id: 435, text: "An organization is using Compute Engine and wants to receive sustained-use discounts. What should the organization do?", options: { A: "Choose preemptible or spot instances when creating virtual machines.", B: "Choose low-powered virtual machines.", C: "Nothing. Sustained use discounts are automatically applied.", D: "Commit to virtual machine usage for a one or three-year period." }, correct: ["B"], groups: ["bolum2", "son2", "son3"], learn: "Sustained use discount → VM çalıştıkça otomatik uygulanır", learnEn: "Sustained use discount → automatically applied as VM runs" },
  { id: 436, text: "A public cloud provider's service level performance has moved below the service level objective (SLO), but remains above the service level agreement (SLA). What is an outcome of this change in service level performance?", options: { A: "The public cloud provider is encouraged to push out new updates", B: "The public cloud provider is encouraged to prioritize service reliability", C: "End users face unexpected or prolonged downtime", D: "End users face a decrease in service latency" }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "SLO altında ama SLA üstünde → provider servis güvenilirliğine odaklanır", learnEn: "Below SLO but above SLA → provider prioritizes service reliability" },
  { id: 437, text: "Which scenario uses machine learning to unlock business value from unstructured data?", options: { A: "Analyzing tabular records of product defects to predict future maintenance cycles.", B: "Recommending new products based on previous purchases.", C: "Monitoring financial transactions to identify potential fraud and risk.", D: "Determining customer sentiments from call voice recordings." }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Yapısal olmayan veriden ML değer → ses kaydından duygu analizi", learnEn: "ML value from unstructured data → sentiment analysis from voice recordings" },
  { id: 438, text: "An organization is developing a new container-based application. They do not know how popular the application will be when launched and they do not want to pay for idle infrastructure resources. Which benefit of serverless computing will address this concern?", options: { A: "Disaster recovery", B: "Reduced development costs", C: "Scalability", D: "Built-in security" }, correct: ["C"], groups: ["bolum3", "son2", "son3"], learn: "Container + boşta kaynak istememe → serverless scalability", learnEn: "Container + no idle resource cost → serverless scalability" },
  { id: 439, text: "An international law firm needs their HR application to be able to share and access varying amounts of sensitive data across their branch offices. Why would using Cloud Storage be beneficial for them?", options: { A: "It stores geographically dispersed copies of data to prevent loss.", B: "It offers an affordable upgrade that enables data encryption.", C: "It randomly allocates data to different storage locations to protect against threats.", D: "It has a low minimum storage amount requirement." }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Coğrafi dağıtık + kayıp önleme → Cloud Storage (çoğaltılmış kopya)", learnEn: "Geographically dispersed + prevent loss → Cloud Storage (replicated copies)" },
  { id: 440, text: "An organization has petabytes of data gathered from a wide range of sources. They want to use the data for strategic analysis and to guide business decisions. What type of service should they use?", options: { A: "Multi cloud environment", B: "Virtual machine environment", C: "Hybrid cloud environment", D: "Container environment" }, correct: ["C"], groups: ["bolum2", "son2", "son3"], learn: "PB veri + stratejik analiz → Hybrid cloud ortamında analiz", learnEn: "Petabytes of data + strategic analysis → Hybrid cloud environment" },
  { id: 441, text: "What is an example of unstructured data?", options: { A: "Historical stock inventory", B: "Product ratings", C: "Customer orders", D: "Call center transcripts" }, correct: ["D"], groups: ["bolum1", "bolum2", "son1", "son2", "son3"], learn: "Yapısal olmayan veri örneği → çağrı merkezi transkriptleri", learnEn: "Unstructured data example → call center transcripts" },
  { id: 442, text: "What is a defining feature of a non-relational database?", options: { A: "Reporting across multiple data sources", B: "A strictly enforced schema", C: "A flexible data model", D: "Queries that join multiple tables" }, correct: ["C"], groups: ["bolum1", "bolum2", "son1", "son2", "son3"], learn: "Non-relational DB → esnek veri modeli (şema zorunlu değil)", learnEn: "Non-relational database → flexible data model (schema not enforced)" },
  { id: 443, text: "What kind of architecture does a hybrid cloud offer organizations?", options: { A: "A combination of different virtualized servers", B: "A combination of serverless computing and public cloud services", C: "A combination of private cloud infrastructure and public cloud services", D: "A combination of multiple public cloud provider services" }, correct: ["C"], groups: ["bolum2", "son2", "son3"], learn: "Hybrid cloud → private + public cloud kombinasyonu", learnEn: "Hybrid cloud → combination of private cloud infrastructure + public cloud services" },
  { id: 444, text: "Within Google's Site Reliability Engineering framework, which concept measures how well a system is performing?", options: { A: "Service-level agreement", B: "Service-level indicator", C: "Error reporting", D: "Service-level objective" }, correct: ["B"], groups: ["bolum2", "son2"], learn: "SRE'de sistem performans ölçümü → SLI (Service Level Indicator)", learnEn: "SRE system performance measurement → SLI (Service Level Indicator)" },
  { id: 445, text: "Which scenario is a good use case for machine learning?", options: { A: "Classifying data with no prior examples", B: "Tasks that require human experience and intuition", C: "Creating customer recommendations", D: "Solving ethical dilemmas" }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "ML iyi kullanım senaryosu → müşteri önerileri", learnEn: "Good ML use case → creating customer recommendations" },
  { id: 446, text: "An organization has migrated several large databases to the cloud. It wants to increase the value of its data, improve cost controls and strengthen regulatory compliance. What should the organization do?", options: { A: "Delete data stored for over a year.", B: "Export relational data to modern NoSQL databases.", C: "Create monthly reports on data access and usage.", D: "Establish an effective data governance program." }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Veri yönetimi + maliyet + compliance → veri yönetişim programı", learnEn: "Data management + cost + compliance → establish data governance program" },
  { id: 447, text: "An organization is concerned about their cloud costs. They want to be informed when their spending exceeds a specific threshold, rather than waiting to see their bill at the end of the month. What should the organization do?", options: { A: "Pause virtual machines during non-business hours.", B: "Configure a budget threshold rule and alert.", C: "Adjust project resource quota policies.", D: "Use historical cost data to predict future overspend." }, correct: ["B"], groups: ["bolum2", "bolum3", "son1", "son2", "son3"], learn: "Maliyet aşımı uyarısı → Budget threshold rule", learnEn: "Cost threshold alerts → configure budget threshold rule and alert" },
  { id: 448, text: "How does the legal concept of data sovereignty affect data?", options: { A: "Data is subject to the laws and regulations of the country where it resides.", B: "A country has the right to access the data generated within its borders.", C: "An individual has the right to control their personal data.", D: "Data must always be encrypted in transit and at rest." }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Veri egemenliği → verinin bulunduğu ülkenin yasalarına tabi", learnEn: "Data sovereignty → data subject to laws of the country where it resides" },
  { id: 449, text: "A vacation home rental organization wants to predict the popularity of properties in their upcoming busy season. They do not have a data science team, and want to use their in-house database administration skills to create a machine learning model. What should the organization do?", options: { A: "Use custom training in Vertex AI with TensorFlow.", B: "Integrate pre-trained APIs into their application.", C: "Use BigQuery ML and create models using SQL.", D: "Build a model in AutoML using labeled data." }, correct: ["C"], groups: ["bolum1", "bolum2", "son2", "son3"], learn: "DB yeteneği + ML modeli → BigQuery ML (SQL ile)", learnEn: "DB skills + ML model → BigQuery ML (SQL-based)" },
  { id: 450, text: "An organization is looking for a solution that will allow them to build new applications, modernize old ones, and run applications across different cloud providers. What solution should the organization use?", options: { A: "Apigee Hybrid", B: "Anthos", C: "Cloud Run", D: "Compute Engine" }, correct: ["B"], groups: ["bolum1"], learn: "Çoklu cloud + yeni+eski uygulama + platform bağımsız → Anthos", learnEn: "Multi-cloud + new and legacy apps + platform-agnostic → Anthos" },
  { id: 451, text: "An organization wants to run their custom application in the cloud in a flexible and scalable way without managing any infrastructure. Which service model should they use?", options: { A: "Infrastructure as a service", B: "Platform as a service", C: "Software as a service", D: "Network as a service" }, correct: ["B"], groups: ["bolum3"], learn: "Altyapı yönetimi yok + özelleştirme → PaaS", learnEn: "No infrastructure management + customization → PaaS" },
  { id: 452, text: "An organization with a commissions-based business model is struggling to predict cloud costs due to fluctuating revenue. How can the organization optimize the use of their cloud resources?", options: { A: "By applying intelligent recommendations", B: "By decentralizing financial decision making", C: "By sharing project ownership across all teams", D: "By increasing their capital expenditure" }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Değişken gelir + bulut optimizasyonu → intelligent recommendations", learnEn: "Variable revenue + cloud optimization → intelligent recommendations" },
  { id: 453, text: "An organization wants a serverless execution environment for building and connecting cloud services. They can't predict how many resources they'll need. Which Google Cloud solution should they use?", options: { A: "Compute Engine", B: "Google Kubernetes Engine", C: "Cloud Functions", D: "Bare Metal Solution for SAP" }, correct: ["C"], groups: ["bolum1", "son1", "son2", "son3"], learn: "Sunucusuz + event-driven + kaynak tahmini yok → Cloud Functions", learnEn: "Serverless + event-driven + no resource prediction → Cloud Functions" },
  { id: 454, text: "What DevOps practice should an organization use when developing their application to help minimize disruption caused by bugs?", options: { A: "Pause production until all bugs have been eliminated", B: "Prioritize fixing large bugs during production because they are easier to review", C: "Implement small changes incrementally to reduce recovery time when bugs appear", D: "Implement large changes together to make rolling back easier when bugs appear" }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "DevOps bug riski azaltma → küçük artımlı değişiklikler", learnEn: "DevOps bug risk reduction → implement small incremental changes" },
  { id: 455, text: "An organization is running SQL Server on-premises and is struggling with capacity and management overhead. They want to modernize this database quickly by using Google products or services. What should the organization do?", options: { A: "Refactor applications to use a cloud-first database like Firestore.", B: "Perform a managed database migration to Cloud SQL.", C: "Export old tables from SQL Server to Cloud Storage.", D: "Migrate all SQL Server data to BigQuery." }, correct: ["B"], groups: ["bolum3", "son3"], learn: "SQL Server → managed migration → Cloud SQL", learnEn: "SQL Server → managed migration → Cloud SQL" },
  { id: 456, text: "An organization has a small development team that has created a web application which runs in a single container. They need a simple, serverless, and scalable way to host their container. Which Google service should the organization use?", options: { A: "Compute Engine", B: "App Engine", C: "Kubernetes Engine", D: "Cloud Run" }, correct: ["D"], groups: ["bolum1"], learn: "Tek container + sunucusuz + basit host → Cloud Run", learnEn: "Single container + serverless + simple hosting → Cloud Run" },
  { id: 457, text: "An organization is looking for a business intelligence solution that allows individual employees and end users to analyze business data and generate insights. Which Google Cloud product or service should the organization use?", options: { A: "Cloud Spanner", B: "BigQuery", C: "Looker", D: "Dataflow" }, correct: ["C"], groups: ["bolum3"], learn: "BI + son kullanıcı analizi → Looker", learnEn: "BI + end-user analysis → Looker" },
  { id: 458, text: "When customer data is uploaded to Google Cloud, who owns the data?", options: { A: "A third party", B: "The customer and Google share ownership", C: "Google", D: "The customer" }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Buluttaki müşteri verisi → müşteriye aittir", learnEn: "Data uploaded to Google Cloud → owned by the customer" },
  { id: 459, text: "An organization is concerned about the risk of data loss that may occur due to hardware failures or cyber attacks. They want to restore their systems to a previous state if such an event occurs. What should the organization do?", options: { A: "Set service level objectives (SLOs).", B: "Use Cloud Monitoring.", C: "Back up data regularly.", D: "Enable autoscaling." }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Donanım hatası/siber saldırı → düzenli veri yedekleme", learnEn: "Hardware failure/cyber attack recovery → back up data regularly" },
  { id: 460, text: "An organization must identify and fix security vulnerabilities in its cloud infrastructure and applications. Which Google Cloud service should they use?", options: { A: "Security Command Center", B: "Google Cloud Armor", C: "Cloud Storage", D: "VPC networks" }, correct: ["A"], groups: ["bolum1", "son2"], learn: "Güvenlik açığı tespiti → Security Command Center", learnEn: "Identify and fix security vulnerabilities → Security Command Center" },
  { id: 461, text: "An organization needs to rapidly scale its use of computing resources and honor its commitment to environmental sustainability. What should the organization do?", options: { A: "Refactor application software to use less energy.", B: "Use a public cloud provider with energy-efficient data centers.", C: "Use a carbon-neutral energy provider for an existing on-premises data center.", D: "Purchase energy-efficient servers for an existing on-premises data center." }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Ölçekleme + sürdürülebilirlik → enerji verimli public cloud provider", learnEn: "Scaling + sustainability → public cloud provider with energy-efficient data centers" },
  { id: 462, text: "An organization is running critical workloads in production and requires a Google Cloud support service with fast response times and a dedicated Technical Account Manager. Which customer care service level should the organization choose?", options: { A: "Enhanced", B: "Basic", C: "Premium", D: "Standard" }, correct: ["C"], groups: ["bolum3"], learn: "Hızlı yanıt + TAM → Premium Support", learnEn: "Fast response + dedicated TAM → Premium Support" },
  { id: 463, text: "An organization stores backup files in Cloud Storage. The files will be accessed annually to test the disaster recovery plans. Which storage class is the most cost-effective?", options: { A: "Coldline class", B: "Standard class", C: "Nearline class", D: "Archive class" }, correct: ["A"], groups: ["bolum2", "bolum3", "son2"], learn: "Yıllık DR testi → Archive (en ucuz, nadiren erişim)", learnEn: "Annual DR test → Archive class (cheapest, infrequent access)" },
  { id: 464, text: "An organization has hired a team of data scientists and developers. They want to create unique value in their business by coding an advanced machine learning model in Vertex AI Workbench. Which service should the organization use to train the model?", options: { A: "Custom training", B: "AutoML", C: "Compute Engine", D: "Prebuilt APIs" }, correct: ["A"], groups: ["bolum2", "son2"], learn: "Özel ML kodu + Vertex AI → Custom training", learnEn: "Custom ML code + Vertex AI → Custom training" },
  { id: 465, text: "An organization is looking for a solution to help them build applications using their preferred programming language and tools. They also want to minimize time spent on infrastructure management. What solution should the organization use?", options: { A: "Cloud Run", B: "Dataproc", C: "Pub/Sub", D: "Bare Metal Solution" }, correct: ["B"], groups: ["bolum3"], learn: "Tercih dil/araç + minimum altyapı → Dataproc", learnEn: "Preferred language/tools + minimal infrastructure → Dataproc" },
  { id: 466, text: "What is generative AI?", options: { A: "A machine learning model for language translation", B: "A specific field of AI that can be used to create content", C: "An umbrella term that includes all types of machine learning algorithms", D: "An AI model for labeling images" }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Generative AI → içerik oluşturabilen AI alanı", learnEn: "Generative AI → specific AI field that can create content" },
  { id: 467, text: "An organization is deciding on the layout of their resource hierarchy in Google Cloud. They have several projects within a folder. What will happen when user access policies are applied to the folder?", options: { A: "The policy will be inherited by the projects in the folder but will not affect their resources.", B: "The policy will be inherited by the projects and their resources within the folder.", C: "The policy will be applied to all folders within the organization.", D: "The policy applies to the folder only, and will not be inherited by any projects." }, correct: ["B"], groups: ["bolum2", "son2", "son3"], learn: "Folder'a policy → altındaki proje ve kaynaklara miras geçer", learnEn: "Policy applied to folder → inherited by projects and resources within it" },
  { id: 468, text: "A real estate organization processes photos of properties uploaded by their agents to an internal application. They must manually check and remove photos that contain personally identifiable information like passports and credit cards. They want a solution that their developer can use to integrate with their app as quickly as possible. Which solution should they use?", options: { A: "Pre-trained APIs", B: "AutoML", C: "Custom training", D: "BigQuery" }, correct: ["A"], groups: ["bolum2"], learn: "PII içerik tespiti + hızlı entegrasyon → Pre-trained APIs", learnEn: "PII content detection + fast integration → Pre-trained APIs" },
  { id: 469, text: "An organization wants to ingest custom log data from GKE environments, virtual machines, and Google Cloud services. Which Google Cloud tool should the organization use?", options: { A: "Dialogflow", B: "Cloud Logging", C: "Cloud SDK", D: "Data Catalog" }, correct: ["B"], groups: ["bolum2", "son1", "son2"], learn: "GKE + VM + servis log toplama → Cloud Logging", learnEn: "GKE + VM + service log collection → Cloud Logging" },
  { id: 470, text: "An organization is using new technologies to change its business processes and culture to develop new customer experiences and adapt to market dynamics. What is the name of this approach?", options: { A: "Digital transformation", B: "Data center migration", C: "Operations optimization", D: "User personalization" }, correct: ["A"], groups: ["bolum2", "son2", "son3"], learn: "Teknoloji ile iş süreçleri ve kültürü değiştirme → Digital transformation", learnEn: "Changing business processes and culture with technology → Digital transformation" },
  { id: 471, text: "A cinema company wants to build a model to predict customer visit patterns for the coming year. They have three years of customer visit data across 300 theaters; however, the data has been stored in different formats by different theaters. They must train the ML model. What should they do?", options: { A: "Use the last year of data so there are fewer inconsistencies for the model to handle.", B: "Transform the data into a consistent format.", C: "Group different format types and train a different model for each group.", D: "Choose an ML model type that can process different formats of input data." }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Farklı formatlı eğitim verisi → tutarlı formata dönüştür", learnEn: "Different format training data → transform to consistent format" },
  { id: 472, text: "An organization is looking for a hybrid-cloud management solution that will help them build and run applications on-premises and in the cloud. What solution should the organization use?", options: { A: "Anthos", B: "Cloud Functions", C: "App Engine", D: "Compute Engine" }, correct: ["A"], groups: ["bolum1"], learn: "On-prem + bulut hibrit yönetim → Anthos", learnEn: "On-prem + cloud hybrid management → Anthos" },
  { id: 473, text: "An organization is concerned that one of their applications takes too long to return a result. According to Google's \"Four Golden Signals,\" which signal measures this aspect of the application's performance?", options: { A: "Saturation", B: "Errors", C: "Latency", D: "Traffic" }, correct: ["C"], groups: ["bolum3", "son1"], learn: "Dört altın sinyal - gecikme → Latency", learnEn: "Four Golden Signals - response time → Latency" },
  { id: 474, text: "A large retail organization uses traditional technology for their ecommerce website. During peaks in traffic, resources are often underutilized or overprovisioned. They have decided to migrate to cloud technology. What aspect of cloud technology will benefit their ecommerce business?", options: { A: "Agile infrastructure means that they only pay for what they need, when they need it.", B: "Operational expenditure means that their total cost of ownership is more predictable.", C: "Unlimited storage means that their website will never experience downtime.", D: "Shared responsibility means that the cloud provider brings increased visibility during peaks in traffic." }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Değişken trafik + sadece kullandığın kadar öde → agile cloud altyapısı", learnEn: "Variable traffic + pay only for what you need → agile cloud infrastructure" },
  { id: 475, text: "An organization has been struggling to make operations more efficient. What site reliability engineering (SRE) best practice should the organization follow to increase efficiency?", options: { A: "Decrease over-reliance on data to make decisions.", B: "Assign exclusive production ownership to developers.", C: "Spend less time measuring outage impact.", D: "Focus on increasing toil automation." }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "SRE verimliliği → toil (tekrarlayan manuel iş) otomasyonu", learnEn: "SRE efficiency → focus on increasing toil automation" },
  { id: 476, text: "An organization is deploying applications to the cloud using platform as a service. In the shared responsibility model, what remains the responsibility of the customer organization?", options: { A: "Operations", B: "Data access policies", C: "Physical security", D: "Network security" }, correct: ["B"], groups: ["bolum2"], learn: "PaaS'ta müşteri sorumluluğu → veri erişim politikaları", learnEn: "PaaS customer responsibility → data access policies" },
  { id: 477, text: "What is a defining function of streaming analytics?", options: { A: "Processing data records continuously", B: "Processing data records in batches", C: "Processing a one-off data backfill", D: "Accessing data with high latency" }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Streaming analytics → veriyi sürekli işler", learnEn: "Streaming analytics → processes data records continuously" },
  { id: 478, text: "An organization wants to migrate a workload to the cloud without changing the application code or architecture. Which migration path describes this approach?", options: { A: "Rehosted", B: "Reimagined", C: "Replatformed", D: "Refactored" }, correct: ["D"], groups: ["bolum3", "son1"], learn: "Kod/mimari değiştirmeden taşıma → Rehosted (Lift & Shift değil Refactored yanlış)", learnEn: "Migrate without changing code or architecture → Rehosted" },
  { id: 479, text: "What is the benefit of using a unified cloud data solution?", options: { A: "Data will always cost less to store.", B: "Data can be automatically secured from external threats.", C: "Data will always be backed up and cannot be lost or deleted.", D: "Data can enable innovation because it's no longer siloed." }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Birleşik cloud veri → silolar ortadan kalkar + inovasyon", learnEn: "Unified cloud data → data no longer siloed, enables innovation" },
  { id: 480, text: "An organization is operating multiple workloads in containers and requires full control of how the workloads are configured. Which Google Cloud service should the organization use?", options: { A: "Cloud Run", B: "Compute Engine", C: "Kubernetes Engine", D: "Cloud Functions" }, correct: ["B"], groups: [], learn: "Container + tam kontrol → GKE (Kubernetes Engine)", learnEn: "Containers + full control → Kubernetes Engine" },
  { id: 481, text: "A financial organization has many customers who close their accounts every year. The organization wants to use data and AI to identify at-risk customers, so they can retain customers by offering discounts and improved services. What should the organization do?", options: { A: "Create a dashboard of previous customers that have exited, and look for obvious correlations in the visualization.", B: "Create a ML model based on the demographics and activities of previous customers that exited.", C: "Create a survey for all customers to identify their current level of satisfaction.", D: "Create a report based on last year's customer feedback." }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Müşteri kaybı tahmini → ML modeli (demografik + davranışsal veri)", learnEn: "Customer churn prediction → ML model (demographic + behavioral data)" },
  { id: 482, text: "An organization wants to analyze data in a data warehouse. How should they proceed?", options: { A: "Import data into a semi-structured time-series database.", B: "Choose a system to store structured and semi-structured data that supports ad-hoc analysis and custom reporting.", C: "Copy unstructured data into a single large object store.", D: "Ensure data is stored in structured tables and rows to support transactional queries and relationships." }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Data warehouse → yapısal ve yarı yapısal + ad-hoc analiz", learnEn: "Data warehouse → structured and semi-structured + ad-hoc analysis" },
  { id: 483, text: "An organization has recently completed a migration from on-premises to Google Cloud. How has cost management been affected?", options: { A: "Costs will primarily shift from CapEx to OpEx.", B: "Costs will primarily shift from OpEx to CapEx.", C: "Cost management will stay the same, but the total cost of ownership (TCO) will be lower.", D: "Cost management will stay the same, but the total cost of ownership (TCO) will be higher." }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "On-premises → bulut → CapEx'ten OpEx'e geçiş", learnEn: "On-premises to cloud → costs shift from CapEx to OpEx" },
  { id: 484, text: "An organization runs a batch data analysis workload on a virtual machine (VM). The workload can be easily restarted without losing work, and is not time critical. The organization must choose the lowest cost option to run the workload. What option should they choose?", options: { A: "A Preemptible or Spot VM on Compute Engine", B: "A custom VM in a pay-as-you-go model on Compute Engine", C: "A standard VM in a pay-as-you-go model on Compute Engine", D: "A Cloud Function with a small memory limit" }, correct: ["A"], groups: ["bolum2", "bolum3", "son1", "son2", "son3"], learn: "Yeniden başlatılabilir + zaman kritik değil → Preemptible/Spot VM", learnEn: "Restartable + not time-critical → Preemptible/Spot VM" },
  { id: 485, text: "An organization cannot afford to modernize their infrastructure, but they want to process data from their legacy system in a modern platform hosted by a business partner. What solution should the organization choose to make their data accessible?", options: { A: "Compute Engine", B: "Anthos", C: "An application programming interface", D: "Google Kubernetes Engine" }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Legacy veri + modern platform erişimi → API", learnEn: "Legacy data + modern platform access → API" },
  { id: 486, text: "A retail organization has moved all of their inventory data to a relational database in the cloud. What functionality does a relational database offer?", options: { A: "It stores large amounts of raw data in its original format", B: "It stores transactional data, which can then be accessed electronically", C: "It rapidly analyzes large and multi-dimensional datasets", D: "It analyzes unstructured data, which can then be accessed in multiple regions" }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "İlişkisel DB işlevi → işlemsel veri depolama ve elektronik erişim", learnEn: "Relational DB function → stores transactional data for electronic access" },
