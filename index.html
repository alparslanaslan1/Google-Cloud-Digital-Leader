  { id: 253, text: "Multiple projects within your organization have long-term VM usage. Based on current demand, they are able to project into the future and estimate how many VM hours they will use every year. Going in for a committed use contract seems sensible. How can you configure committed use easily across all the projects?", options: { A: "Enable committed use with discount sharing for the projects", B: "Review the usage of resources by each project on a daily basis. Enable committed use for the following day based on that number, so that it gives maximum granularity without wastage.", C: "Take a report of each project's use in the last year. Enable committed use on a per-project basis based on the previous year's numbers.", D: "Share a Google Sheet and request each project team to send in their estimate. Enable committed use accordingly on a per-project basis." }, correct: ["A"], groups: ["bolum2", "bolum3", "son1", "son2", "son3"], learn: "Çoklu proje commit → discount sharing etkinleştir", learnEn: "Multi-project commits → enable discount sharing" },
  { id: 254, text: "A financial organization wants to stream logs and events from Google Cloud resources into Splunk. The solution requires that services communicate asynchronously. Which of the following services will best create a system of event producers and consumers so that the event producers can communicate asynchronously with event consumers by broadcasting events?", options: { A: "Pub/Sub", B: "Dataflow" }, correct: ["A"], groups: ["bolum3"], learn: "Asenkron mesajlaşma + event streaming → Pub/Sub", learnEn: "Async messaging + event streaming → Pub/Sub" },
  { id: 255, text: "A global insurance company that uses Google Cloud Platform plans for its employees to work from home. It has requested a scalable, cost-effective solution that can enable encrypted desktop streaming so that employees can access corporate resources. Which of the following would you recommend?", options: { A: "Google workspace", B: "Google Cloud Virtual Desktop", C: "Create an encrypted connection to the office network", D: "Enable Remote Desktop Protocol (RDP) to connect to remote desktops" }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Şifreli uzak masaüstü → Google Cloud Virtual Desktop", learnEn: "Encrypted remote desktop → Google Cloud Virtual Desktop" },
  { id: 256, text: "An organization currently stores its data on-premises and they receive different levels of traffic on their website every month. How could the organization benefit from modernizing their infrastructure with cloud technology?", options: { A: "They can rely on the cloud provider for all website source code.", B: "Agile storage scalability.", C: "100% service availability.", D: "They can shift from heavy operational expenditure to a capital expenditure model." }, correct: ["B"], groups: ["bolum2", "son2", "son3"], learn: "Değişken trafik + bulut → esnek depolama ölçeklemesi", learnEn: "Variable traffic + cloud → agile storage scaling" },
  { id: 257, text: "Which of the following NIST Cloud characteristics uses the business model of shared resources in a cloud environment?", options: { A: "Elasticity", B: "Availability", C: "Broad Network Access", D: "Multi-Tenancy" }, correct: ["D"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Paylaşımlı kaynak modeli → Multi-Tenancy (NIST)", learnEn: "Shared resource pool model → Multi-Tenancy (NIST)" },
  { id: 258, text: "You want to build an application that will allow customers to register and login. It would be great to have the ability to secure it with multi-factor authentication and the ability to reset credentials. As a small startup, you want to build the main application as quickly as possible and have minimum overhead. Which might be a suitable option for you on Google Cloud?", options: { A: "Since identity and credentials should be secure and private, do not trust other service providers.", B: "Cloud Identity", C: "Google Workspace", D: "Cloud Identity Platform" }, correct: ["D"], groups: ["bolum2", "bolum3", "son3"], learn: "Kimlik + MFA + reset + minimal geliştirme yükü → Cloud Identity Platform", learnEn: "Identity + MFA + reset + minimal dev overhead → Cloud Identity Platform" },
  { id: 259, text: "A video game organization has invested in cloud technology to generate insights from user behaviors. They want to ensure recommendations of games are aligned to players' interests. What may have prompted this business decision?", options: { A: "Customers expect faster time to market for games.", B: "Employees expect source code changes to be deployed faster.", C: "Customers expect a personalized experience.", D: "Employees expect more predictable data management spending." }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Kullanıcı davranışından öneri → kişiselleştirilmiş deneyim beklentisi", learnEn: "User behavior-based recommendations → personalized experience expectation" },
  { id: 260, text: "A company with its own private data center has called you in for help with their disaster recovery planning. News of multiple ransomware attacks has made them very anxious. They want to make sure they are well prepared for such an eventuality. Which of these would be good recommendations?", options: { A: "It is better to have redundancy; so, set up another private data center nearby so that you can quickly go over in case of an emergency.", B: "It is better to have redundancy; use one or many of the Google Cloud datacenters as a backup location.", C: "The one data center is enough, as long as the data is encrypted; attackers won't be able to read the data.", D: "The one data center is enough as long as you regularly back up data and save it in another place in the same DC." }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Ransomware DR → Google Cloud datacenter'ını yedek konumu olarak kullan", learnEn: "Ransomware DR → use Google Cloud datacenter as backup location" },
  { id: 261, text: "A startup is planning to create their entire suite of applications on Google Cloud. They are looking at various open source technologies to build applications. One of the considerations is about having a well integrated monitoring tool. They have to be able to constantly review load capacity and performance of their applications and virtual machines. What would you advise them to do?", options: { A: "It is best to build a custom solution so that they know it integrates well with all their custom applications.", B: "Since they are using open source for applications, find another open source monitoring tool and integrate it, which could turn out to be very cheap.", C: "Use the Google Cloud Operations Suite which contains monitoring among other operations tools.", D: "Update the application code to regularly write to output logs. Export the logs to BigQuery to analyze them frequently." }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Monitoring + entegrasyon → Google Cloud Operations Suite", learnEn: "Monitoring + integration → Google Cloud Operations Suite" },
  { id: 262, text: "A multinational retail company has approached you to help design its systems. They have millions of transactions at their point of sale systems across the world that need to be captured, stored, and analyzed. They are seeing more growth and expect to expand into even more geographies. Which database would be appropriate for them?", options: { A: "Cloud Datastore", B: "Cloud Storage", C: "Cloud Spanner", D: "Cloud SQL" }, correct: ["C"], groups: [], learn: "Global çok bölgeli işlemler + büyüme → Cloud Spanner", learnEn: "Global multi-regional transactions + growth → Cloud Spanner" },
  { id: 263, text: "An organization wants to dynamically adjust its application to serve different user needs. What are the benefits of storing their data in the cloud for this use case?", options: { A: "Data can be stored in archive for long term access", B: "Automatic data cleaning and validation", C: "Real-time data ingestion and analysis", D: "No data access management required" }, correct: ["C"], groups: ["bolum2", "son2", "son3"], learn: "Dinamik uygulama için bulut avantajı → gerçek zamanlı ingestion ve analiz", learnEn: "Dynamic app cloud benefit → real-time ingestion and analysis" },
  { id: 264, text: "An organization has completely migrated all their infrastructure to the cloud to benefit from its agility. Now they want to innovate faster and achieve a higher return on investment. What should the organization do?", options: { A: "Manually provision all cloud infrastructure for increased control.", B: "Modernize their applications.", C: "Lower their service level objective (SLO).", D: "Move to a hybrid architecture with some of their infrastructure on-premises." }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Buluta geçtikten sonra daha fazla değer → uygulamaları modernize et", learnEn: "After cloud migration, more value → modernize applications" },
  { id: 265, text: "Your customer currently has a hybrid cloud setup including their on-premises data center and AWS. They are consolidating all their services on Google Cloud as part of a modernization plan and want to spend less IT effort in the future. There are about 10 MySQL and 25 PostgreSQL databases across the two DCs. What is the best option for them?", options: { A: "Use the Data Catalog Service to manage the metadata of the databases", B: "Use Cloud Dataflow service and setup Google's Cloud SQL as the sink and the others as the source, which will cause the data to flow in as expected.", C: "Use the Database Migration Service", D: "Use the Bare Metal Solution and copy the databases directly as they are on-premises and on AWS." }, correct: ["C"], groups: ["bolum3", "son1", "son2", "son3"], learn: "MySQL + PostgreSQL göçü → Database Migration Service", learnEn: "MySQL + PostgreSQL migration → Database Migration Service" },
  { id: 266, text: "There are internal compliance requirements that demand that we do not use any APIs or services that are not backed by SLAs. Which of these are acceptable for us? (Choose two answer)", options: { A: "Alpha, Beta", B: "Early Access, Preview", C: "General Availability", D: "Deprecated, but ensure that the SLA support period is still valid." }, correct: ["C", "D"], groups: ["bolum3", "son1", "son2", "son3"], learn: "SLA güvenceli servis → General Availability + Deprecated (destek süresinde)", learnEn: "SLA-backed services → General Availability + Deprecated (within support period)" },
  { id: 267, text: "An organization has created an ecommerce website. What data on this website would be considered structured data?", options: { A: "Product photographs", B: "Product reviews", C: "Product descriptions", D: "Product ratings score" }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "E-ticaret yapısal verisi → ürün puanı (sayısal, tablo)", learnEn: "E-commerce structured data → product ratings (numeric, tabular)" },
  { id: 268, text: "Your company provides car maintenance services. It is conducting an internal hackathon to identify new ideas that could expand their business. The teams have pitched different ideas and have started working on it. They have to present their application to the judges within 48 hours. A presentation alone is not enough; they have to demonstrate a working proof of concept. The team that you are mentoring is going to recommend additional services to drive in customers based on the brand of car they drive in. They need to be able to identify what brand of car the customer has, based on a photograph automatically taken at entry. They have already discovered an open source database of car images collected by online enthusiasts. How should they implement this solution?", options: { A: "Use Deep Learning Containers that are preconfigured and optimized containers for deep learning environments.", B: "Use AutoML Image - upload the images and let it create a working model for you.", C: "Use TensorFlow to create a model that will identify the car brands; use the available data to train the model.", D: "Use Cloud Vision AI that is able to detect logos. Write only the code to integrate into your workflow." }, correct: ["B"], groups: ["bolum1", "bolum2", "son1", "son2", "son3"], learn: "Hızlı prototip + görsel tanıma → AutoML Image", learnEn: "Fast prototype + image recognition → AutoML Image" },
  { id: 269, text: "Your application is onboarding a number of users. The details of the users vary widely. What kind of database would be most suitable for this use case?", options: { A: "NoSQL database like Firestore", B: "OLAP database like BigQuery which support SQL", C: "SQL database like MySQL or PostgreSQL", D: "OLTP database like Cloud Spanner" }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Farklı kullanıcı profilleri → esnek şema → NoSQL (Firestore)", learnEn: "Varying user profiles → flexible schema → NoSQL (Firestore)" },
  { id: 270, text: "Your team is using BigQuery as your central data warehouse. You are running a certain workload that you've run frequently over the last few days. It is a short, high capacity analytics workload. Which of the following would be an appropriate pricing model to use?", options: { A: "There is no need for any pricing model the first 1 TB of query data processed per month is free.", B: "On-demand pricing", C: "Flex Slots", D: "Flat-rate reservations" }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Kısa süreli yüksek kapasiteli analitik → BigQuery Flex Slots", learnEn: "Short high-capacity analytics workload → BigQuery Flex Slots" },
  { id: 271, text: "An organization wants to search for and share plug-and-play AI components which can easily build ML services into their project. Which Google Cloud product should the organization use?", options: { A: "Document", B: "AI Hub", C: "Cloud Talent Solution", D: "Recommendations" }, correct: ["B"], groups: ["bolum2", "son1", "son2"], learn: "Paylaşılabilir AI bileşenleri → AI Hub", learnEn: "Shareable AI components → AI Hub" },
  { id: 272, text: "Your company has multiple internal applications used by your employees. You also have to give access to certain vendors and contractors. What is a good option for you to adopt?", options: { A: "Keep the credentials separate for each application to reduce the blast radius in case of any issues.", B: "Use an external identity provider that is famous and popular like Facebook or Twitter; that way, even your vendors and contractors will have an account there.", C: "Allow all users, especially contractors and vendors, to bring their own identities, like those at gmail.com.", D: "Use an IDaaS (Identity as a Service) product that can centrally manage authentication and authorization for the applications." }, correct: ["D"], groups: ["bolum2", "bolum3", "son1", "son2", "son3"], learn: "Çoklu uygulama + dış kullanıcılar → IDaaS (merkezi kimlik yönetimi)", learnEn: "Multiple apps + external users → IDaaS (centralized identity management)" },
  { id: 273, text: "Your organization is on a critical path with recently developed applications. They are going into production in a month. A few million users are expected to use the new application. They want to ensure minimum disruption when the application goes live. Any issues have to be dealt with within minutes and resolved as quickly as possible. Which Support package should they take?", options: { A: "Enhanced Support", B: "Standard Support", C: "Basic Support", D: "Premium Support" }, correct: ["D"], groups: ["bolum2"], learn: "Milyonlarca kullanıcı + dakikalar içinde çözüm → Premium Support", learnEn: "Millions of users + minutes to resolve → Premium Support" },
  { id: 274, text: "An organization wants to move from a strategic cloud adoption maturity level to a transformational one. How should the organization change the way they scale?", options: { A: "None of these", B: "Deploy changes when problems arise.", C: "Deploy changes programmatically.", D: "Review changes manually." }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Transformasyonel ölçekleme → programatik deploy", learnEn: "Transformational scaling → deploy changes programmatically" },
  { id: 275, text: "Which of the following statements is/are correct about Bare Metal Solutions?", options: { A: "The network, which Google Cloud manages includes a low-latency Cloud Interconnect connection into the customer Bare Metal Solution environment.", B: "Bare Metal Solution also includes the provisioning and maintenance of the custom, sole-tenancy hardware with local SAN, and smart hands support.", C: "Bare Metal Solution uses a bring-your-own-license (BYOL) model.", D: "All of the Above." }, correct: ["D"], groups: ["bolum3", "son2", "son3"], learn: "Bare Metal Solution → ağ, donanım, BYOL → hepsi doğru", learnEn: "Bare Metal Solution → network, hardware, BYOL → all true" },
  { id: 276, text: "An organization has had a data leak scare because one employee made a sensitive Cloud Storage bucket available to the public. Given the nature of the company's business, it is understood that there is never any reason to give the public direct access to any file. The security head wants to ensure that such an event never occurs again. How can you ensure this?", options: { A: "Remove Edit access rights of all Cloud Storage buckets so that no user can make any edits.", B: "Set an organizational policy constraint to restrict bucket access set to the public.", C: "Use Cloud Scheduler to run a job at a specified interval to scan buckets. Any public permissions can be programmatically changed.", D: "Write Cloud Functions code connected to Cloud Storage. Any changes will be notified to the function which can be used to reset the public access." }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Public bucket yasağı → org policy constraint ile kısıtla", learnEn: "Prevent public buckets → org policy constraint" },
  { id: 277, text: "Which of the following options is/are correct about Preemptible VMs?", options: { A: "Preemptible VMs don't have fixed pricing.", B: "Both A&B", C: "None of the Above.", D: "You can not use Preemptible VMs at fault-tolerant workloads such as high-performance computing, big data and analytics, continuous integration." }, correct: ["C"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Preemptible VM → hata toleranslı iş yüklerinde kullanılabilir (yanlış söylem yanlış)", learnEn: "Preemptible VM → CAN be used for fault-tolerant workloads (false claim is false)" },
  { id: 278, text: "Your ed-tech start-up was originally launched in a small geography. Any user sign-ups, course progress, tests taken, etc. are captured on a self-managed MySQL database. Every user generates many such transactions. Now you're taking the application globally and preparing for a much larger influx of users from all over the world. The existing MySQL server is unlikely to be able to scale. Which convenient option can be considered?", options: { A: "Migrate to BigQuery", B: "Migrate to Cloud Spanner", C: "Migrate to Cloud SQL", D: "Migrate to Bigtable" }, correct: ["B"], groups: ["bolum1", "bolum2", "son2", "son3"], learn: "MySQL → global ölçekleme → Cloud Spanner", learnEn: "MySQL → global scaling → Cloud Spanner" },
  { id: 279, text: "An organization with hybrid cloud architecture wants to build an application once and be able to run it both on-premises and in their public cloud. Which Google Cloud solution should the organization use?", options: { A: "Cloud Functions", B: "App Engine", C: "Compute Engine", D: "Anthos" }, correct: ["D"], groups: ["bolum1"], learn: "Hem on-premises hem bulut → Anthos", learnEn: "Both on-premises and cloud → Anthos" },
  { id: 280, text: "Which of the following is/are true about Anthos?", options: { A: "Enterprise-grade container orchestration and management service.", B: "Modernizing your security for hybrid and multi-cloud deployments", C: "Fully managed service mesh with built-in visibility", D: "All of the Above" }, correct: ["D"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Anthos → container orkestrasyon + güvenlik + service mesh", learnEn: "Anthos → container orchestration + security + service mesh" },
  { id: 281, text: "The CFO is attending one of the preliminary meetings in the migration strategy meeting. She brings up the concern about costs. They have contracts with their vendors and the payments they will need to make when purchasing any kind of infrastructure. This gives them a clear view of numbers for resource budgeting and planning. Can she get the same kind of clarity on Google Cloud?", options: { A: "Yes. Do a trial run of typical workloads. See the billing amount and that becomes the base reference.", B: "Yes, the Cloud Native Computing Foundation publishes yearly numbers on the cost of running the cloud. Use that as a reference.", C: "Yes, the Pricing Calculator can be used to estimate the cost of resources.", D: "Yes, Google provides a typical cost of application workloads by region and industry. Use that as a reference." }, correct: ["C"], groups: ["bolum2", "son2", "son3"], learn: "GCP maliyet tahmini → Pricing Calculator", learnEn: "GCP cost estimation → Pricing Calculator" },
  { id: 282, text: "The government has ordered an audit of your company's data. You have hired an external company to conduct the audit. They need to be able to review the data stored in your Cloud Storage buckets across eight projects. How would you grant them access?", options: { A: "Give the auditors an Owner role on the eight buckets so that they have proper access.", B: "Give them Storage Object Viewer access to the buckets in those eight projects.", C: "They might need access to all projects as the audit progresses; so give them access to all Storage buckets so that you don't have to do it repeatedly later on.", D: "They might need access to all projects as the audit progresses; so give them the Editor role on all Storage buckets so that you don't have to do it repeatedly later on." }, correct: ["B"], groups: ["bolum2", "son2", "son3"], learn: "Audit için minimum yetki → Storage Object Viewer", learnEn: "Minimum permission for audit → Storage Object Viewer" },
  { id: 283, text: "A prospect wants to be able to store and analyze data. Their analysts already know SQL, but are not familiar with other technologies. Which of these databases can the analysts use without additional training?", options: { A: "Cloud SQL, BigQuery, Datastore", B: "Spanner, Cloud SQL, BigQuery", C: "Cloud SQL, Firestore, Datastore", D: "Cloud SQL, Bigtable, BigQuery" }, correct: ["B"], groups: ["bolum2", "son2", "son3"], learn: "SQL bilen analistler → Cloud SQL + Spanner + BigQuery", learnEn: "SQL-skilled analysts → Cloud SQL + Spanner + BigQuery" },
  { id: 284, text: "Which of the following is/are true about Bare Metal Solutions?", options: { A: "Enterprise-grade deployment platform", B: "All your existing investment in tooling and best practices will work as is", C: "Continue to run any version, and feature set, any database option, and any customizations (patchsets)", D: "All of the Above." }, correct: ["D"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Bare Metal → enterprise, BYOL, özelleştirme", learnEn: "Bare Metal → enterprise-grade, BYOL, customization" },
  { id: 285, text: "A customer has new applications to build that has to handle both batch data and streaming data. Which product should they choose?", options: { A: "Dataprep", B: "Dataflow", C: "Dataproc", D: "Data Fusion" }, correct: ["B"], groups: ["bolum3"], learn: "Batch + streaming veri → Dataflow", learnEn: "Batch + streaming data → Dataflow" },
  { id: 286, text: "Your application has repeated data requests of the exact same nature. At the same time, the number of user requests is increasing. Monitoring indicates that the load on the existing database is increasing, and there seems to be a bottleneck. An analysis of the data requested shows us that it is application-managed data and that it changes, but not often. How can you improve the efficiency of the application?", options: { A: "Use Cloud Memorystore to improve speed via caching", B: "Increase the amount of RAM on the machine hosting the database so that it has higher data throughput.", C: "Use Cloud Storage with multi-regional storage so that all users accessing the data will have lower latency", D: "Increase the number of CPUs on the machine hosting the database so that it has higher data throughput." }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Tekrarlayan DB sorguları yavaşlıyor → Memorystore (caching)", learnEn: "Repeated DB queries bottleneck → Memorystore (caching)" },
  { id: 287, text: "What conditions be true if a VM interface wants to send packets to the external IP addresses of Google APIs and services using Private Google Access?", options: { A: "VM interface does not have an external IP address assigned.", B: "VM interface is connected to a subnet where Private Google Access is disabled", D: "None of the Above." }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Private Google Access → external IP'si olmayan VM için çalışır", learnEn: "Private Google Access → works for VMs without external IP" },
  { id: 288, text: "Your customer has reliable information to indicate that they will use a certain amount of computing and analytics. The workloads are critical and they don't want to take a chance with VMs or BigQuery slots being unavailable during a peak period. How can they ensure that they allocate the capacity?", options: { A: "Send in the filled form to Google Cloud support to reserve the Compute Engine and BigQuery resources required.", B: "Create reservations on Compute Engine and BigQuery.", C: "On the day the capacity is required, set a scheduled job that will provision as many resources as required and lock it in.", D: "Google Cloud is elastic for resources. You cannot reserve resources in advance; it is pay per use." }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Kaynak rezervasyonu → Compute Engine + BigQuery rezervasyon", learnEn: "Reserve capacity → Compute Engine + BigQuery reservations" },
  { id: 289, text: "An organization's applications run on an inflexible, on-premises architecture. The organization has decided to modernize their existing applications with the cloud. What may have prompted this business decision?", options: { A: "Developers want cloud providers to take full control of their application performance.", B: "IT managers want cloud providers to automatically deploy their infrastructure.", C: "IT managers want to stop making gradual changes.", D: "Developers want to test ideas and experiment with more ease." }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Buluta modernizasyon nedeni → geliştiriciler kolayca deney yapmak istiyor", learnEn: "Modernization reason → developers want to experiment with more ease" },
  { id: 290, text: "An organization wants to scale their existing virtual machine architecture as quickly as possible. Why should the organization use VMware Engine?", options: { A: "To archive virtual machine instances.", B: "To deploy custom APIs seamlessly.", C: "To migrate virtual machines to containers.", D: "To replatform virtual machines as they are." }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "VMware'i olduğu gibi buluta taşıma → VMware Engine", learnEn: "Migrate VMware as-is to cloud → VMware Engine" },
  { id: 291, text: "Your Google Cloud Platform [GCP] admin has to manage a bunch of API keys for external services that are accessed by different applications, which are used by a few teams. What is the best way to manage them?", options: { A: "Share the information in a Github repository and grant access to the repo in IAM as required.", B: "Store the information in Secret Manager and give IAM read permissions as required.", C: "Store the information in Kubernetes Secrets and only grant read permissions to users as required.", D: "Encrypt the information and store it in Cloud Storage for centralized access. Give the decrypt key only to the users who need to access it." }, correct: ["B"], groups: ["bolum2", "son2", "son3"], learn: "API anahtarları yönetimi → Secret Manager + IAM", learnEn: "API key management → Secret Manager + IAM" },
  { id: 292, text: "What are the key features of Google Cloud Identity.", options: { A: "Multi-factor authentication (MFA)", B: "Single sign-on (SSO)", C: "Works with your favorite apps and Endpoint management", D: "All of the Above" }, correct: ["D"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Cloud Identity özellikleri → MFA + SSO + uygulama desteği + endpoint yönetimi", learnEn: "Cloud Identity features → MFA + SSO + app support + endpoint management" },
  { id: 293, text: "A partner of yours used to have their own private data center. Your company was already on Google Cloud and now they have also moved to Google Cloud. You are investigating whether there are ways to collaborate better or shared services. What would be one good option to consider?", options: { A: "Use Private Service Access within Google Cloud.", B: "Use VPC Peering to share resources privately between your two organizations.", C: "Use public IP addresses as before. It will automatically be routed internally only.", D: "Use VPC Shared Networks to share common resources." }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "İki Google Cloud org arası özel paylaşım → VPC Peering", learnEn: "Private sharing between two Google Cloud orgs → VPC Peering" },
  { id: 294, text: "What are the network requirements for Private Google Access?", options: { A: "Private Google Access automatically enables any API.", B: "Your network must have appropriate routes for the destination IP ranges used by Google APIs and services.", D: "None of the Above" }, correct: ["B"], groups: ["bolum2", "son2", "son3"], learn: "Private Google Access → uygun route'lar gerektirir", learnEn: "Private Google Access → requires appropriate routes" },
  { id: 295, text: "A fitness band company is continuously ingesting data from millions of its consumers. Different kinds of data based on time, like location, heartbeat rate, temperature, movement, etc. are connected. They need a high throughput database that can write data very fast. Since their users are spread across the world, they need the database to be geographically scalable. Consumers also want to see near-real-time visualizations of their activities. Which of these databases would be a good fit?", options: { A: "Cloud SQL", B: "Bigtable", C: "Spanner", D: "Firestore" }, correct: ["B"], groups: ["bolum3"], learn: "Yüksek throughput + zaman serisi + global ölçek → Bigtable", learnEn: "High throughput + time-series + global scale → Bigtable" },
  { id: 296, text: "Your team is working on building a machine learning model. There are a bunch of terminologies that are being used. What is an \"instance\" or an \"example\"?", options: { A: "An input variable is used in making predictions. E.g. number of rooms in a house price prediction model.", B: "One row of a dataset containing one or more input columns and possibly a prediction result.", C: "An answer for a prediction task, either the answer produced by a machine learning system or the right answer supplied in training data. E.g. image contains a \"cat\".", D: "The \"knobs\" that you tweak during successive runs of training a model. E.g. learning rate" }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "ML'de instance/example → veri setinin bir satırı", learnEn: "ML instance/example → one row of a dataset" },
  { id: 297, text: "A retail store has discovered a cost-effective solution for creating self-service kiosks. They can use existing check-out hardware and purchase a virtual customer service application. Why do they also need an API?", options: { A: "To connect the check-out hardware to the public cloud.", B: "To connect the new application with the legacy system.", C: "To migrate all customer data for disaster recovery.", D: "To update the check-out hardware remotely." }, correct: ["B"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Yeni uygulama + legacy bağlantı → API", learnEn: "New app + legacy connection → API" },
  { id: 298, text: "Your customer is making a decision on whether to move to Google Cloud. Their key concern is about 10,000 VMs that are part of their IT infrastructure used across more than 110 applications. They are apprehensive of too many changes at this stage. They want to get to Google Cloud in the easiest way possible with minimal disruption. What option would you recommend for them?", options: { A: "Use Migrate for Anthos", B: "Lift and shift the VMs to serverless options like App Engine Flex.", C: "Re-architect on-prem to use Kubernetes and then slowly extend and bridge the on-prem data center to the Google Cloud data center.", D: "Use Migrate for Compute" }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "10.000 VM + minimal değişiklik → Migrate for Compute Engine", learnEn: "10,000 VMs + minimal change → Migrate for Compute Engine" },
  { id: 299, text: "You are leading projects in an IT services company. Your customer's project requires analyzing images. They have many 10s of 1000s of raw images that they have made available to you. Your small technology team needs to build a machine learning model. The images are unlabeled. You don't have the people or the capacity to label the images. What is your approach?", options: { A: "Look for open-source labeled images that closely resemble the given images.", B: "Request data labeling service from Google.", C: "Tell the customer it is their duty to label the images.", D: "Hire temporary workers who can quickly label the images." }, correct: ["C"], groups: ["bolum2", "son2", "son3"], learn: "Etiketlenmemiş görsel veri → veri etiketleme hizmetine başvur", learnEn: "Unlabeled image data → request data labeling service from Google" },
  { id: 300, text: "You are working with the head of the IT team and planning the move of computing systems. The questionnaire indicates that they have a reporting application that runs almost 24 hours every day of the week. When there is extra load, it queues up the processing and executes tasks when there is less demand. Which of these compute options would you recommend for them?", options: { A: "Use a serverless option - App Engine Standard for Flex", B: "Use a server-based option - Compute Engine.", C: "Use a serverless option - Cloud Functions", D: "Serverless option - Cloud Run" }, correct: ["C"], groups: ["bolum2", "son2", "son3"], learn: "7/24 çalışan + kuyruk sistemi → Cloud Functions (sunucusuz)", learnEn: "24/7 running + queue system → Cloud Functions (serverless)" },
  { id: 301, text: "With respect to the Core Feature of Standby Instances of Cloud SQL which one of the options is correct?", options: { A: "The standby instance is used in high availability to replace the primary instance when failover occurs. The standby instance appears in the Google Cloud Console but does not get billed.", B: "The standby instance is used in high availability to replace the primary instance when failover occurs. The standby instance appears in the Google Cloud Console but does get billed.", C: "The standby instance is used in high availability to replace the primary instance when failover occurs. The standby instance doesn't appear in the Google Cloud Console.", D: "None of the Above." }, correct: ["C"], groups: ["bolum3", "son3"], learn: "Cloud SQL standby → Console'da görünür ama billing yapılmaz (yanlış söylem yanlış)", learnEn: "Cloud SQL standby → appears in Console but is NOT billed (false claim is false)" },
  { id: 302, text: "You are a database manager working for a new product that will need millions of reading and writing from the database, with zero downtime, key-value i.e. NoSQL features, no manual steps should be required to ensure consistency, repair data, synchronize writes and deletes, Which of the following database you choose?", options: { A: "Cloud SQL", B: "Cloud BigTable", C: "Cloud Spanner", D: "Cloud Firestore" }, correct: ["B"], groups: ["bolum3"], learn: "Yüksek okuma/yazma + NoSQL + tutarlılık + otomatik onarım → Cloud Bigtable", learnEn: "High read/write + NoSQL + consistency + auto repair → Cloud Bigtable" },
  { id: 303, text: "In terms of Cloud SQL for MySQL Features offered by Google Cloud Platform which of the statements is/are correct?", options: { A: "Do not support Private IP (private service access).", B: "Customer data is encrypted on Google's internal networks and in database tables, temporary files, and backups.", C: "Do not Provide automated and on-demand backups and point-in-time recovery.", D: "None of the above" }, correct: ["B"], groups: ["bolum2", "son2", "son3"], learn: "Cloud SQL → Google iç ağında ve yedeklerde şifreli", learnEn: "Cloud SQL → encrypted on Google's internal networks and in backups" },
  { id: 304, text: "What issues can arise when organizations integrate third-party systems into their cloud infrastructure?", options: { A: "Third-party systems may not be powerful enough to run many critical business applications.", B: "Without sufficient security measures and regular checks, unsecured third-party systems can pose a threat to data security.", C: "Over-reliance on third-party systems limits an organization's potential for innovation.", D: "Third-party systems are less capable of addressing an organization's security requirements." }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Üçüncü taraf entegrasyonu riski → yetersiz güvenlik önlemleri", learnEn: "Third-party integration risk → insufficient security measures" },
  { id: 305, text: "A customer of yours has an SLA with their client that a particular service will respond within 4 seconds. The end client has reported that it feels slower. Your engineers do a trial at the client site and notice that there seems to be a delay for many of the requests. It's your team's responsibility to identify the issue quickly within the strict timeline for fixes according to the contract, and then fix it. What should you do?", options: { A: "Recommend a move to serverless technologies which will scale automatically on demand.", B: "Add logging statements at multiple points in the application, build it, and deploy it. Now new requests will give us information on latency in the logs.", C: "Check if the browsers used by the client are different from yours. If they are, that's most likely the issue. Ensure that everybody uses the latest version of the browser that you are also using.", D: "Use Cloud Trace to collect latency data and track how requests propagate and why there is a delay." }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Latency sorununu izle → Cloud Trace", learnEn: "Track latency and request propagation → Cloud Trace" },
  { id: 306, text: "A large organization is struggling to manage their cloud costs effectively. They want to increase visibility into cloud costs. Which cost management approach should the organization use?", options: { A: "Establish a partnership between finance, technology, and business teams.", B: "Appoint a single person to monitor cloud spending across the organization.", C: "Review any cloud spending that exceeds the organization's error budget.", D: "Increase monitoring of on-premises infrastructure and services." }, correct: ["A"], groups: ["bolum2", "son2", "son3"], learn: "Bulut maliyet görünürlüğü → finans, teknoloji ve iş ekipleri ortaklığı", learnEn: "Cloud cost visibility → partnership between finance, technology, and business teams" },
  { id: 307, text: "A financial services company is running an experimental application workload that has a very large number of mathematical calculations involving floating-point numbers. The current application that is running on compute engine is not providing enough speed and throughput. What are the options to increase the processing performance?", options: { A: "Use a serverless option like Cloud Functions that will automatically scale as much as required.", B: "Instead of using a \"general purpose\" machine family, use \"compute-optimized\" machine family.", C: "Since processing could also be dependent on reading and writing data to the disk, use a fast Local SSD.", D: "Attach GPUs to the virtual machine for number crunching." }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Floating point yoğun hesaplama → GPU ekle", learnEn: "Floating-point intensive computation → attach GPUs" },
  { id: 308, text: "Your client is a financial services company giving loans based on customer profiles. As part of the regulatory compliance, they have to collect a bunch of different documents with know your customer (KYC) information. They want to be able to process the information in these documents quickly and at scale. They want to integrate the chosen solution as quickly as possible. What are your options on Google Cloud?", options: { A: "Integrate the Cloud Vision API to create a custom model to handle the documents.", B: "Create a model using TensorFlow and integrate it into the process workflow.", C: "Integrate the Lending DocAI and Document AI into the loan processing workflow.", D: "Integrate the Natural Language API to read the request sent in by clients and to process the forms." }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "KYC belge işleme + hızlı entegrasyon → Lending DocAI / Document AI", learnEn: "KYC document processing + fast integration → Lending DocAI / Document AI" },
  { id: 309, text: "A large travel company has thus far invested heavily in their technology team. There is strategic pressure on the company to focus on their core business and innovate to survive in certain geographies and thrive in others. They are evaluating whether a move to Google Cloud will be good for them. Which of these reasons would be relevant for them? (choose two answer)", options: { A: "Application architecture won't be too involved because of serverless options.", B: "The IT team won't have to manage software upgrades, security patches, etc. for the VMs.", C: "The IT team won't have to work on procuring and provisioning new hardware and refreshes to existing hardware.", D: "Budgeting won't be an issue since the cloud takes care of billing." }, correct: ["B", "C"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Buluta geçiş avantajı: yazılım güncellemeleri + donanım temin yok", learnEn: "Cloud migration benefits: no software patches + no hardware provisioning" },
  { id: 310, text: "While on-premise, an enterprise had multiple teams, each with its own analytics data store. Attempts to converge the storage for centralized, company-wide analysis failed because of speed and scaling issues. What would be the preferred destination architecture on Google Cloud?", options: { A: "Migrate to Bigtable which provides high throughput reads and writes.", B: "Migrate to Cloud Spanner as a globally scalable SQL database.", C: "Migrate to BigQuery as a central data warehouse.", D: "Migrate to Cloud SQL which supports multiple databases like MySQL, PostgreSQL, and SQL Server - all of the customer's SQL databases can be accommodated here." }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Merkezi analitik + ölçekleme → BigQuery", learnEn: "Centralized analytics + scalability → BigQuery" },
  { id: 311, text: "Keeping Flavours of Apigee in mind, which of the following statements is/are correct?", options: { A: "A hybrid version consisting of a runtime plane installed on-premises or in a cloud provider of your choice, and a management plane running in Apigee's cloud. In this model, API traffic and data are confined within your own enterprise-approved boundaries.", B: "A hosted SaaS version in which Apigee maintains the environment, allowing you to concentrate on building your services and defining the APIs to those services.", C: "There are two types of Flavours in Apigee i.e. Apigee & Apigee Hybrid.", D: "All of the above are correct." }, correct: ["D"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Apigee Hybrid: on-prem çalışma + cloud yönetim | SaaS: tam hosted", learnEn: "Apigee Hybrid: on-prem runtime + cloud management | SaaS: fully hosted" },
  { id: 312, text: "Cloud SQL is a fully-managed relational database service for MySQL, PostgreSQL and SQL servers, keeping Cloud SQL Google Cloud Service in mind, which of the following statements is/are correct?", options: { A: "Data inside cloud SQL is automatically Encrypted.", B: "Cloud SQL automatically ensures your databases are reliable, secure, and scalable so that your business continues to run without disruption.", C: "With DMS (Database Migration Service) it becomes very easy to do Migration of Production Database.", D: "All of the above" }, correct: ["D"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Cloud SQL → otomatik şifreleme + güvenilirlik + DMS entegrasyonu", learnEn: "Cloud SQL → automatic encryption + reliability + DMS integration" },
  { id: 313, text: "Customer Managed Encryption Keys (CMEK) can be used for encrypting data inside Cloud BigTable, which of the following statements is/are correct. (Select two answer)", options: { A: "Administrators can not rotate", B: "Not supported for instances that have clustered in more than one region.", C: "CMEK can only be configured at the cluster level.", D: "You can not use the same CMEK key in multiple projects" }, correct: ["B", "C"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Bigtable CMEK → birden fazla bölgede cluster desteklenmiyor + cluster seviyesinde", learnEn: "Bigtable CMEK → not supported for multi-region clusters + cluster-level only" },
  { id: 314, text: "You have contracted a partner to conduct some medical trials. This is a limited, 2-month contract. At the end of each day, you are expecting about 10 Gbs of data. The data is highly sensitive. What networking option would you employ?", options: { A: "As the name indicates, set up Partner Interconnect with your partner company.", B: "Setup Dedicated Interconnect with your partner.", C: "Setup Cloud VPN and create an IPsec VPN tunnel with your partner.", D: "Create a public IP for a VM and share that with your partners so that they can access it over the internet and share the data." }, correct: ["C"], groups: ["bolum2", "son2", "son3"], learn: "Kısa süreli + küçük veri + güvenli → Cloud VPN", learnEn: "Short-term + small data + secure → Cloud VPN" },
  { id: 315, text: "You are working with a government agency. A web application serves users of the country. It allows citizens to receive certain services in providing their national identity. Citizens have complained that they are seeing delays in web page loading compared to before. On investigating, they are seeing a lot of spurious traffic coming in from a few IPs which they have identified as foreign. What should they do?", options: { A: "Setup Firewall rules to deny access to the malicious IPs.", B: "Setup Cloud Armor and add the malicious IPs to the deny list.", C: "Setup Firewall rules to allow access only to the IPs from within the country.", D: "Setup Cloud NAT and remove all the internal IPs and replace it with a single public IP." }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "DDoS + kötü niyetli IP → Cloud Armor deny list", learnEn: "DDoS + malicious IPs → Cloud Armor deny list" },
  { id: 316, text: "You are consulting for a client who is migrating to Google Cloud. They presently have a matrix organization. Their IT environments were managed around projects. Each team had multiple projects. All the projects had a flat structure under the company. What would you advise them when planning for the move?", options: { A: "On Google Cloud, create a folder corresponding to each team. Under that, there could be projects or further sub folders as the team decides.", B: "In terms of not disturbing the project developers and testers, advise them that the strategic decision is to retain the structure on Google Cloud also.", C: "Since a Project could spawn other sub-Projects, on Google Cloud it is better to assign a folder for each Project.", D: "The flat structure is what is currently used in IT organizations, and this can be used as-is which will provide simplicity." }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Matrix org → her takım için folder, altında projeler", learnEn: "Matrix org → folder per team, projects underneath" },
  { id: 317, text: "Your company has a requirement to run manual tests on their web products for UX research before it is released to end customers. The people who will do the tests are external to the company. They will either use their own Gmail id or be given temporary email ids using the applications and recording their inputs in another app. The UX testing is done in the last week of the month. Each month the UX testers could be different. How should the IT team manage the users?", options: { A: "Since the app is anyways going to be public, create permanent credentials for the UX testers that they can conveniently use each time.", B: "It would be a security issue to have users come and go. Recommend that the testers be permanently hired to plug the vulnerability issue.", C: "It would be a security issue to have users come and go. Recommend external testers not be used at all.", D: "Create a Group with the permissions required to do the test and record their inputs. When users arrive each week, add them to the group and after the testing period, remove them from the group." }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Geçici dış kullanıcılar → Gruba ekle/çıkar yöntemi", learnEn: "Temporary external users → add/remove from Group" },
  { id: 318, text: "What is a key difference between VMs and containers?", options: { A: "Virtual Machines take less time to launch; containers take longer to launch.", B: "Virtual Machines can only run Linux; containers can run any operating system.", C: "Virtual Machines use a shared operating system and are therefore lighter; containers are heavier on resources.", D: "Each Virtual Machine in a machine has its own operating system; containers will share the same operating system." }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "VM vs Container → VM'ler kendi OS'e sahip; container'lar OS paylaşır", learnEn: "VM vs Container → each VM has its own OS; containers share OS" },
  { id: 319, text: "In discussions with a prospective customer who wants to move to Google Cloud to make use of the latest, scalable technologies available therein, you learn that there are very strict regulations concerning the storage of data. They only have the approval to store it in their current private data center. What would you advise them?", options: { A: "Retain on-premise itself those portions of data and compute which are under regulation. Take advantage of all the other cloud capabilities for remaining workloads.", B: "It is too risky to touch anything in such a scenario. It is best to remain entirely on-premise.", C: "Regulations are guidelines. As long as the data remains encrypted, you can move it anywhere.", D: "Petition the government for changes to such regulations as all industries are moving to the public cloud. Then, when the regulations are eased, move to Google Cloud." }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Veri kısıtlı + bulut yetenekleri → hybrid: kısıtlıyı on-prem, diğerini buluta", learnEn: "Data restricted + cloud capabilities → hybrid: regulated on-prem, rest to cloud" },
  { id: 320, text: "Which of the followings are core components of Anthos?", options: { A: "Infrastructure, container, and cluster management", B: "Secure software supply chain", C: "Multicluster & Configuration management", D: "All of the above are correct." }, correct: ["D"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Anthos bileşenleri: altyapı, container, cluster + supply chain + config yönetimi", learnEn: "Anthos components: infrastructure, container, cluster + supply chain + config management" },
  { id: 321, text: "When creating machine learning models, a key initial step is to identify the type of model required. One of these is the classification model. Which of these statements define a classification model?", options: { A: "A type of machine learning model for distinguishing among two or more discrete values. E.g. \"book\", \"car\".", B: "A type of machine learning model is a meta-model maker, which classifies algorithms based on the quality of their output.", C: "A type of machine learning model that outputs continuous (typically, floating-point) values. E.g. the predicted price of the house is $120,000.", D: "A type of classic model approach that is less used today and which has been replaced by the regression model." }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Classification model → iki veya daha fazla ayrık değer arasında ayırt etme", learnEn: "Classification model → distinguishes between two or more discrete values" },
  { id: 322, text: "You are a DevOps Engineer in an E-commerce company that sells products globally, across the countries, Customers buy products, add them to carts or check-in stock from different parts of the world with different timestamps, you need to choose a database that can scale globally without any hassle and lots of developer support, it should be consistent across regions, can scale horizontally to support enormous user, automatically replicates, shards and even auto transaction processing. Which of the following database do you choose?", options: { A: "Cloud SQL", B: "Cloud Spanner", C: "Cloud Firestore.", D: "Cloud Storage." }, correct: ["B"], groups: ["bolum1"], learn: "Global e-ticaret + ölçeklenebilir + tutarlı → Cloud Spanner", learnEn: "Global e-commerce + scalable + consistent → Cloud Spanner" },
  { id: 323, text: "A bank wants to track the success of their existing ATM network, which has been modernized with APIs to instantly notify customers about their transfers. What is the benefit of using Apigee to achieve this goal?", options: { A: "It has dashboards that chart dimensions and metrics to report on APIs.", B: "It replicates banking APIs to create new business value.", C: "It measures and tracks their total cost of ownership (TCO).", D: "It allows developers to connect the banking APIs with the public cloud." }, correct: ["A"], groups: ["bolum1", "bolum2", "bolum3", "son1", "son2", "son3"], learn: "Apigee API takibi → dashboard ile boyut ve metrik raporlama", learnEn: "Apigee API tracking → dashboards with dimensions and metrics" },
  { id: 324, text: "The Border Security Agency has hired your software services firm to build an application for them that will collect information about visas stamped on passports. You are given stamped images. You have to find out which country issued the visa and the period of validity. Pull out this data and put it into a database. Which of these applications would be suitable for that?", options: { A: "Use Cloud Vision API - write code to identify the text blocks, copy the data, and store it", B: "Use TensorFlow - write code that will identify the type of visa and the bounding text blocks. Copy the data and then store it.", C: "Use AutoML - upload other images of visas and run the model creation process which will automatically identify the visas", D: "Use Data Labeling service - outsource the work of marking and extracting the information to others." }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Görsel metin çıkarma → Cloud Vision API", learnEn: "Extract text from images → Cloud Vision API" },
  { id: 325, text: "Which of the following statements is/are true about Google Cloud BigTable?", options: { A: "It is not compatible with Hadoop.", B: "It Scales from Giga Byte to Peta Byte with No Downtime.", C: "It can not be used in Real-time Ad analytics and tracking thousands of IoT Devices Data.", D: "It is an enterprise-level Database that offers relational and non-relational features" }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Bigtable → GB'dan PB'a kesintisiz ölçekleme", learnEn: "Bigtable → scales from GB to PB without downtime" },
  { id: 326, text: "You have a well established development and operations team. Your teams were managing the entire software delivery/deployment cycle on-premise. When migrating to the cloud, you want to continue having this approach. Which is the ideal option for you?", options: { A: "PaaS - Platform as a Service", B: "SaaS - Software as a Service", C: "IDaaS - Identity as a Service", D: "laaS - Infrastructure as a Service" }, correct: ["D"], groups: ["bolum3"], learn: "Mevcut dev/ops ekibi + tam kontrol → IaaS", learnEn: "Existing dev/ops team + full control → IaaS" },
  { id: 327, text: "Which of the following statements is/are true about Cloud Spanner offered by Google Cloud Platform?", options: { A: "It can scale horizontally to support additional capacity.", B: "It comes with Zero Downtime, No Maintenance windows, and is proven for large and small workloads.", C: "You don't need to shard or replicate data.", D: "All of the above." }, correct: ["D"], groups: ["bolum3", "son2", "son3"], learn: "Cloud Spanner → horizontal scaling + zero downtime + otomatik shard", learnEn: "Cloud Spanner → horizontal scaling + zero downtime + automatic sharding" },
  { id: 328, text: "You are working in a company that provides different services to its customer. Now it also wants to offer some paid API services to its B2B customers for e.g. google provides google maps API, cloud vision API, and language translation API. You need to figure out the best solution for the service.", options: { A: "Java Programming Spring Boot Framework to solve the problem of APIs management.", B: "Cloud Functions with Firestore and payment gateways integration development.", C: "Apigee API Management", D: "Frontend & Backend Development with NodeJs and angular etc." }, correct: ["C"], groups: ["bolum1", "bolum2", "son1", "son2", "son3"], learn: "Ücretli B2B API servisi → Apigee API Management", learnEn: "Paid B2B API service → Apigee API Management" },
  { id: 329, text: "Which of these are defined by the following statement: a contract you have with your end customers, which, if you don't meet, you might even have to pay fines?", options: { A: "SLA - Service Level Agreement", B: "SLC - Service Level Contract", C: "SLO - Service Level Objective", D: "SLI - Service Level Indicator" }, correct: ["A"], groups: ["son1", "son2", "son3"], learn: "SLA → servis seviyesi taahhüdü (ceza/iade içerebilir)", learnEn: "SLA → service level commitment (may include penalties/credits)" },
  { id: 330, text: "How does a least privilege resource access model contribute to cloud security?", options: { A: "Google is responsible for determining access to cloud resources.", B: "Employees may only access on-premises software with special permission.", C: "Only managers and other senior employees have cloud resource access.", D: "Employees only have access to the cloud resources necessary for their job." }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Least privilege → çalışanlar sadece işleri için gereken kaynağa erişir", learnEn: "Least privilege → employees only access resources needed for their job" },
  { id: 331, text: "You are working for a hospital that stores its medical images in an on-premises data room and it is provided that the hospitals want to use Cloud Storage for archival storage of these images. You are required to design and implement a solution where the hospital wants an automated process to upload any new medical images to Cloud Storage. On the basis of this statements which of the following statement is correct.", options: { A: "Create a Pub/Sub topic, and enable a Cloud Storage trigger for the Pub/Sub topic. Create an application that sends all medical images to the Pub/Sub topic.", B: "Create a script that uses the gsutil command line interface to synchronize the on-premises storage with Cloud Storage. Schedule the script as a cron job.", C: "In the Cloud Console, go to Cloud Storage. Upload the relevant images to the appropriate bucket.", D: "Deploy a Dataflow job from the batch template, \"Datastore to Cloud Storage\" Schedule the batch job on the desired interval." }, correct: ["A"], groups: ["bolum2", "bolum3", "son1", "son2", "son3"], learn: "Otomatik yükleme + Pub/Sub tetikleyici → Cloud Storage trigger", learnEn: "Automated upload + Pub/Sub trigger → Cloud Storage trigger" },
  { id: 332, text: "You are storing sensitive information in a Cloud Storage bucket. For legal reasons, you need to be able to record all requests that read any of the stored data. You want to make sure you comply with these requirements. What should you do?", options: { A: "Scan the bucket using the Data Loss Prevention API.", B: "Enable Data Access audit logs for the Cloud Storage API.", C: "Enable the Identity Aware Proxy API on the project.", D: "Allow only a single Service Account access to read the data." }, correct: ["B"], groups: ["bolum2", "son2", "son3"], learn: "Veri erişim kayıtları → Data Access audit logs", learnEn: "Data access records → enable Data Access audit logs" },
  { id: 333, text: "Your client has an on-premises data center. Due to technical limitations, they are unable to scale globally. They have decided to adopt the public cloud. However, they don't want to be locked into any one vendor and, therefore, would like to work with multiple cloud providers. They have used open source container technologies and would like to continue using them.", options: { A: "Cloud Run which supports containers and can scale in a serverless fashion", B: "Kubernetes that runs containers as their core workloads", C: "AppEngine Flexible Environment which supports containers", D: "Anthos that runs containers as their core workloads" }, correct: ["D"], groups: ["bolum1", "bolum2", "son1", "son2", "son3"], learn: "Multi-cloud + container + vendor lock-in yok → Anthos", learnEn: "Multi-cloud + containers + no vendor lock-in → Anthos" },
  { id: 334, text: "\"With cloud messaging you can Customize and deliver messages according to the predetermined time in the user's local time zone.\" Comment on the above statement.", options: { A: "This statement is undefined.", B: "The above statement is partially true.", C: "The above statement is completely false.", D: "The above statement is completely true." }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Firebase cloud messaging → yerel saat diliminde zamanlama desteklenir", learnEn: "Firebase cloud messaging → supports scheduling in local time zones" },
  { id: 335, text: "An e-commerce company's business has been booming. To keep up with the growth the IT team also grew. Many new people are being added and new resources are being set up. The CIO is in conversation with you over coffee one day and expresses her growing concern that they might be moving too fast. Their security checks and policies have not kept pace. She worries that somebody would make a misconfiguration or compliance violation thus exposing the company to data and privacy loss. What can you advise her?", options: { A: "Use Cloud Identity-Aware Proxy to allow only specific users to access the data.", B: "Use Security Command Center to have a centralized view of assets and get notified on misconfigurations and vulnerabilities.", C: "Use Cloud Data Loss Prevention to prevent the loss of any data.", D: "Use Cloud Armor to block any DDoS attacks that could be a threat." }, correct: ["B"], groups: ["bolum1", "bolum2", "son1", "son2", "son3"], learn: "Merkezi güvenlik + misconfiguration tespiti → Security Command Center", learnEn: "Centralized security + misconfiguration detection → Security Command Center" },
  { id: 336, text: "One of your clients is in the retail sector. They have a small team supporting their operations and a small development team taking care of application development. They have heard of the benefits of machine learning, but they do not have the capacity to hire data scientists or the work to retain them. They have a team of analysts who works primarily on BigQuery and knows how to run SQL queries. They want to be able to get into the new age of machine learning and artificial intelligence. What options are available to run on Google Cloud?", options: { A: "Use the popular open-source libraries SciPy and NumPy to create machine learning models.", B: "Use the Unified AI Platform to create a custom TensorFlow model.", C: "Use BigQuery ML to create machine learning models using SQL queries.", D: "Integrate the Cloud Vision API and the Cloud Speech API to create a custom model." }, correct: ["C"], groups: ["bolum1", "bolum2", "son2", "son3"], learn: "SQL bilen analist + ML → BigQuery ML", learnEn: "SQL-skilled analysts + ML → BigQuery ML" },
  { id: 337, text: "A customer has an application running in virtual machines. They are migrating this application to Google Cloud. They have previously had scaling issues when on-premises as VMs had to be pre-allocated. Capacity planning was repeatedly off mark - it's either too many VMs or too less. They want to match the capacity to demand while keeping the application running always. They don't have the time or budget to re-architect the systems using containers and Kubernetes at the moment. What would be your recommendation?", options: { A: "Run a load test on Compute Engine VMs. Get an estimate of usage. Then plan for a VM capacity of 25% above the load test value.", B: "Use the Managed Instance Group with Compute Engine", C: "Inform them that new-age companies are using microservices, containers, and Kubernetes for this and they can plan to rewrite the app quickly.", D: "Inform them that using a serverless option will take care of the scaling and they can move to Cloud Run or App Engine." }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "VM + otomatik ölçekleme → Managed Instance Group", learnEn: "VM + auto scaling → Managed Instance Group" },
  { id: 338, text: "You have experimented with Google Cloud using your own credit card and expensed the costs to your company. Your company wants to streamline the billing process and charge the costs of your projects to their monthly invoice. What should you do?", options: { A: "Grant the financial team the IAM role of Billing Account User on the billing account linked to your credit card.", B: "Change the billing account of your projects to the billing account of your company.", C: "Create a ticket with Google Billing Support to ask them to send the invoice to your company.", D: "Set up BigQuery billing export and grant your financial department IAM access to query the data." }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Kişisel CC → şirket billing'e bağla → billing account değiştir", learnEn: "Personal CC → switch to company billing account" },
  { id: 339, text: "You are working with a user to set up an application in a new VPC behind a firewall and it is noticed that the user is concerned about data egress. Therefore, to provide assistance you want to configure the fewest open egress ports. Which of the following statement is correct?", options: { A: "Set up a high-priority (1000) rule that blocks all egress and a low-priority (65534) rule that allows only the appropriate ports.", B: "Set up a low-priority (65534) rule that blocks all egress and a high-priority rule (1000) that allows only the appropriate ports.", C: "Set up a high-priority (1000) rule to allow the appropriate ports.", D: "Set up a high-priority (1000) rule that pairs both ingress and egress ports." }, correct: ["A"], groups: ["bolum2", "son2", "son3"], learn: "Egress minimizasyon → yüksek öncelikli deny all + düşük öncelikli allow", learnEn: "Minimize egress → high-priority deny all + low-priority allow specific ports" },
  { id: 340, text: "What are the different storage & database services in GCP? Which is Google cloud storage and database below the option", options: { A: "Persistent Disk", B: "Cloud SQL.", C: "Cloud Bigtable", D: "Cloud Spanner", E: "All of the Above" }, correct: ["E"], groups: ["bolum3"], learn: "GCP depolama seçenekleri: Persistent Disk + Cloud SQL + Bigtable + Spanner", learnEn: "GCP storage options: Persistent Disk + Cloud SQL + Bigtable + Spanner" },
  { id: 341, text: "An organization wants to measure everything as part of its new DevOps philosophy. What should the organization measure?", options: { A: "The reliability and health of their systems.", B: "The satisfaction and happiness of their employees.", C: "The risk and reward of their investments.", D: "The speed of their cloud adoption process." }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "DevOps'ta ölçülecek şey → sistemlerin güvenilirliği ve sağlığı", learnEn: "DevOps measurement target → reliability and health of systems" },
  { id: 342, text: "Google offers Firebase, In terms of Firebase Console, any particular message that has to be delivered to a customer at a certain degree of change in behavior can be managed through", options: { A: "A/B testing", B: "Notification Composer", C: "Firebase Remote config.", D: "None of the above" }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Firebase bildirim zamanlaması → Notification Composer", learnEn: "Firebase notification scheduling → Notification Composer" },
  { id: 343, text: "A large travel services company has been running all their workloads on Google Cloud in the previous year. They looked at their past usage of cloud resources and see that there is a consistent use of 10,000 virtual machines throughout the year. Based on the projections for the following year they have a strong indication that they will use at least this much or more capacity within Google Cloud. What is one way in which they can take advantage of this knowledge?", options: { A: "They can use these numbers to negotiate a better contract with another public cloud number.", B: "They can cut costs by cutting down on the number of VMs used.", C: "They can get into a committed use contract with Google Cloud to get a significant discount on the usage of VMs.", D: "They can ask for a sustained use discount." }, correct: ["C"], groups: ["bolum2", "bolum3", "son1", "son2", "son3"], learn: "Sürekli VM kullanımı öngörüsü → Committed use contract ile indirim", learnEn: "Consistent VM usage forecast → committed use contract for discount" },
  { id: 344, text: "One of your customers used to have a private data center. While within their data center itself, they were consuming some Google services via API calls and other public, well-known addresses published by Google. Now they're evacuating their private data center and are moving to Google Cloud. Could they improve some of their existing architecture with respect to security?", options: { A: "Use VPC Peering with the Google Cloud organization so that you can directly use services using only private IPs.", B: "Use private addresses only. No additional configuration is required. All Google services will be accessible within Google Cloud on private addresses.", C: "Use Shared VPCs with the Google Cloud organization so that you can directly use services using only private IPs.", D: "Enable Private Google Access so that they can remove public IP addresses." }, correct: ["D"], groups: ["bolum2", "son2", "son3"], learn: "Buluta geçişte özel IP → Private Google Access etkinleştir", learnEn: "Moving to cloud → enable Private Google Access to remove public IPs" },
  { id: 345, text: "What characteristics should an organization adopt to be a DevOps organization?", options: { A: "Teamwork over individual work", B: "Obsession with Automation over preoccupation with manual work", C: "Product based teams over component teams.", D: "All of the Above" }, correct: ["D"], groups: ["bolum3", "son2", "son3"], learn: "DevOps karakteristiği: ekip çalışması + otomasyon + ürün ekipleri", learnEn: "DevOps characteristics: teamwork + automation + product-based teams" },
  { id: 346, text: "When you update the function in firebase by deploying updated code, instances for older versions are cleaned up along with build artifacts in ___ and replaced by new instances.", options: { A: "Google Cloud console.", B: "Storage and Container Registry.", C: "Container Registry repository.", D: "None of the Above" }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Firebase function güncelleme → Storage ve Container Registry temizlenir", learnEn: "Firebase function update → cleans Storage and Container Registry" },
  { id: 347, text: "Firebase Hosting provides the following services-", options: { A: "Dynamic content", B: "Static content.", C: "Microservices.", D: "All of the Above." }, correct: ["D"], groups: ["bolum3", "son2"], learn: "Firebase Hosting → static + dynamic + microservices", learnEn: "Firebase Hosting → static + dynamic + microservices" },
  { id: 348, text: "Your client is building a custom machine learning pipeline to identify lesions in the lungs based on x-rays. Different teams of data scientists are sharing common source data and building many versions of ML models. Which of these Cloud Storage options would be best for them?", options: { A: "Retain the data in use in a single region bucket with nearline storage.", B: "Retain the data in use in a single region bucket with standard storage.", C: "Retain the data in use in a multi-region bucket.", D: "Retain the data in use in a dual-region bucket." }, correct: ["C"], groups: ["bolum2", "son2", "son3"], learn: "Çok ekip erişimli ML verisi → multi-region bucket", learnEn: "Multi-team ML data access → multi-region bucket" },
  { id: 349, text: "Which Firebase quality tools help the developer track, prioritize & fix stability issues that erode the application quality?", options: { A: "Performance", B: "App Distribution", C: "Crashlytics", D: "Test Lab" }, correct: ["C"], groups: ["bolum3", "son1", "son2"], learn: "Uygulama kararlılık izleme → Firebase Crashlytics", learnEn: "App stability monitoring → Firebase Crashlytics" },
  { id: 350, text: "You are running a data warehouse on BigQuery. A partner company is offering a recommendation engine based on the data in your data warehouse. The partner company is also running their application on Google Cloud. They manage the resources in their own project, but they need access to the BigQuery dataset in your project. You want to provide the partner company with access to the dataset. What should you do?", options: { A: "Ask the partner to create a Service Account in their project, and have them give the Service Account access to BigQuery in their project.", B: "Create a Service Account in your own project, and grant this Service Account access to BigQuery in your project.", C: "Create a Service Account in your own project, and ask the partner to grant this Service Account access to BigQuery in their project.", D: "Ask the partner to create a Service Account in their project, and grant their Service Account access to the BigQuery dataset in your project." }, correct: ["D"], groups: ["bolum2"], learn: "Partner'ın BigQuery erişimi → partner'ın service account'ına izin ver", learnEn: "Partner's BigQuery access → grant partner's service account permission" },
  { id: 351, text: "A customer has contacted you about migrating to Google Cloud. The customer would like to migrate their data from on premises as soon as possible. They don't have the budget to rewrite code, and they want the most direct route. What migration option should suggest to the customer?", options: { A: "None, since the customer is not cloud native ready.", B: "Rip and Replace", C: "Lift and Shift", D: "Improve and Move" }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Hızlı taşıma + kod değişikliği yok → Lift and Shift", learnEn: "Fast migration + no code changes → Lift and Shift" },
  { id: 352, text: "Your client's IT environment has so far been on-premises. They run a mix of applications and databases on Linux and Windows. They want to move to Google Cloud in the easiest manner possible. What are their best options?", options: { A: "Compute Engine with VMs with either Linux or Windows OS.", B: "App Engine Standard", C: "Cloud Functions", D: "Cloud Run" }, correct: ["A"], groups: ["bolum2", "bolum3", "son1", "son2", "son3"], learn: "Linux/Windows VM → Compute Engine", learnEn: "Linux/Windows VMs → Compute Engine" },
  { id: 353, text: "What according to you are NOT the key capabilities of In-App Messaging?", options: { A: "Target messages accordingly to the change in the behavior pattern of the target audience.", B: "Creating customized and flexible alerts", C: "Increasing conversion for user-to-user sharing", D: "Sending relevant messages to the target audience" }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "In-App Messaging → hedef kitleye ilgili mesaj (davranış hedeflemesi yeteneği var)", learnEn: "In-App Messaging → send relevant messages to target audience" },
  { id: 354, text: "You're negotiating SLAs with a customer. You have communicated that there will be a 99.99% (four 9s) availability for the service you are providing. Every aspect of the service is under your control. They want to modify the reliability to 99.999% (five 9s). What do you tell them? (Choose two answer)", options: { A: "Yes, that could be possible. If yes, there will be a significantly higher charge because the effort is significantly higher too.", B: "Yes, that is possible, but there will be an additional charge of 9% for the service because that is the additional effort required.", C: "Yes, that is possible. There is hardly any difference to provide another 0.009% availability.", D: "Ask them for the reasonable downtime they are willing to absorb. If it is more than 60 minutes in an entire year, explain how the current SLA meets that requirement." }, correct: ["A", "D"], groups: ["son1", "son2", "son3"], learn: "Five 9s çok daha pahalı ve zordur; 4 9s yılda 52 dakika = makul", learnEn: "Five 9s is much more expensive; 4 nines = ~52 min/year downtime is reasonable" },
  { id: 355, text: "An organization wants to evaluate the performance of their entire cloud infrastructure, including metrics like server uptime and response rate reports. Which Google Cloud tool should the organization use?", options: { A: "Cloud Trace", B: "Cloud Monitoring", C: "Cloud Profiler", D: "Cloud Debugger" }, correct: ["B"], groups: ["bolum1"], learn: "Tüm altyapı performans değerlendirmesi → Cloud Monitoring", learnEn: "Evaluate entire infrastructure performance → Cloud Monitoring" },
  { id: 356, text: "Which of the following methods should you use when you require a dynamic way of provisioning VMs on Compute Engine when it is observed that the exact specifications will be in a dedicated configuration file and you want to follow Google's recommended practices.", options: { A: "Managed Instance Group", B: "Deployment Manager", C: "Cloud Composer", D: "Unmanaged Instance Group" }, correct: ["B"], groups: ["bolum2", "son3"], learn: "Konfigürasyon dosyasından VM oluşturma → Deployment Manager", learnEn: "Create VMs from configuration file → Deployment Manager" },
