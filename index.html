  { id: 112, text: "Which of the following statements about GCP tools/services is false?", options: { A: "You can find the latest ISO/IEC certificates, SOC reports, and self-assessments in the Container Registry.", B: "Container Registry is tightly integrated with all of Google's container services.", C: "The resources found in the Compliance Reports Manager tool can be used to aid your own company's reporting and compliance efforts.", D: "All of the GCP services receive independent verification for security, privacy, and compliance." }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "ISO/IEC sertifikaları → Compliance Reports Manager'da (Container Registry'de değil)", learnEn: "ISO/IEC certificates → in Compliance Reports Manager (not Container Registry)" },
  { id: 113, text: "Which of the following is not a level of organizational GCP support?", options: { A: "Ultra", B: "Basic", C: "Standard", D: "Premium" }, correct: ["A"], groups: ["bolum3", "son1"], learn: "Geçerli olmayan destek seviyesi → Ultra", learnEn: "Non-existent support tier → Ultra" },
  { id: 114, text: "If you need to migrate data in Oracle to a new type of database in GCP, ___ might be a better choice than Database Migration Service.", options: { A: "Datastream", B: "Data Fusion", C: "Cloud Spanner", D: "Dataflow" }, correct: ["A"], groups: ["son1"], learn: "Oracle gibi heterojen DB göçü → Datastream (DMS yerine)", learnEn: "Heterogeneous DB migration (Oracle) → Datastream (over DMS)" },
  { id: 116, text: "Which GCP tool offers an easy, centralized location to store and manage all your Docker container images?", options: { A: "Compliance Reports Manager", B: "Container Registry", C: "Database Migration Service", D: "Cloud TPU" }, correct: ["B"], groups: ["bolum2", "son1", "son2"], learn: "Docker container image merkezi → Container Registry", learnEn: "Central Docker container image store → Container Registry" },
  { id: 117, text: "Which Google product is used to dynamically translate between languages?", options: { A: "Vision OCR", B: "Natural Language", C: "Text AI", D: "Translation" }, correct: ["D"], groups: ["bolum3", "son2"], learn: "Dinamik dil çevirisi → Translation API", learnEn: "Dynamic language translation → Translation API" },
  { id: 118, text: "Which of the following statements about GCP Container Registry is false?", options: { A: "It gives you partial control over who can access, view, or download images.", B: "It allows you to access your images quickly and reliably.", C: "It allows you to flag outdated or compromised images and prevent them from being deployed in the future.", D: "It helps increase the security of your images." }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Container Registry → tam erişim kontrolü sağlar (kısmi değil)", learnEn: "Container Registry → provides full access control (not partial)" },
  { id: 119, text: "Your organization is developing an application that will manage payments and online bank accounts located around the world. The most critical requirement for your database is that each transaction is handled consistently. Your organization anticipates almost unlimited growth in the amount of data stored. Which Google Cloud product should your organization choose?", options: { A: "Cloud SQL", B: "Cloud Storage", C: "Firestore", D: "Cloud Spanner" }, correct: ["D"], groups: ["bolum1"], learn: "Global banka işlemleri + tutarlılık + büyüme → Cloud Spanner", learnEn: "Global banking transactions + consistency + growth → Cloud Spanner" },
  { id: 120, text: "An organization is searching for an open-source machine learning platform to build and deploy their own custom machine learning applications using TPUs. Which Google Cloud product or service should the organization use?", options: { A: "TensorFlow", B: "BigQuery ML", C: "Vision API", D: "AutoML Vision" }, correct: ["A"], groups: [], learn: "Özel ML + TPU + açık kaynak → TensorFlow", learnEn: "Custom ML + TPU + open source → TensorFlow" },
  { id: 121, text: "An organization operates their entire IT infrastructure from Google Cloud. What should they do to prepare for data breaches?", options: { A: "Reduce reliance on multi-factor authentication", B: "Data security is Google's responsibility, so preparation is minimal", C: "Create an incident plan to mitigate impacts", D: "Strengthen their data center perimeter security" }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Veri ihlali hazırlığı → olay müdahale planı oluştur", learnEn: "Data breach preparation → create an incident response plan" },
  { id: 122, text: "An organization wants to migrate legacy applications currently hosted in their data center to the cloud. The current architecture dictates that each application needs its own operating system (OS) instead of sharing an OS. Which infrastructure solution should they choose?", options: { A: "Virtual machines", B: "Open source", C: "Serverless computing", D: "Containers" }, correct: ["A"], groups: ["bolum2"], learn: "Her uygulama ayrı OS → Virtual machines", learnEn: "Each app needs its own OS → Virtual machines" },
  { id: 123, text: "An organization is training a machine learning model to predict extreme weather events in their country. How should they collect data to maximize prediction accuracy?", options: { A: "Collect all weather data evenly across all cities", B: "Collect all weather data primarily from at-risk cities", C: "Collect extreme weather data evenly across all cities", D: "Collect extreme weather data primarily from at-risk cities" }, correct: ["A"], groups: ["bolum2"], learn: "Doğru ML tahmini → tüm şehirlerden dengeli veri topla", learnEn: "Accurate ML prediction → collect balanced data from all cities" },
  { id: 124, text: "An organization needs to search an application's source code to identify a potential issue. The application is distributed across multiple containers. Which Google Cloud product should the organization use?", options: { A: "Google Cloud Console", B: "Cloud Trace", C: "Cloud Monitoring", D: "Cloud Logging" }, correct: ["A"], groups: ["bolum3"], learn: "Dağıtık container'larda kaynak kodu arama → Cloud Console", learnEn: "Search source code across distributed containers → Cloud Console" },
  { id: 125, text: "An organization's web developers and operations personnel use different systems. How will increasing communication between the teams reduce issues caused by silos?", options: { A: "By assigning blame for failures and establishing consequences", B: "By combining job role responsibilities to ensure that everyone has shared access", C: "By increasing data encryption to strengthen workflows", D: "By emphasizing shared ownership of business outcomes" }, correct: ["D"], groups: ["bolum3"], learn: "Siloları kırmak → paylaşılan iş sahipliği vurgusu", learnEn: "Breaking silos → emphasize shared ownership of business outcomes" },
  { id: 126, text: "An organization is migrating their business applications from on-premises to the cloud. How could this impact their operations and personnel costs?", options: { A: "Reduced on-premises infrastructure management costs", B: "Increased on-premises hardware maintenance costs", C: "Reduced cloud software licensing costs", D: "Increased cloud hardware management costs" }, correct: ["A"], groups: ["bolum2", "son2", "son3"], learn: "Buluta geçiş → on-premises altyapı yönetim maliyeti düşer", learnEn: "Moving to cloud → reduces on-premises infrastructure management costs" },
  { id: 127, text: "A retail company stores their product inventory in a legacy system. Often, customers find products on the company's website and want to purchase them in-store. However, when they arrive, they discover that the products are out of stock. How could the company benefit from using an application programming interface (API)?", options: { A: "To create personalized product recommendations for customers", B: "To optimize their on-premises legacy system stability", C: "By manually linking each inventory system to the website on a case-by-case basis", D: "By programmatically connecting the inventory system to their website" }, correct: ["D"], groups: ["bolum3"], learn: "Envanter sistemi + web sitesi entegrasyonu → API ile programatik bağlantı", learnEn: "Inventory + website integration → programmatic connection via API" },
  { id: 128, text: "A hotel wants to modernize their legacy systems so that customers can make reservations through a mobile app. What's the benefit of using an application programming interface (API) to do this?", options: { A: "They do not have to develop the end-user application", B: "They can deprecate their legacy systems", C: "They can transform their systems to be cloud-native", D: "They do not have to rewrite the legacy system" }, correct: ["D"], groups: ["bolum3"], learn: "Legacy sistemi yeniden yazmadan mobil bağlantı → API", learnEn: "Connect to legacy system without rewriting → API" },
  { id: 129, text: "An organization has servers running mission-critical workloads on-premises around the world. They want to modernize their infrastructure with a multi-cloud architecture. What benefit could the organization experience?", options: { A: "Ability to disable regional network connectivity during cyber attacks", B: "Ability to keep backups of their data on-premises in case of failure", C: "Full management access to their regional infrastructure", D: "Reduced likelihood of system failure during high demand events" }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Multi-cloud → kendi altyapısına tam yönetim erişimi", learnEn: "Multi-cloud → full management access to your own regional infrastructure" },
  { id: 130, text: "An organization needs to run frequent updates for their business app. Why should the organization use Google Kubernetes Engine (GKE)?", options: { A: "Customer expectations can be adjusted without using marketing tools", B: "Seamless changes can be made without causing any application downtime.", C: "GKE handles version control seamlessly and out of the box", D: "GKE is well suited for all monolithic applications" }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Sık güncelleme + GKE → monolitik uygulamalar için ideal değil (yanlış cevap bu)", learnEn: "Frequent updates + GKE → not ideal for monolithic applications" },
  { id: 131, text: "An organization wants to use Apigee to manage all their application programming interfaces (APIs). What will Apigee enable the organization to do?", options: { A: "Increase application privacy", B: "Measure and track API performance", C: "Analyze application development speed", D: "Market and sell APIs" }, correct: ["B"], groups: ["bolum1", "bolum2", "bolum3", "son1", "son2", "son3"], learn: "Apigee → API performansını ölçer ve izler", learnEn: "Apigee → measures and tracks API performance" },
  { id: 132, text: "What is an example of unstructured data that organizations can capture from social media?", options: { A: "Post comments", B: "Tagging", C: "Profile picture", D: "Location" }, correct: ["C"], groups: ["bolum2", "son1", "son2"], learn: "Sosyal medyadan yapısal olmayan veri → profil fotoğrafı", learnEn: "Unstructured data from social media → profile picture" },
  { id: 133, text: "An organization relies on online seasonal sales for the majority of their annual revenue. Why should the organization use App Engine for their customer app?", options: { A: "Automatically adjusts physical inventory in real time", B: "Autoscales during peaks in demand", C: "Runs maintenance during seasonal sales", D: "Recommends the right products to customers" }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Mevsimsel trafik zirvesi → App Engine otomatik ölçekleme", learnEn: "Seasonal traffic spikes → App Engine autoscaling" },
  { id: 134, text: "Your organization recently migrated its compute workloads to Google Cloud. You want these workloads in Google Cloud to privately and securely access your large volume of on-premises data, and you also want to minimize latency. What should your organization do?", options: { A: "Use Storage Transfer Service to securely make your data available to Google Cloud", B: "Create a VPC between your on-premises data center and your Google resources", C: "Peer your on-premises data center to Google's Edge Network", D: "Use Transfer Appliance to securely make your data available to Google Cloud" }, correct: ["B"], groups: ["bolum2", "son2", "son3"], learn: "On-premises veri + bulut erişim + düşük gecikme → VPC bağlantısı kur", learnEn: "On-premises data + cloud access + low latency → create VPC connection" },
  { id: 135, text: "Your organization consists of many teams. Each team has many Google Cloud projects. Your organization wants to simplify the management of identity and access policies for these projects. How can you group these projects to meet this goal?", options: { A: "Group each team's projects into a separate domain", B: "Assign labels based on the virtual machines that are part of each team's projects", C: "Use folders to group each team's projects", D: "Group each team's projects into a separate organization node" }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Çok proje, basit IAM → Folder'larla grupla", learnEn: "Multiple projects, simple IAM → group with Folders" },
  { id: 137, text: "Your team is publishing research results and needs to make large amounts of data available to other researchers within the professional community and the public at minimum cost. How should you host the data?", options: { A: "Use a Cloud Storage bucket and enable 'Requester Pays'.", B: "Use a Cloud Storage bucket and provide Signed URLs for the data files.", C: "Use a Cloud Storage bucket and set up a Cloud Interconnect connection to allow access to the data.", D: "Host the data on-premises, and set up a Cloud Interconnect connection to allow access to the data." }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Büyük araştırma verisi + düşük maliyet → Cloud Storage + Requester Pays", learnEn: "Large research data + minimum cost → Cloud Storage + Requester Pays" },
  { id: 138, text: "Your company needs to segment Google Cloud resources used by each team from the others. The teams' efforts are changing frequently, and you need to reduce operational risk and maintain cost visibility. Which approach does Google recommend?", options: { A: "One project per team.", B: "One organization per team.", C: "One project that contains all of each team's resources.", D: "One top-level folder per team" }, correct: ["D"], groups: ["bolum2", "son2", "son3"], learn: "Takım bazlı ayrım + maliyet görünürlüğü → top-level folder per team", learnEn: "Team-based separation + cost visibility → one top-level folder per team" },
  { id: 139, text: "Your organization needs to restrict access to a Cloud Storage bucket. Only employees who are based in Canada should be allowed to view the contents. What is the most effective and efficient way to satisfy this requirement?", options: { A: "Deploy the Cloud Storage bucket to a Google Cloud region in Canada", B: "Configure Google Cloud Armor to allow access to the bucket only from IP addresses based in Canada", C: "Give each employee who is based in Canada access to the bucket", D: "Create a group consisting of all Canada-based employees, and give the group access to the bucket" }, correct: ["B"], groups: ["bolum2", "son3"], learn: "Kanada IP kısıtlaması → Cloud Armor (coğrafi IP filtresi)", learnEn: "Canada IP restriction → Cloud Armor (geographic IP filter)" },
  { id: 140, text: "Your organization runs all its workloads on Compute Engine virtual machine instances. Your organization has a security requirement: the virtual machines are not allowed to access the public internet. The workloads running on those virtual machines need to access BigQuery and Cloud Storage, using their publicly accessible interfaces, without violating the security requirement. Which Google Cloud product or feature should your organization use?", options: { A: "Identity-Aware Proxy", B: "Cloud NAT (network address translation)", C: "VPC internal load balancers", D: "Private Google Access" }, correct: ["D"], groups: ["bolum3", "son1", "son2", "son3"], learn: "VM'den public API erişimi + internet yasağı → Private Google Access", learnEn: "VM accessing public APIs without internet → Private Google Access" },
  { id: 141, text: "You are managing a project for a large healthcare provider with 100+ clinics and hospitals across the European Union. Your client plans to develop an OCR application to digitize overall clinical records, including X-Rays and patients' health records. As part of the solution, it is decided that: Image files will be uploaded. Text will be extracted from the image. The extracted text will be translated into English. The final ready text will be stored for further use. The client does not want any overhead and has asked you to use a Google Cloud product that can offer pre-trained machine learning models through REST APIs. Which Google Cloud solution would you suggest?", options: { A: "AutoML Vision", B: "Vision API" }, correct: ["B"], groups: ["bolum3"], learn: "Pre-trained REST API → Vision API (AutoML değil)", learnEn: "Pre-trained REST API → Vision API (not AutoML)" },
  { id: 142, text: "An organization requires a fully managed, scalable queuing service that will help manage the execution, dispatch, and delivery of multiple distributed tasks. Which Google Cloud solution should the organization use?", options: { A: "Cloud Scheduler", B: "Cloud Tasks", C: "Service Infrastructure", D: "Workflows" }, correct: ["B"], groups: ["bolum2", "son2"], learn: "Distributed task yönetimi → Cloud Tasks", learnEn: "Distributed task management → Cloud Tasks" },
  { id: 143, text: "How does Google Cloud suggest that organizations use third-party identity providers to enable users access to Google Cloud with their corporate credentials?", options: { A: "By delegating responsibility to service accounts and groups", B: "By implementing the principle of least privilege", C: "By federating third-party identity providers with Google Cloud", D: "By migrating unmanaged accounts to personal accounts" }, correct: ["C"], groups: ["bolum2", "bolum3", "son2", "son3"], learn: "Kurumsal kimlik sağlayıcı + Google Cloud → Federation (kimlik federasyonu)", learnEn: "Corporate identity provider + Google Cloud → federation" },
  { id: 144, text: "You work for an e-commerce website and want to use a product that can predict users' purchasing behavior and suggest products based on that behavior. Which of the following Google Cloud AI solutions would you recommend?", options: { A: "Vertex AI Matching Engine", B: "Vertex AI", C: "Vertex Explainable AI", D: "Vertex AI Workbench" }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Kullanıcı satın alma davranışı tahmini → Vertex AI Matching Engine", learnEn: "Predict user purchase behavior → Vertex AI Matching Engine" },
  { id: 145, text: "You are a Chief Technology Officer helping your organization to modernize its IT infrastructure by adopting Google's public cloud services. Which of the following is an advantage of the Infrastructure-as-a-Service model that you should consider when choosing a solution?", options: { A: "Web application security is managed by Google.", B: "IT costs change from operational to capital expenditures.", C: "Google assumes responsibility for server maintenance.", D: "Data storage and encryption become the responsibility of the organization." }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "IaaS avantajı → sunucu bakımı Google'ın sorumluluğu", learnEn: "IaaS advantage → server maintenance is Google's responsibility" },
  { id: 146, text: "A multinational retail corporation plans to migrate its on-premises inventory management system to Google Cloud. The current inventory management system has experienced performance issues that are the result of very high IOPS. How can the organization increase performance and decrease latency by moving to Google Cloud?", options: { A: "Use Local SSDs", B: "Use SSD disks", C: "Use Standard persistent disks", D: "Use Balanced persistent disks" }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Yüksek IOPS + düşük gecikme → Local SSD", learnEn: "High IOPS + low latency → Local SSD" },
  { id: 147, text: "You are leading a team of developers on a project whose goal is to improve customer experience on a credit card company's website. The solution requires custom code without the overhead of managing operating systems or infrastructure. Which of the following cloud offerings would you suggest to your client?", options: { A: "Infrastructure as a Service (laaS)", B: "Platform as a Service (PaaS)", C: "On-premises infrastructure", D: "Software as a Service (SaaS)" }, correct: ["B"], groups: ["bolum2", "bolum3"], learn: "Altyapı yönetimi yok + özel kod → PaaS", learnEn: "No infrastructure management + custom code → PaaS" },
  { id: 148, text: "You work for a ridesharing company that has recently moved to Google Cloud. Jack, the senior manager of the corporate accounting group is worried about the bill and wants to track actual Google Cloud spend against planned spend. Jack also wants to receive alerts via email when certain budget expenditures are reached. Which of the following actions should Jack take to meet these requirements?", options: { A: "Create Cloud Billing Budgets, set a budget amount, and set budget alert threshold rules", B: "Use Cloud Billing Reports with Google Data Studio", C: "Use Cloud Billing data export to BigQuery functionality with Google Data Studio", D: "Create a Cloud Billing account, set a budget amount, and set budget alert threshold rules" }, correct: ["A"], groups: ["bolum2", "bolum3"], learn: "Bütçe takibi + e-posta uyarısı → Cloud Billing Budgets", learnEn: "Budget tracking + email alerts → Cloud Billing Budgets" },
  { id: 149, text: "Which of the following is a use of Big Table?", options: { A: "SQL support for an online transaction processing system", B: "Interactive querying in an online analytical processing system", C: "Real-time data sync between users", D: "NoSQL database operations for large analytical and operational workloads" }, correct: ["D"], groups: ["bolum2", "son2", "son3"], learn: "Bigtable → büyük analitik/operasyonel NoSQL iş yükleri", learnEn: "Bigtable → large analytical/operational NoSQL workloads" },
  { id: 151, text: "Which areas are the sole responsibility of the customer for SaaS, PaaS, and laaS services? (Choose 2 answers)", options: { A: "Devices (Mobile and PCs)", B: "Information and data", C: "Physical network", D: "Physical security of the data center" }, correct: ["A", "B"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Her cloud modelinde müşteri sorumluluğu: cihazlar + veri/bilgi", learnEn: "Customer responsibility in all cloud models: devices + data/information" },
  { id: 152, text: "An organization is developing a business-critical application using Google App Engine. Which of the following should the organization expect to do? (Choose 2 answers)", options: { A: "Establish Role-based access policies", B: "Encrypt data at rest", C: "Monitor application security", D: "Maintain network security" }, correct: ["A", "C"], groups: ["bolum3", "son2", "son3"], learn: "App Engine'de müşteri sorumluluğu: erişim politikaları + uygulama güvenliği", learnEn: "App Engine customer responsibility: access policies + application security" },
  { id: 153, text: "You have joined a growing company that offers online costume rentals through its website and mobile application. Although the volume of rental requests varies throughout the year, it peaks during the holiday season from October through January. The Head of the AppDev team has called for suggestions on scaling the systems to meet the spikes in demand without posing a risk to uptime. Which of the following solutions would best meet these requirements?", options: { A: "Scale the systems vertically", B: "Increase the number of servers", C: "Scale the systems horizontally", D: "Implement load-balancing" }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Mevsimsel trafik artışı → horizontal scaling (sunucu sayısını artır)", learnEn: "Seasonal traffic surge → horizontal scaling (add more servers)" },
  { id: 155, text: "What would provide near-unlimited availability of computing resources without requiring your organization to procure and provision new equipment?", options: { A: "Public cloud", B: "Containers", C: "Private cloud", D: "Microservices" }, correct: ["A"], groups: [], learn: "Sınırsız hesaplama + ekipman gerektirmez → public cloud", learnEn: "Unlimited compute + no equipment needed → public cloud" },
  { id: 156, text: "In Google Cloud Platform, you control which permissions are granted to your users by assigning ___.", options: { A: "roles", B: "access lists", C: "authentications", D: "resources" }, correct: ["A"], groups: ["bolum3"], learn: "GCP'de izin kontrolü → rol atama", learnEn: "GCP permission control → assign roles" },
  { id: 157, text: "Which of the following options is not one of the three main types of roles in Google Cloud Platform?", options: { A: "basic", B: "composite", C: "custom", D: "predefined" }, correct: ["B"], groups: ["bolum3", "son1"], learn: "Üç ana rol tipi: basic, custom, predefined (composite yok)", learnEn: "Three role types: basic, custom, predefined (composite doesn't exist)" },
  { id: 158, text: "Which of the following statements about Google Cloud Platform is false?", options: { A: "When creating a new project, you are asked to pick a location.", B: "Permissions can always be changed after they are assigned.", C: "A project marked for deletion is immediately deleted.", D: "If you already have Active Directory or LDAP, you can use Google Cloud Directory Sync to provision users." }, correct: ["C"], groups: ["bolum2", "bolum3", "son2", "son3"], learn: "Silme için işaretlenen proje hemen silinmez (30 gün bekler)", learnEn: "Project marked for deletion is NOT immediately deleted (30-day wait)" },
  { id: 159, text: "Which of the following statements about billing in Google Cloud Platform is false?", options: { A: "Google has a free tier, which gives you limited access to some GCP services.", B: "Setting a budget creates a hard cap on spending.", C: "Disabling billing stops automatic payments.", D: "When you disable billing, you are still responsible for all outstanding charges for the project." }, correct: ["B"], groups: ["bolum2", "bolum3", "son1", "son2", "son3"], learn: "Budget → sabit harcama sınırı değil, sadece uyarı verir", learnEn: "Budget → not a hard spending cap, just sends alerts" },
  { id: 160, text: "In Google Cloud Platform, ___ are used for generating alerts when costs begin to rise.", options: { A: "billing monitors", B: "billing queries", C: "budgets", D: "billing exports" }, correct: ["C"], groups: ["bolum3"], learn: "GCP'de maliyet uyarısı → Budgets", learnEn: "GCP cost alerts → Budgets" },
  { id: 162, text: "Which of the following statements about project names and IDs in Google Cloud Platform is false?", options: { A: "It is possible to pick your own Project ID.", B: "The Project ID must be globally unique.", C: "The Project Name must be globally unique.", D: "The Project Name can be changed at any time." }, correct: ["C"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Project Name → global unique olmak zorunda değil", learnEn: "Project Name does NOT need to be globally unique" },
  { id: 163, text: "In Google Cloud Platform, ___ are detailed copies of your charges that live inside a BigQuery database.", options: { A: "billing monitors", B: "billing queries", C: "budgets", D: "billing exports" }, correct: ["D"], groups: ["bolum2", "bolum3"], learn: "BigQuery'de detaylı faturalandırma kopyaları → Billing exports", learnEn: "Detailed billing copies in BigQuery → Billing exports" },
  { id: 164, text: "Which Google Cloud Platform predefined role only allows the user to view the current compute resources?", options: { A: "Compute Viewer", B: "Compute Security Admin", C: "Compute Admin", D: "Compute Browser" }, correct: ["A"], groups: ["bolum2", "bolum3", "son1", "son2", "son3"], learn: "Sadece compute kaynaklarını görme → Compute Viewer rolü", learnEn: "View-only compute resources → Compute Viewer role" },
  { id: 165, text: "Which of the following statements about adding users in Google Cloud Platform is false?", options: { A: "It is generally recommended that you avoid using basic roles, especially in production environments.", B: "You can manually create new user accounts.", C: "It is recommended to begin by assigning the maximum amount of permissions at first, then take unnecessary ones away later.", D: "You have full control over which permissions are granted to your users." }, correct: ["C"], groups: ["bolum2", "bolum3", "son1", "son2", "son3"], learn: "En az yetki prensibi → başta minimum, sonra artır (maksimumla başlama)", learnEn: "Least privilege principle → start minimal, expand later (never start with max)" },
  { id: 166, text: "The operating systems of some of your organization's virtual machines may have a security vulnerability. How can your organization most effectively identify all virtual machines that do not have the latest security update?", options: { A: "View the Security Command Center to identify virtual machines running vulnerable disk images", B: "View the Compliance Reports Manager to identify and download a recent PCI audit", C: "View the Security Command Center to identify virtual machines started more than 2 weeks ago", D: "View the Compliance Reports Manager to identify and download a recent SOC 1 audit" }, correct: ["A"], groups: ["bolum1", "son2", "son3"], learn: "Güvenlik açığı olan VM'leri tespit → Security Command Center (disk imaj kontrolü)", learnEn: "Identify VMs with security vulnerabilities → Security Command Center (disk image check)" },
  { id: 167, text: "Which Google Cloud product is designed to reduce the risks of handling personally identifiable information (PII)?", options: { A: "Cloud Storage", B: "Google Cloud Armor", C: "Cloud Data Loss Prevention", D: "Secret Manager" }, correct: ["C"], groups: ["bolum1"], learn: "PII riskini azaltma → Cloud Data Loss Prevention", learnEn: "Reduce PII risk → Cloud Data Loss Prevention" },
  { id: 168, text: "Your organization is migrating to Google Cloud. As part of that effort, it needs to move terabytes of data from on-premises servers to Cloud Storage. Your organization wants the migration process to be automated and to be managed by Google. Your organization has an existing Dedicated Interconnect connection that it wants to use. Which Google Cloud product or feature should your organization use?", options: { A: "Storage Transfer Service", B: "Migrate for Anthos", C: "BigQuery Data Transfer Service", D: "Transfer Appliance" }, correct: ["A"], groups: ["bolum3"], learn: "Otomatik + Google yönetimli + Interconnect → Storage Transfer Service", learnEn: "Automated + Google-managed + Interconnect → Storage Transfer Service" },
  { id: 169, text: "Your organization needs to analyze data in order to gather insights into its daily operations. You only want to pay for the data you store and the queries you perform. Which Google Cloud product should your organization choose for its data analytics warehouse?", options: { A: "Cloud SQL", B: "Dataproc", C: "Cloud Spanner", D: "BigQuery" }, correct: ["D"], groups: ["bolum3"], learn: "Sadece depolama ve sorgu ücretli → BigQuery", learnEn: "Pay only for storage and queries → BigQuery" },
  { id: 170, text: "Your organization wants an economical solution to store data such as files, graphical images, and videos and to access and share them securely. Which Google Cloud product or service should your organization use?", options: { A: "Cloud Storage", B: "Cloud SQL", C: "Cloud Spanner", D: "BigQuery" }, correct: ["A"], groups: [], learn: "Dosya/görsel/video depolama → Cloud Storage", learnEn: "Store files/images/videos → Cloud Storage" },
  { id: 171, text: "A hotel wants to modernize their legacy systems so that customers can make reservations through a mobile app. What's the benefit of using an application programming interface (API) to do this?", options: { A: "They do not have to develop the end-user application", B: "They can deprecate their legacy systems", C: "They can transform their systems to be cloud-native", D: "They do not have to rewrite the legacy system" }, correct: ["D"], groups: ["bolum3"], learn: "Legacy sistemi yeniden yazmadan → API ile entegrasyon", learnEn: "Connect to legacy system without rewriting → API" },
  { id: 172, text: "An organization wants to develop an application that can be personalized to user preferences throughout the year. Why should they build a cloud-native application instead of modernizing their existing on-premises application?", options: { A: "Developers can rely on the cloud provider for all source code", B: "Developers can launch new features in an agile way", C: "IT managers can migrate existing application architecture without needing updates", D: "IT managers can accelerate capital expenditure planning" }, correct: ["B"], groups: ["bolum3"], learn: "Cloud-native → hızlı agile özellik geliştirme", learnEn: "Cloud-native → fast agile feature development" },
  { id: 173, text: "A retail company stores their product inventory in a legacy system. Often, customers find products on the company's website and want to purchase them in-store. However, when they arrive, they discover that the products are out of stock. How could the company benefit from using an application programming interface (API)?", options: { A: "To create personalized product recommendations for customers", B: "To optimize their on-premises legacy system stability", C: "By manually linking each inventory system to the website on a case-by-case basis", D: "By programmatically connecting the inventory system to their website" }, correct: ["D"], groups: ["bolum3"], learn: "Envanter + web bağlantısı → API ile programatik entegrasyon", learnEn: "Inventory + website connection → programmatic API integration" },
  { id: 174, text: "An organization's web developers and operations personnel use different systems. How will increasing communication between the teams reduce issues caused by silos?", options: { A: "By assigning blame for failures and establishing consequences", B: "By combining job role responsibilities to ensure that everyone has shared access", C: "By increasing data encryption to strengthen workflows", D: "By emphasizing shared ownership of business outcomes" }, correct: ["D"], groups: ["bolum3"], learn: "Silo sorunları → paylaşılan iş sonucu sahipliği", learnEn: "Silo problems → emphasize shared ownership of business outcomes" },
  { id: 175, text: "How does a large hotel chain benefit from storing their customer reservation data in the cloud?", options: { A: "On-premises hardware access to transaction data", B: "Real-time data transformation at scale within an on-premises database", C: "Real-time business transaction accuracy at scale", D: "Physical hardware access during peak demand" }, correct: ["C"], groups: ["bolum3"], learn: "Buluttaki rezervasyon verisi → gerçek zamanlı işlem doğruluğu", learnEn: "Reservation data in cloud → real-time transaction accuracy at scale" },
  { id: 176, text: "After rolling out a new update, an organization found a minor bug in its online video game. How should the organization approach this bug while following SRE principles?", options: { A: "Accept and learn from the bug because failure is normal", B: "Accept and ignore the bug because it is only minor", C: "Hold a postmortem to reprimand the employee responsible for the bug", D: "Document bug correction to eliminate all future bugs" }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "SRE'de hata → kabul et ve öğren (blame kültürü yok)", learnEn: "SRE bug culture → accept and learn from failure (no blame)" },
  { id: 177, text: "Why do organizations often struggle to scale their on-premises application infrastructure?", options: { A: "Scaling compute instances could breach compliance and/or regulation", B: "Increasing compute capacity is time-consuming and costly", C: "Their serverless compute functions struggle to meet the demand", D: "Their multi-cloud architecture is complex and expensive" }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "On-premises ölçekleme zorluğu → donanım temin süreci maliyetli ve yavaş", learnEn: "On-premises scaling challenge → hardware provisioning is time-consuming and costly" },
  { id: 178, text: "An organization wants to use BigQuery data analytics to understand their website performance, but wants to move only some data into the cloud. Which environment should the organization use?", options: { A: "Private cloud", B: "On-premises", C: "Multi-cloud", D: "Hybrid cloud" }, correct: ["D"], groups: ["son1"], learn: "Kısmi veri bulutta + BigQuery analizi → Hybrid cloud", learnEn: "Some data in cloud + BigQuery analytics → Hybrid cloud" },
  { id: 179, text: "What is logging within the context of cloud technology?", options: { A: "Writing application and operating system events as text", B: "Monitoring network and resource limitations", C: "Tracking source code across an organization", D: "Recording infrastructure and hardware expenditure" }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Logging → uygulama ve OS olaylarını metin olarak yazar", learnEn: "Logging → records application and OS events as text" },
  { id: 180, text: "How does Cloud SQL help organizations create business insights?", options: { A: "Integrates with business intelligence and analytics platforms", B: "Generates predictions using machine learning models", C: "Generates real-time charts and intelligent analytics", D: "Transforms business data from unstructured to structured" }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Cloud SQL → BI ve analitik platformlarla entegre olur", learnEn: "Cloud SQL → integrates with BI and analytics platforms" },
  { id: 181, text: "An organization recently launched a virtual customer support agent, generating vast amounts of text and speech data. Why should they use a cloud data warehouse to interpret this data?", options: { A: "To natively visualize both types of data using a dashboard in real time", B: "To ingest and analyze structured and unstructured data at scale, in real time", C: "To secure data transmission between cloud and on-premises environments", D: "To transform data from structured to unstructured" }, correct: ["B"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Büyük metin/ses verisi analizi → data warehouse (gerçek zamanlı ingestion)", learnEn: "Large text/speech data analysis → data warehouse (real-time ingestion)" },
  { id: 182, text: "An organization wants to add a new function to their application. They want to write the code and let the public cloud provider handle the infrastructure. Which infrastructure solution should they use?", options: { A: "Virtual machines", B: "Bare Metal Solution", C: "Serverless computing", D: "Container Registry" }, correct: ["C"], groups: [], learn: "Kod yaz, altyapı yönetme → Serverless computing", learnEn: "Write code, no infrastructure management → Serverless computing" },
  { id: 183, text: "An organization wants to leverage tooling and automation as part of its new DevOps philosophy. Which operational challenge will this resolve?", options: { A: "Repetitive manual tasks that hinder workflows", B: "Time-consuming supervision of creative tasks", C: "Distribution and supply-chain issues", D: "Defective technical equipment that limits innovation" }, correct: ["A"], groups: ["bolum2", "son2", "son3"], learn: "DevOps + otomasyon → tekrarlayan manuel görevleri ortadan kaldırır", learnEn: "DevOps + automation → eliminates repetitive manual tasks" },
  { id: 184, text: "An organization needs to store structured, semi-structured, and unstructured data in its raw, native format in the same repository. Which cloud data management solution should the organization use?", options: { A: "Data field", B: "Data lake", C: "Database", D: "Data warehouse" }, correct: ["B"], groups: ["bolum1", "bolum2"], learn: "Ham, native format, yapısal+yapısal olmayan → Data lake", learnEn: "Raw native format, structured + unstructured → Data lake" },
  { id: 185, text: "An organization wants its users to validate a series of new features for their app. Why should they use App Engine?", options: { A: "Because their app is containerized and enabled by microservices", B: "Because the updated app will only include new features", C: "To run different versions of the app for different users", D: "To run different versions of the app for the same user" }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Farklı kullanıcılara farklı sürüm → App Engine traffic splitting", learnEn: "Different app versions for different users → App Engine traffic splitting" },
  { id: 186, text: "How would an organization benefit from using Looker?", options: { A: "Optimal identity and access management", B: "Leading serverless warehousing technology", C: "Robust data roll-back accuracy", D: "Advanced business intelligence and analytics" }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Business intelligence ve analitik → Looker", learnEn: "Business intelligence and analytics → Looker" },
  { id: 187, text: "An organization delivers a proactive healthcare service. They want to efficiently and automatically collect patient data. What should the organization encourage the patients to do?", options: { A: "Use at-home health screening devices and then upload their health data daily", B: "Wear Internet of Things (IoT) devices that upload their health data in real time", C: "Self-assess their health data and then document and upload it in real time", D: "Visit a nurse who will use Internet of Things (IoT) devices to collect and upload their health data" }, correct: ["B"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Gerçek zamanlı sağlık verisi → IoT cihazları (giyilebilir)", learnEn: "Real-time health data collection → IoT wearable devices" },
  { id: 188, text: "An organization wants to introduce a new image recognition login system. What should the organization do to follow SRE principles?", options: { A: "Roll out the new system to a subset of employees to test it out", B: "Roll out the new system to all employees to collect as much data as possible" }, correct: ["A"], groups: ["bolum3"], learn: "SRE → yeni sistemi önce küçük gruba uygula (canary/pilot)", learnEn: "SRE → roll out new system to a subset first (canary/pilot)" },
  { id: 189, text: "A global organization is developing an application to manage payments and online bank accounts in multiple regions. Each transaction must be handled consistently in their database, and they anticipate almost unlimited growth in the amount of data stored. Which Google Cloud product should the organization choose?", options: { A: "Cloud SQL", B: "Cloud Spanner", C: "Cloud Storage" }, correct: ["B"], groups: ["bolum1", "bolum3"], learn: "Global ödemeler + tutarlılık → Cloud Spanner", learnEn: "Global payments + consistency → Cloud Spanner" },
  { id: 190, text: "An organization wants to use all available data to offer predictive suggestions on their website that improve over time. Which method should the organization use?", options: { A: "Data automation", B: "Trends analysis", C: "Machine learning", D: "Multiple regression" }, correct: ["C"], groups: ["bolum3"], learn: "Zamanla gelişen tahminler → Machine learning", learnEn: "Improving predictions over time → Machine learning" },
  { id: 191, text: "How would a global organization benefit from managing their data with Cloud Spanner?", options: { A: "Cloud Spanner is optimized for cold storage", B: "Cloud Spanner replicates data across regions in real time", C: "Cloud Spanner is optimized to ingest unstructured data", D: "Cloud Spanner visualizes and analyzes data in real time" }, correct: ["B"], groups: ["bolum3", "son2", "son3"], learn: "Cloud Spanner → bölgeler arası gerçek zamanlı veri replikasyonu", learnEn: "Cloud Spanner → real-time data replication across regions" },
  { id: 192, text: "An employee receives an email from their internet service provider asking for their bank account number and password. Which cybersecurity threat is this?", options: { A: "Ransomware", B: "Distributed Denial of Service", C: "Spamming", D: "Phishing" }, correct: ["D"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Kimlik/şifre isteyen sahte e-posta → Phishing", learnEn: "Fake email asking for credentials → Phishing" },
  { id: 193, text: "An organization wants to move from a tactical cloud adoption approach to a transformational approach. How should they adapt the way they lead the organization?", options: { A: "Increase top-down visibility and foster a culture of blamelessness", B: "Shift from an operational expenditure model to capital expenditure", C: "Drive cloud adoption with an individual contributor focus", D: "Invest in on-premises infrastructure to redesign relationships between IT and employees" }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Taktikten dönüşüme geçiş → üst yönetim görünürlüğü + blame-free kültür", learnEn: "Tactical to transformational → top-down visibility + blameless culture" },
  { id: 194, text: "Why is data stored in Google Cloud secure and private?", options: { A: "Data is encrypted by the Security Command Center", B: "Data is encrypted by Cloud Data Loss Prevention", C: "Data is encrypted by default", D: "Data is encrypted when an appropriate tag is applied" }, correct: ["C"], groups: ["bolum2", "son2", "son3"], learn: "Google Cloud → veri varsayılan olarak şifrelenir", learnEn: "Google Cloud → data is encrypted by default" },
  { id: 195, text: "An organization wants to use multiple marketing datasets to forecast user acquisition. How should they use cloud technology to gain new insights from the data?", options: { A: "Import the datasets into a custom data warehouse, and then archive old data", B: "Import and selectively archive the datasets in a custom data lake", C: "Separate the datasets and make predictions using machine learning", D: "Combine the datasets and make predictions using machine learning" }, correct: ["D"], groups: ["bolum2", "son2", "son3"], learn: "Birden fazla dataset + tahmin → Birleştir ve ML kullan", learnEn: "Multiple datasets + predictions → combine and use machine learning" },
  { id: 196, text: "An organization wants to collect metrics and metadata from their cloud applications and put them into dashboards. Which Google Cloud tool should they use?", options: { A: "Cloud Monitoring", B: "Cloud Trace", C: "Cloud Logging", D: "Cloud Debugger" }, correct: ["A"], groups: ["bolum1"], learn: "Metrik toplama + dashboard → Cloud Monitoring", learnEn: "Metrics collection + dashboards → Cloud Monitoring" },
  { id: 197, text: "A manager wants to review Google Cloud data access among their employees. Who is responsible for defining data access policies?", options: { A: "Cloud Identity", B: "Google Cloud Customer Care team", C: "Their organization's IT team", D: "Their organization's end users" }, correct: ["C"], groups: ["bolum2", "son2", "son3"], learn: "Veri erişim politikası → IT ekibinin sorumluluğu", learnEn: "Data access policy definition → organization's IT team responsibility" },
  { id: 198, text: "An organization has decided to modernize their applications in the cloud to keep up with their customers' needs. What may have prompted this business decision?", options: { A: "Their on-premises applications only autoscale to meet demand.", B: "They want to change from a pay-as-you-go model to a capital expenditure model.", C: "Their source code changes erroneously without developer interaction.", D: "Their on-premises applications take months to update and deploy." }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Modernizasyon nedeni → on-premises güncellemeler aylarca sürer", learnEn: "Modernization reason → on-premises updates take months to deploy" },
  { id: 199, text: "An organization needs to categorize a large group of photographs using pre-trained machine learning. Which Google Cloud product or service should the organization use?", options: { A: "Vision API", B: "BigQuery ML", C: "AutoML Vision", D: "Looker" }, correct: ["A"], groups: ["bolum1", "bolum3"], learn: "Pre-trained ML ile görsel kategorizasyon → Vision API", learnEn: "Pre-trained ML for image categorization → Vision API" },
  { id: 200, text: "An organization provides a loyalty program for its customers. It recently partnered with other businesses so that customers can get loyalty points at a range of other stores. Why should the organization use application programming interfaces (APIs)?", options: { A: "To migrate all partner data for disaster recovery", B: "To analyze and publish loyalty program statistics to a dashboard", C: "To personalize recommendations for loyalty card users", D: "To connect third-party systems to ensure up-to-date information" }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Üçüncü taraf sistemler entegrasyonu → API ile bağlantı", learnEn: "Third-party system integration → connect via API" },
  { id: 201, text: "A travel agency wants to seamlessly share their social media content with partners. What should the organization use?", options: { A: "A NoSQL database", B: "Anthos Config Management", C: "The App Engine standard environment", D: "An application programming interface (API)" }, correct: ["D"], groups: ["bolum3", "son2", "son3"], learn: "İçerik paylaşımı → API", learnEn: "Content sharing with partners → API" },
  { id: 202, text: "How do out-of-the-box APIs make artificial intelligence and machine learning more accessible for all Google Cloud customers?", options: { A: "They don't require technical specialists.", B: "They don't require data input and validation.", C: "They require fewer security permissions.", D: "They all require custom training models." }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Out-of-the-box API → teknik uzman gerektirmez", learnEn: "Out-of-the-box APIs → don't require technical specialists" },
  { id: 203, text: "An organization needs to migrate specialized workloads to the cloud while maintaining their existing complex licensing and architecture. What Google Cloud solution should the organization use?", options: { A: "Compute Engine", B: "Bare Metal Solution", C: "Cloud Run", D: "Cloud Functions" }, correct: ["B"], groups: ["bolum2", "bolum3"], learn: "Karmaşık lisans + mimari koruma → Bare Metal Solution", learnEn: "Complex licensing + architecture preservation → Bare Metal Solution" },
  { id: 204, text: "An organization finds that the amount of cash in their vending machines doesn't match the value of items sold. They have decided to upgrade their vending machines with cloud-based mobile payment systems. How could the organization benefit from this upgrade?", options: { A: "They could relax data access permissions.", B: "They could reduce their error budget overspend.", C: "They could improve their perimeter security.", D: "They could view data history to see transactions." }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Vending machine işlem geçmişi → veri tarihini görebilme", learnEn: "Vending machine transaction history → view data history" },
  { id: 205, text: "A food delivery service needs access to real-time menu information from all partner restaurants. They also need to share customer order information with the restaurants in real time. What should the organization use?", options: { A: "Site reliability engineering (SRE)", B: "An application programming interface (API)", C: "A customized machine learning model", D: "A multi-regional database" }, correct: ["B"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Gerçek zamanlı bilgi paylaşımı → API", learnEn: "Real-time information sharing → API" },
  { id: 206, text: "An organization is planning to create many new applications and needs a system for managing and orchestrating their containers. Why should they use Google Kubernetes Engine?", options: { A: "It enables rapid application deployment and testing.", B: "It optimizes virtual machine performance.", C: "It connects legacy systems to an application.", D: "It provides pre-written source code for application development." }, correct: ["A"], groups: ["bolum2", "son2", "son3"], learn: "Container orkestrasyon + yönetim → GKE (hızlı deploy ve test)", learnEn: "Container orchestration + management → GKE (rapid deploy and test)" },
  { id: 207, text: "How does Google Cloud enable customers to leverage the power of artificial intelligence and machine learning?", options: { A: "With scalable on-premises tensor processing units", B: "With APIs and tools for users at different levels of expertise", C: "With affordable and scalable quantum computing", D: "With machine learning models that always require custom training" }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Google Cloud AI → farklı uzmanlık seviyelerine API ve araçlar", learnEn: "Google Cloud AI → APIs and tools for different expertise levels" },
  { id: 208, text: "An online retail organization wants to optimize their service. What is an example of unstructured data that they can use to make decisions?", options: { A: "Customer survey comments", B: "Seller location coordinates", C: "Product sales trends", D: "Warehouse inventory records" }, correct: ["A"], groups: ["bolum1", "bolum2", "son1", "son2", "son3"], learn: "Yapısal olmayan veri örneği → müşteri yorum metinleri", learnEn: "Unstructured data example → customer survey comments" },
  { id: 209, text: "An organization's public cloud provider failed to meet their SLA of 99.99% availability. What is the potential impact on the organization?", options: { A: "The organization risks using up their error budget.", B: "Renegotiation of the SLA to put less emphasis on uptime could be necessary.", C: "Unexpected downtime could risk the loss of customers.", D: "All data stored in their database could be unexpectedly lost." }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "SLA karşılanmazsa → beklenmedik kesinti → müşteri kaybı riski", learnEn: "SLA not met → unexpected downtime → risk of customer loss" },
  { id: 210, text: "An organization needs to train a machine learning model to categorize photographs. Which Google Cloud product or service should the organization use?", options: { A: "Video Intelligence API", B: "AutoML Vision", C: "BigQuery", D: "Looker" }, correct: ["B"], groups: ["bolum1", "bolum2", "son2", "son3"], learn: "Fotoğraf kategorize etme için ML eğitimi → AutoML Vision", learnEn: "Train ML model to categorize photos → AutoML Vision" },
  { id: 211, text: "A multinational organization has decided to use public cloud services to modernize their IT infrastructure. What is one benefit of doing this?", options: { A: "They can perform hardware maintenance outside of normal business hours.", B: "They can expect 100% service availability in all regions.", C: "Built-in security is no longer required during data migrations.", D: "Access to data and computer resources is not tied to a geographical location." }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Public cloud avantajı → coğrafi bağımsız veri erişimi", learnEn: "Public cloud benefit → data access not tied to geographical location" },
  { id: 212, text: "An organization meets their service level objective (SLO) of 99.999% ('five nines'). How much downtime do their end users experience per year?", options: { A: "5 minutes", B: "500 minutes", C: "5 hours", D: "5 days" }, correct: ["A"], groups: ["bolum2", "son2"], learn: "99.999% uptime = yılda ~5 dakika kesinti", learnEn: "99.999% uptime = ~5 minutes downtime per year" },
  { id: 213, text: "An organization wants to introduce a new image recognition login system. What should the organization do to follow SRE principles?", options: { A: "Roll out the new system to a subset of employees to test it out.", B: "Roll out the new system to all employees to collect as much data as possible.", C: "Avoid rolling out the new system because it may have security flaws.", D: "Avoid rolling out the new system because it may violate privacy policy." }, correct: ["A"], groups: ["bolum3", "son1", "son2", "son3"], learn: "SRE → yeni sistemi önce alt kümeye uygula", learnEn: "SRE → roll out new system to a subset first" },
  { id: 214, text: "What does Cloud Debugger help an organization do?", options: { A: "Implement code updates in real time without affecting the service level objective (SLO).", B: "Inspect source code in real time without affecting user downtime.", C: "Manage code and accelerate application development.", D: "Analyze live source code during user downtime." }, correct: ["B"], groups: ["bolum2", "son3"], learn: "Cloud Debugger → çalışan uygulamada kullanıcı kesintisi olmadan kaynak kod inceleme", learnEn: "Cloud Debugger → inspect live source code without user downtime" },
  { id: 215, text: "How can a streaming service meet global compliance requirements using the cloud?", options: { A: "By automatically encrypting personally identifiable information", B: "By obtaining a business license to operate in a new market", C: "By allowing users to disable two-factor authentication", D: "By adhering only to data polices of the country in which the head office is registered" }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Global compliance → kişisel veriyi otomatik şifrele", learnEn: "Global compliance → automatically encrypt personally identifiable information" },
  { id: 216, text: "An organization wants full control of their virtual machine infrastructure for a custom home-grown application with a product that autoscales and automatically updates. Which Google Cloud product or solution should the organization use?", options: { A: "Cloud Build", B: "Cloud Run", C: "Compute Engine", D: "App Engine" }, correct: ["C"], groups: ["bolum3"], learn: "VM altyapısı tam kontrol + otomatik ölçekleme + güncelleme → Compute Engine", learnEn: "Full VM control + auto scaling + auto updates → Compute Engine" },
  { id: 217, text: "An organization wants to build an entirely new infrastructure and applications in the cloud. Which application modernization approach should the organization use?", options: { A: "Move the application to the cloud, and then change it.", B: "Change their application, and then move it to the cloud.", C: "Invent in greenfield.", D: "Invent in brownfield." }, correct: ["C"], groups: ["bolum3"], learn: "Sıfırdan yeni altyapı + uygulama → Greenfield", learnEn: "Build entirely new infrastructure + applications → Greenfield" },
  { id: 218, text: "An organization wants to upskill their IT staff. How can they do this in a transformational way?", options: { A: "Prioritize training current employees instead of hiring new recruits with cloud experience.", B: "Prioritize giving privileged access to third-party partners and contractors to fill IT knowledge gaps.", C: "Create a culture of self-motivated, isolated learning with official training materials.", D: "Create a culture of continuous peer-to-peer learning with official training materials." }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Transformasyonel öğrenme → resmi materyallerle sürekli peer-to-peer öğrenme", learnEn: "Transformational learning → continuous peer-to-peer learning with official materials" },
  { id: 219, text: "Several departments in an organization are working together on a project. The organization wants to customize access to resources for each department. What is the quickest and most efficient way to achieve this?", options: { A: "By mapping IAM roles to job functions for each department", B: "By assigning IAM primitive roles to each employee", C: "By applying least-privilege to roles for each employee", D: "By creating a single shared service account for all departments" }, correct: ["A"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Çok departmanlı IAM → iş fonksiyonlarına göre rol eşleme", learnEn: "Multi-department IAM → map roles to job functions per department" },
  { id: 220, text: "An organization notices that some of their cloud expenditures are too high. What should the organization do to control costs?", options: { A: "Streamline the hardware procurement process to reduce costs.", B: "Share cost views with the departments to establish more accountability.", C: "Change the cost model from operational expenditure to capital expenditure.", D: "Ensure that all could resources are tagged with a single tag." }, correct: ["B"], groups: ["bolum2", "bolum3", "son1", "son2", "son3"], learn: "Yüksek bulut harcaması → departmanlarla maliyet görünürlüğünü paylaş", learnEn: "High cloud spending → share cost views with departments for accountability" },
  { id: 221, text: "What is monitoring within the context of cloud operations?", options: { A: "Observing cloud expenditure in real time to ensure that budgets are not exceeded", B: "Collecting predefined and custom metrics from applications and infrastructure", C: "Tracking user activities to guarantee compliance with privacy regulations", D: "Tracing user location to document regional access and utilization" }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Monitoring → uygulama ve altyapıdan metrik toplama", learnEn: "Monitoring → collecting predefined and custom metrics from apps and infrastructure" },
  { id: 222, text: "An organization wants to create a new application in the cloud to replace an existing on-premises application. Which application modernization approach should the organization use?", options: { A: "Move the application to the cloud, and then change it.", B: "Change their application, and then move it to the cloud.", C: "Invent in greenfield.", D: "Invent in brownfield." }, correct: ["C"], groups: ["bolum3"], learn: "Mevcut uygulamayı buluta taşı ve değiştir → Greenfield (yeni uygulama yapımı)", learnEn: "Create new app in cloud to replace on-premises → Greenfield" },
  { id: 223, text: "Why should an organization consider the total cost of ownership (TCO) when moving from on-premises to the cloud?", options: { A: "To evaluate error budget", B: "To understand service level availability", C: "To evaluate return on investment", D: "To calculate required compute power" }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "On-premises → bulut TCO hesabı → ROI değerlendirmesi", learnEn: "On-premises to cloud TCO calculation → evaluate return on investment" },
  { id: 224, text: "How does Google Cloud ensure that customer data remains secure and private when at rest?", options: { A: "By aggregating training data for customers within each industry", B: "By automatically locking files containing suspicious code", C: "By auditing platform privacy practices against industry standards", D: "By providing privacy reviews for critical customer applications" }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Google'ın gizlilik güvencesi → endüstri standartlarıyla denetleme", learnEn: "Google privacy assurance → auditing against industry standards" },
  { id: 225, text: "An organization's developers are growing increasingly frustrated by the limitations of their on-premises infrastructure. How would they benefit from leveraging cloud technology?", options: { A: "They can expect 100% service availability.", B: "They can avoid the limitations of serverless computing.", C: "They can have new tools to innovate and optimize resource usage.", D: "They can optimize maintenance for their on-premises infrastructure." }, correct: ["C"], groups: ["bolum2", "son2", "son3"], learn: "Bulut avantajı → inovasyon araçları + kaynak optimizasyonu", learnEn: "Cloud advantage → innovation tools + resource optimization" },
  { id: 226, text: "How is service availability measured in the context of cloud technology?", options: { A: "Number of available regions", B: "Percentage of uptime", C: "Speed of response time", D: "Number of downtime incidents" }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Servis kullanılabilirliği → uptime yüzdesi ile ölçülür", learnEn: "Service availability → measured as percentage of uptime" },
  { id: 227, text: "An organization wants a cost-effective relational database. Which Google Cloud service should the organization use?", options: { A: "Cloud Storage", B: "BigQuery", C: "Cloud SQL", D: "Dataflow" }, correct: ["C"], groups: ["bolum3"], learn: "Maliyet etkin ilişkisel DB → Cloud SQL", learnEn: "Cost-effective relational database → Cloud SQL" },
  { id: 228, text: "An organization is altering their gaming product so that it is compatible with cloud technology. What can they expect when moving from traditional technology to cloud technology?", options: { A: "No change to existing responsibilities", B: "A shift toward OpEx", C: "A shift toward using structured data", D: "Increased hardware maintenance" }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Gelenekselden buluta → OpEx modeline geçiş", learnEn: "Traditional to cloud → shift toward OpEx" },
  { id: 229, text: "When an organization adopts cloud technology, how does their total cost of ownership (TCO) shift?", options: { A: "Away from cost management toward capital expenditure", B: "Away from operational expenditure toward cost management", C: "Away from capital expenditure toward operational expenditure", D: "Away from operational expenditure toward capital expenditure" }, correct: ["C"], groups: ["bolum2", "son2", "son3"], learn: "TCO değişimi → CapEx'ten OpEx'e", learnEn: "TCO shift → from CapEx to OpEx" },
  { id: 230, text: "Which policy helps Google Cloud keep customer data private?", options: { A: "Google tests the service availability of customer applications.", B: "Google does not use customer data for advertising purposes.", C: "Google migrates customer data to an offline server when a threat is detected.", D: "Google does not allow customers to change encryption keys." }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Google gizlilik politikası → müşteri verisi reklam için kullanılmaz", learnEn: "Google privacy policy → customer data not used for advertising" },
  { id: 231, text: "A cloud-native organization is not meeting their service level objective (SLO) but has not exhausted their error budget. What should the organization prioritize?", options: { A: "Innovation to improve user experience", B: "Hardware reliability to improve availability", C: "Stability to avoid prolonged user downtime", D: "Speed to release new features" }, correct: ["C"], groups: ["bolum2", "son2", "son3"], learn: "SLO karşılanmıyor ama error budget dolmadı → stabiliteye odaklan", learnEn: "SLO not met but error budget not exhausted → prioritize stability" },
  { id: 232, text: "An organization is moving away from an on-premises infrastructure. Instead, they want to create, access, and share information virtually in the cloud. What should the organization consider?", options: { A: "Built-in security when moving their data to the cloud", B: "Replacing their perimeter security with data encryption keys", C: "Optimizing cost-management with a capital expenditure model", D: "Increased hardware capacity when moving their data to the cloud" }, correct: ["A"], groups: ["bolum3", "son3"], learn: "Buluta geçişte → yerleşik güvenliği göz önünde bulundur", learnEn: "Moving to cloud → consider built-in security" },
  { id: 233, text: "An organization has an on-premises IT infrastructure. Their customer-facing application repeatedly fails during peak usage. What could be causing this issue?", options: { A: "A serverless compute function struggles to scale.", B: "The application contains unclean data.", C: "They don't have enough servers to meet the demand.", D: "The application is only configurable on-premises." }, correct: ["C"], groups: ["bolum2", "son2", "son3"], learn: "On-premises uygulama zirvede çöküyor → yeterli sunucu yok", learnEn: "On-premises app crashes at peak → not enough servers to meet demand" },
  { id: 234, text: "What is artificial intelligence?", options: { A: "Any system that ingests data in real time", B: "Any system that automatically structures data", C: "Any system capable of a task that requires smart analytics to generate predictions", D: "Any system capable of a task that normally requires human cognition" }, correct: ["D"], groups: ["bolum2", "son1", "son2", "son3"], learn: "AI tanımı → normalde insan bilişi gerektiren görevleri yapabilen sistem", learnEn: "AI definition → any system capable of tasks that normally require human cognition" },
  { id: 235, text: "What does Cloud Logging help an organization do?", options: { A: "Analyze live source code and log code updates.", B: "Deploy infrastructure as code.", C: "Analyze logs and accelerate application troubleshooting.", D: "Manage storage of custom VM images." }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Cloud Logging → log analizi ve troubleshooting hızlandırma", learnEn: "Cloud Logging → analyze logs and accelerate application troubleshooting" },
  { id: 236, text: "How is privacy defined in the context of cloud technology?", options: { A: "Restrictions on data access and sharing", B: "Procedures to authenticate user identity", C: "Susceptibility to data breaches and cyber attacks", D: "Compliance with regulatory standards" }, correct: ["A"], groups: ["bolum2", "son2", "son3"], learn: "Privacy → veri erişim ve paylaşım kısıtlamaları", learnEn: "Privacy → restrictions on data access and sharing" },
  { id: 237, text: "An organization wants to write and run small pieces of code in a serverless way that respond to events like huge discounts. Which Google Cloud compute solution should the organization use?", options: { A: "Google Kubernetes Engine", B: "Cloud Functions", C: "Bare Metal Solution", D: "Compute Engine" }, correct: ["B"], groups: ["bolum1"], learn: "Sunucusuz event-driven küçük kod → Cloud Functions", learnEn: "Serverless event-driven small code → Cloud Functions" },
  { id: 238, text: "An organization wants to search hundreds of scanned documents for key information like dates, names, and other specific words. Why should the organization use application programming interfaces (APIs)?", options: { A: "To replace the scanned documents with an online survey", B: "To ingest data in real time and encrypt unmatched words", C: "To create digital versions of the documents and locate key information", D: "To transform the documents into unstructured data." }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Taranmış belgede anahtar kelime arama → OCR API (belge dijitalleştirme)", learnEn: "Search scanned documents for key information → OCR API (digitize documents)" },
  { id: 239, text: "An organization needs a platform to create custom end-to-end artificial intelligence models. Which Google Cloud product or service should the organization use?", options: { A: "Dataproc", B: "Compute Engine", C: "Recommendations", D: "Vertex" }, correct: ["D"], groups: ["bolum3", "son1"], learn: "Uçtan uca özel AI modeli → Vertex AI", learnEn: "End-to-end custom AI model → Vertex AI" },
  { id: 240, text: "An organization is training a machine learning model to make predictions. What could improve the prediction accuracy of their model?", options: { A: "An increase in storage capacity", B: "Higher network bandwidth", C: "An increase in training data", D: "Faster CPU processors" }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "ML tahmin doğruluğunu artırma → daha fazla eğitim verisi", learnEn: "Improve ML prediction accuracy → increase training data" },
  { id: 241, text: "What is an example of structured data that a healthcare facility stores in their system?", options: { A: "X-ray images", B: "Surgery video recordings", C: "Blood pressure history", D: "Physician-written notes" }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "Yapısal sağlık verisi örneği → kan basıncı geçmişi (tablo formatı)", learnEn: "Structured health data example → blood pressure history (tabular format)" },
  { id: 242, text: "An organization wants to move from a tactical cloud adoption approach to a transformational approach. How should they change their cloud security?", options: { A: "Provide staff identities using only Google Cloud authentication.", B: "Provide multiple layers of network security using a zero-trust model.", C: "Emphasize strong perimeter security and trust in their private network.", D: "Emphasize three main Identity Access Management roles: owner, editor, and viewer." }, correct: ["B"], groups: ["bolum2", "son2", "son3"], learn: "Transformasyonel güvenlik → zero-trust, çok katmanlı", learnEn: "Transformational security → zero-trust, multi-layered" },
  { id: 243, text: "What can customers expect if their cloud provider doesn't meet their service level agreement (SLA)?", options: { A: "Increase in subscription fees", B: "Cloud service shutdown", C: "Refund for service interruption", D: "Error budget expansion" }, correct: ["C"], groups: ["bolum2", "son1", "son2", "son3"], learn: "SLA karşılanmadığında → hizmet kesintisi iadesi", learnEn: "When SLA is not met → refund for service interruption" },
  { id: 244, text: "An organization wants to ensure that their developers can easily use application programming interfaces (APIs) in future projects. Which Google product or solution should they use?", options: { A: "Application migration", B: "Apigee", C: "The App Engine flexible environment", D: "AppSheet" }, correct: ["B"], groups: ["bolum1", "son1", "son2"], learn: "API yönetim kolaylığı → Apigee", learnEn: "Easy API management → Apigee" },
  { id: 245, text: "An organization needs frequent access to only a subset of their data. They want to reduce costs by depositing the rest of their data across Nearline, Coldline, and Archive repositories. Which Google Cloud product should the organization use?", options: { A: "Filestore", B: "Cloud Storage", C: "Data Catalog", D: "Cloud Spanner" }, correct: ["B"], groups: [], learn: "Farklı erişim sıklıklarına göre depolama → Cloud Storage (Nearline/Coldline/Archive)", learnEn: "Different access frequencies → Cloud Storage (Nearline/Coldline/Archive)" },
  { id: 246, text: "A customer service department wants to increase their operational efficiency while maintaining personalized dialog with their customers. What Google Cloud product or service should the organization use?", options: { A: "Recommendations", B: "Cloud Identity", C: "Contact Center", D: "Text-to-Speech" }, correct: ["C"], groups: ["bolum3", "son1", "son2"], learn: "Müşteri hizmetleri verimliliği + kişisel diyalog → Contact Center AI", learnEn: "Customer service efficiency + personal dialog → Contact Center AI" },
  { id: 247, text: "An organization is struggling to keep up with the growth of their application which is running on legacy infrastructure. What might be holding them back?", options: { A: "The time it takes their serverless compute function to scale", B: "The overreliance on platform as a service", C: "The inaccessibility of their data due to perimeter security", D: "The cost of provisioning hardware for peak usage" }, correct: ["D"], groups: ["bolum2", "son2", "son3"], learn: "Legacy büyüme engeli → zirve kullanım için donanım maliyeti", learnEn: "Legacy growth blocker → hardware cost for peak usage" },
  { id: 248, text: "An organization wants to build autoscaling web applications without having to manage application infrastructure. Which Google Cloud product should they use?", options: { A: "Anthos", B: "Apigee", C: "AutoML", D: "App Engine" }, correct: ["D"], groups: ["bolum3"], learn: "Altyapısız otomatik ölçekleme web uygulaması → App Engine", learnEn: "Auto-scaling web app without infrastructure management → App Engine" },
  { id: 249, text: "What is an organization exclusively responsible for when they access an application through a software as a service (SaaS) model?", options: { A: "Maintaining overall system operability", B: "Maintaining customer-facing content", C: "Monitoring data center servers", D: "Monitoring computer networks" }, correct: ["B"], groups: ["bolum2", "son1", "son2", "son3"], learn: "SaaS'ta müşteri sorumluluğu → müşteri içeriği", learnEn: "SaaS customer responsibility → customer-facing content" },
  { id: 250, text: "An organization needs to train a custom machine learning model to categorize customer responses from their website's contact form. Which Google Cloud product or service should the organization use?", options: { A: "Anthos", B: "Recommendations", C: "AutoML Natural Language", D: "Pub/Sub" }, correct: ["C"], groups: ["bolum2", "son3"], learn: "Özel metin sınıflandırma → AutoML Natural Language", learnEn: "Custom text classification → AutoML Natural Language" },
  { id: 251, text: "An IoT platform is providing services to home security systems. They have more than a million customers, each with many home devices. Burglaries or child safety issues are concerns that the platform's customers have. Therefore, the platform has to respond very quickly in near real time. What could be a typical data pipeline used to support this platform on Google Cloud?", options: { A: "Cloud Pub/Sub, Cloud Dataflow, Data Studio", B: "Cloud Functions, Cloud Dataproc, Looker", C: "Cloud Pub/Sub, Cloud Dataflow, BigQuery", D: "Cloud Functions, Cloud Dataproc, BigQuery" }, correct: ["A"], groups: ["bolum2", "son2", "son3"], learn: "IoT gerçek zamanlı pipeline → Pub/Sub → Dataflow → Data Studio", learnEn: "IoT real-time pipeline → Pub/Sub → Dataflow → Data Studio" },
  { id: 252, text: "An organization runs their application on a virtual machine, but every time they want to edit specific features, they have to bring the system offline to update the application. What would be a more appropriate solution for their app?", options: { A: "GPUs", B: "Containers", C: "Hypervisors", D: "Solid State Disk" }, correct: ["B"], groups: ["bolum3", "son1", "son2", "son3"], learn: "Çevrimdışı güncelleme olmadan uygulama değişikliği → Container", learnEn: "Update application without downtime → Containers" },
